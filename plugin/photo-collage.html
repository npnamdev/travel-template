<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ghép Ảnh — Photo Collage</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

  <style>
    :root {
      --bg: #fdf2f8;
      --bg-card: #ffffff;
      --bg-card-hover: #fef7fb;
      --text: #500724;
      --text-sub: #9d4a6e;
      --primary: #ec4899;
      --primary-dark: #db2777;
      --primary-light: rgba(236,72,153,0.08);
      --primary-glow: rgba(236,72,153,0.15);
      --border: rgba(236,72,153,0.12);
      --shadow: 0 1px 3px rgba(236,72,153,0.04), 0 8px 32px rgba(236,72,153,0.06);
      --shadow-hover: 0 4px 12px rgba(236,72,153,0.1), 0 16px 48px rgba(236,72,153,0.14);
      --success: #22c55e;
    }

    body.dark {
      --bg: #140008;
      --bg-card: #1f0011;
      --bg-card-hover: #2a001a;
      --text: #fce7f3;
      --text-sub: #c77da0;
      --primary: #f472b6;
      --primary-dark: #ec4899;
      --primary-light: rgba(244,114,182,0.1);
      --primary-glow: rgba(244,114,182,0.12);
      --border: rgba(244,114,182,0.1);
      --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 8px 32px rgba(0,0,0,0.4);
      --shadow-hover: 0 4px 12px rgba(236,72,153,0.2), 0 16px 48px rgba(0,0,0,0.5);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Sora', system-ui, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
      transition: background 0.4s, color 0.4s;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      bottom: -200px;
      right: -200px;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(236,72,153,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px;
      position: relative;
      z-index: 1;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: linear-gradient(135deg, #ec4899, #f472b6);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      box-shadow: 0 4px 16px rgba(236,72,153,0.3);
    }

    .header h1 {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary-dark), #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header p { font-size: 0.85rem; color: var(--text-sub); }

    .dark-toggle {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }
    .dark-toggle:hover { background: var(--primary-light); }

    .main-grid {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 24px;
      align-items: start;
    }
    @media (max-width: 800px) {
      .main-grid { grid-template-columns: 1fr; }
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-title i { color: var(--primary); }

    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 32px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 16px;
    }
    .upload-zone:hover, .upload-zone.dragover {
      border-color: var(--primary);
      background: var(--primary-light);
    }
    .upload-zone i { color: var(--primary); }
    .upload-zone p { color: var(--text-sub); font-size: 0.85rem; margin-top: 6px; }
    .upload-zone .main-text { font-weight: 600; color: var(--text); }

    input[type="file"] { display: none; }

    .image-thumbs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .image-thumb {
      width: 64px;
      height: 64px;
      border-radius: 10px;
      object-fit: cover;
      border: 2px solid var(--border);
      transition: all 0.2s;
    }
    .image-thumb:hover { border-color: var(--primary); }

    .thumb-wrapper {
      position: relative;
      display: inline-block;
    }
    .thumb-remove {
      position: absolute;
      top: -6px;
      right: -6px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #ef4444;
      color: white;
      border: none;
      cursor: pointer;
      font-size: 12px;
      line-height: 20px;
      text-align: center;
      padding: 0;
      font-weight: 700;
    }

    .layouts-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .layout-btn {
      aspect-ratio: 1;
      border-radius: 10px;
      border: 2px solid var(--border);
      background: var(--bg);
      cursor: pointer;
      padding: 6px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .layout-btn:hover, .layout-btn.active {
      border-color: var(--primary);
      background: var(--primary-light);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }
    .layout-btn svg {
      width: 100%;
      height: 100%;
    }
    .layout-btn rect.cell {
      fill: var(--primary);
      opacity: 0.3;
      rx: 2;
    }
    .layout-btn.active rect.cell {
      opacity: 0.6;
    }

    .control-group {
      margin-bottom: 14px;
    }
    .control-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text-sub);
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--primary);
    }

    input[type="color"] {
      width: 48px;
      height: 36px;
      border: 2px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      background: none;
      padding: 2px;
    }

    .color-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .color-row span { font-size: 0.8rem; color: var(--text-sub); }

    .canvas-wrapper {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 300px;
      background: var(--bg);
    }
    .canvas-wrapper canvas {
      max-width: 100%;
      max-height: 600px;
      display: block;
    }

    .btn {
      padding: 12px 24px;
      border-radius: 10px;
      border: none;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s;
      width: 100%;
      justify-content: center;
    }
    .btn-primary {
      background: linear-gradient(135deg, #ec4899, #f472b6);
      color: white;
      box-shadow: 0 4px 16px rgba(236,72,153,0.3);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(236,72,153,0.4); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-success {
      background: linear-gradient(135deg, #22c55e, #4ade80);
      color: white;
      margin-top: 10px;
    }
    .btn-success:hover { transform: translateY(-2px); }

    .info-text {
      font-size: 0.85rem;
      color: var(--text-sub);
      text-align: center;
      padding: 20px;
    }

    .hidden { display: none !important; }

    .layout-label {
      font-size: 0.7rem;
      color: var(--text-sub);
      text-align: center;
      margin-top: 4px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-left">
        <div class="logo"><i data-lucide="layout-grid" style="width:24px;height:24px"></i></div>
        <div>
          <h1>Ghép Ảnh</h1>
          <p>Tạo ảnh ghép với nhiều bố cục đẹp mắt</p>
        </div>
      </div>
      <button class="dark-toggle" onclick="toggleDark()" title="Chế độ tối">
        <i data-lucide="moon" style="width:20px;height:20px"></i>
      </button>
    </div>

    <div class="main-grid">
      <div>
        <div class="card">
          <div class="card-title"><i data-lucide="eye" style="width:20px;height:20px"></i> Xem trước</div>
          <div class="canvas-wrapper">
            <canvas id="collageCanvas" width="800" height="800"></canvas>
          </div>
        </div>
      </div>

      <div>
        <div class="card">
          <div class="card-title"><i data-lucide="images" style="width:20px;height:20px"></i> Tải ảnh (2-9 ảnh)</div>
          <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
            <i data-lucide="plus-circle" style="width:32px;height:32px"></i>
            <p class="main-text">Nhấp hoặc kéo thả ảnh vào đây</p>
            <p id="countLabel">0 / 9 ảnh</p>
          </div>
          <input type="file" id="fileInput" accept="image/*" multiple />
          <div class="image-thumbs" id="thumbs"></div>
        </div>

        <div class="card">
          <div class="card-title"><i data-lucide="layout-template" style="width:20px;height:20px"></i> Bố cục</div>
          <div class="layouts-grid" id="layoutsGrid"></div>
        </div>

        <div class="card">
          <div class="card-title"><i data-lucide="palette" style="width:20px;height:20px"></i> Tùy chỉnh</div>

          <div class="control-group">
            <label>Khoảng cách giữa ảnh: <span id="gapVal">8</span>px</label>
            <input type="range" id="gapSlider" min="0" max="30" value="8" oninput="document.getElementById('gapVal').textContent=this.value;drawCollage()" />
          </div>

          <div class="control-group">
            <label>Bo góc ảnh: <span id="radiusVal">8</span>px</label>
            <input type="range" id="radiusSlider" min="0" max="30" value="8" oninput="document.getElementById('radiusVal').textContent=this.value;drawCollage()" />
          </div>

          <div class="control-group">
            <label>Màu nền</label>
            <div class="color-row">
              <input type="color" id="bgColor" value="#ffffff" oninput="drawCollage()" />
              <span>Nền collage</span>
            </div>
          </div>

          <button class="btn btn-primary" onclick="drawCollage()">
            <i data-lucide="refresh-cw" style="width:18px;height:18px"></i> Tạo lại
          </button>
          <button class="btn btn-success" onclick="downloadCollage()">
            <i data-lucide="download" style="width:18px;height:18px"></i> Tải ảnh ghép
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    function toggleDark() {
      document.body.classList.toggle('dark');
      localStorage.setItem('math-dark', document.body.classList.contains('dark'));
      lucide.createIcons();
    }
    if (localStorage.getItem('math-dark') === 'true') document.body.classList.add('dark');

    var canvas = document.getElementById('collageCanvas');
    var ctx = canvas.getContext('2d');
    var images = [];
    var selectedLayout = 0;

    // Layout definitions: each is an array of {x, y, w, h} in fractions (0-1)
    var layouts = [
      { name: '2x1', min: 2, cells: [{x:0,y:0,w:0.5,h:1},{x:0.5,y:0,w:0.5,h:1}] },
      { name: '1x2', min: 2, cells: [{x:0,y:0,w:1,h:0.5},{x:0,y:0.5,w:1,h:0.5}] },
      { name: '2x2', min: 4, cells: [{x:0,y:0,w:0.5,h:0.5},{x:0.5,y:0,w:0.5,h:0.5},{x:0,y:0.5,w:0.5,h:0.5},{x:0.5,y:0.5,w:0.5,h:0.5}] },
      { name: '1+2', min: 3, cells: [{x:0,y:0,w:1,h:0.5},{x:0,y:0.5,w:0.5,h:0.5},{x:0.5,y:0.5,w:0.5,h:0.5}] },
      { name: '2+1', min: 3, cells: [{x:0,y:0,w:0.5,h:0.5},{x:0.5,y:0,w:0.5,h:0.5},{x:0,y:0.5,w:1,h:0.5}] },
      { name: 'L+2', min: 3, cells: [{x:0,y:0,w:0.6,h:1},{x:0.6,y:0,w:0.4,h:0.5},{x:0.6,y:0.5,w:0.4,h:0.5}] },
      { name: '3x1', min: 3, cells: [{x:0,y:0,w:0.333,h:1},{x:0.333,y:0,w:0.334,h:1},{x:0.667,y:0,w:0.333,h:1}] },
      { name: '3x3', min: 9, cells: (function() {
        var c = [];
        for (var r = 0; r < 3; r++) for (var col = 0; col < 3; col++) c.push({x:col/3,y:r/3,w:1/3,h:1/3});
        return c;
      })() },
      { name: '2+3', min: 5, cells: [{x:0,y:0,w:0.5,h:0.5},{x:0.5,y:0,w:0.5,h:0.5},{x:0,y:0.5,w:0.333,h:0.5},{x:0.333,y:0.5,w:0.334,h:0.5},{x:0.667,y:0.5,w:0.333,h:0.5}] }
    ];

    function buildLayoutThumbs() {
      var grid = document.getElementById('layoutsGrid');
      while (grid.firstChild) grid.removeChild(grid.firstChild);

      layouts.forEach(function(layout, i) {
        var wrapper = document.createElement('div');

        var btn = document.createElement('button');
        btn.className = 'layout-btn' + (i === selectedLayout ? ' active' : '');
        btn.setAttribute('data-index', i);
        btn.addEventListener('click', function() {
          selectedLayout = parseInt(this.getAttribute('data-index'));
          buildLayoutThumbs();
          drawCollage();
        });

        var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        svg.setAttribute('viewBox', '0 0 50 50');

        var gap = 1.5;
        layout.cells.forEach(function(cell) {
          var rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
          rect.setAttribute('class', 'cell');
          rect.setAttribute('x', cell.x * 50 + gap / 2);
          rect.setAttribute('y', cell.y * 50 + gap / 2);
          rect.setAttribute('width', Math.max(cell.w * 50 - gap, 1));
          rect.setAttribute('height', Math.max(cell.h * 50 - gap, 1));
          svg.appendChild(rect);
        });

        btn.appendChild(svg);
        wrapper.appendChild(btn);

        var label = document.createElement('div');
        label.className = 'layout-label';
        label.textContent = layout.name;
        wrapper.appendChild(label);

        grid.appendChild(wrapper);
      });
    }
    buildLayoutThumbs();

    var uploadZone = document.getElementById('uploadZone');
    var fileInput = document.getElementById('fileInput');

    uploadZone.addEventListener('dragover', function(e) { e.preventDefault(); uploadZone.classList.add('dragover'); });
    uploadZone.addEventListener('dragleave', function() { uploadZone.classList.remove('dragover'); });
    uploadZone.addEventListener('drop', function(e) {
      e.preventDefault();
      uploadZone.classList.remove('dragover');
      addFiles(e.dataTransfer.files);
    });

    fileInput.addEventListener('change', function(e) { addFiles(e.target.files); });

    function addFiles(fileObjs) {
      Array.from(fileObjs).forEach(function(file) {
        if (images.length >= 9) return;
        if (!file.type.startsWith('image/')) return;
        var reader = new FileReader();
        reader.onload = function(e) {
          var img = new Image();
          img.onload = function() {
            images.push(img);
            updateThumbs();
            autoSelectLayout();
            drawCollage();
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    function updateThumbs() {
      var container = document.getElementById('thumbs');
      while (container.firstChild) container.removeChild(container.firstChild);

      images.forEach(function(img, i) {
        var wrapper = document.createElement('div');
        wrapper.className = 'thumb-wrapper';

        var thumb = document.createElement('img');
        thumb.className = 'image-thumb';
        thumb.src = img.src;
        wrapper.appendChild(thumb);

        var rm = document.createElement('button');
        rm.className = 'thumb-remove';
        rm.textContent = '\u00D7';
        rm.setAttribute('data-index', i);
        rm.addEventListener('click', function() {
          images.splice(parseInt(this.getAttribute('data-index')), 1);
          updateThumbs();
          autoSelectLayout();
          drawCollage();
        });
        wrapper.appendChild(rm);

        container.appendChild(wrapper);
      });

      document.getElementById('countLabel').textContent = images.length + ' / 9 \u1EA3nh';
    }

    function autoSelectLayout() {
      var n = images.length;
      if (n < 2) return;
      // Find best layout for image count
      var best = 0;
      var bestDiff = 999;
      layouts.forEach(function(l, i) {
        var diff = Math.abs(l.cells.length - n);
        if (diff < bestDiff) {
          bestDiff = diff;
          best = i;
        }
      });
      selectedLayout = best;
      buildLayoutThumbs();
    }

    function drawCollage() {
      var gap = parseInt(document.getElementById('gapSlider').value);
      var radius = parseInt(document.getElementById('radiusSlider').value);
      var bgCol = document.getElementById('bgColor').value;
      var layout = layouts[selectedLayout];
      var size = 800;
      canvas.width = size;
      canvas.height = size;

      ctx.fillStyle = bgCol;
      ctx.fillRect(0, 0, size, size);

      if (images.length === 0) {
        ctx.fillStyle = '#999';
        ctx.font = '600 18px Sora, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('T\u1EA3i \u1EA3nh l\u00EAn \u0111\u1EC3 b\u1EAFt \u0111\u1EA7u', size / 2, size / 2);
        return;
      }

      var cells = layout.cells;
      var halfGap = gap / 2;

      cells.forEach(function(cell, i) {
        if (i >= images.length) return;
        var img = images[i % images.length];

        var cx = cell.x * size + halfGap;
        var cy = cell.y * size + halfGap;
        var cw = cell.w * size - gap;
        var ch = cell.h * size - gap;

        if (cw <= 0 || ch <= 0) return;

        ctx.save();

        // Rounded rectangle clip
        if (radius > 0) {
          ctx.beginPath();
          var r = Math.min(radius, cw / 2, ch / 2);
          ctx.moveTo(cx + r, cy);
          ctx.lineTo(cx + cw - r, cy);
          ctx.quadraticCurveTo(cx + cw, cy, cx + cw, cy + r);
          ctx.lineTo(cx + cw, cy + ch - r);
          ctx.quadraticCurveTo(cx + cw, cy + ch, cx + cw - r, cy + ch);
          ctx.lineTo(cx + r, cy + ch);
          ctx.quadraticCurveTo(cx, cy + ch, cx, cy + ch - r);
          ctx.lineTo(cx, cy + r);
          ctx.quadraticCurveTo(cx, cy, cx + r, cy);
          ctx.closePath();
          ctx.clip();
        }

        // Cover fit
        var imgRatio = img.naturalWidth / img.naturalHeight;
        var cellRatio = cw / ch;
        var sx, sy, sw, sh;

        if (imgRatio > cellRatio) {
          sh = img.naturalHeight;
          sw = sh * cellRatio;
          sx = (img.naturalWidth - sw) / 2;
          sy = 0;
        } else {
          sw = img.naturalWidth;
          sh = sw / cellRatio;
          sx = 0;
          sy = (img.naturalHeight - sh) / 2;
        }

        ctx.drawImage(img, sx, sy, sw, sh, cx, cy, cw, ch);
        ctx.restore();
      });
    }

    function downloadCollage() {
      if (images.length < 2) return;
      var a = document.createElement('a');
      a.download = 'collage.png';
      a.href = canvas.toDataURL('image/png');
      a.click();
    }

    drawCollage();
    lucide.createIcons();
  </script>
</body>
</html>
