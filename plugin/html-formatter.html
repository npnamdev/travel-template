<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Format Code — HTML/CSS/JS Formatter</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <style>
    :root {
      --bg: #f0f9ff;
      --bg-card: #ffffff;
      --bg-input: #f5fbff;
      --text: #0c1e33;
      --text-sub: #5b7a99;
      --primary: #0284c7;
      --primary-light: rgba(2,132,199,0.08);
      --primary-glow: rgba(2,132,199,0.15);
      --accent: #38bdf8;
      --border: rgba(2,132,199,0.1);
      --shadow: 0 1px 3px rgba(2,132,199,0.04), 0 8px 32px rgba(2,132,199,0.06);
      --tab-active: #0284c7;
      --success: #10b981;
    }

    body.dark {
      --bg: #050e18;
      --bg-card: #0c1a2a;
      --bg-input: #0f2035;
      --text: #d6eaff;
      --text-sub: #7aa3c7;
      --primary: #38bdf8;
      --primary-light: rgba(56,189,248,0.1);
      --primary-glow: rgba(56,189,248,0.12);
      --accent: #7dd3fc;
      --border: rgba(56,189,248,0.08);
      --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 8px 32px rgba(0,0,0,0.4);
      --tab-active: #38bdf8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', system-ui, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
      transition: background 0.4s, color 0.4s;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 20px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #0284c7, #38bdf8);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      box-shadow: 0 4px 16px rgba(2,132,199,0.3);
    }

    .logo h1 {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #0284c7, #38bdf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo p { font-size: 0.8rem; color: var(--text-sub); }

    .header-actions { display: flex; gap: 8px; }

    .btn-icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-sub);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .btn-icon:hover {
      background: var(--primary-light);
      color: var(--primary);
      border-color: var(--primary);
      transform: translateY(-1px);
    }

    .card {
      background: var(--bg-card);
      border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      padding: 0;
      overflow: hidden;
      transition: all 0.3s;
    }

    .tabs {
      display: flex;
      border-bottom: 2px solid var(--border);
      background: var(--primary-light);
    }

    .tab {
      flex: 1;
      padding: 14px 20px;
      text-align: center;
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text-sub);
      cursor: pointer;
      border: none;
      background: none;
      position: relative;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .tab:hover { color: var(--primary); }

    .tab.active {
      color: var(--primary);
      font-weight: 700;
    }

    .tab.active::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 10%;
      width: 80%;
      height: 3px;
      background: var(--primary);
      border-radius: 3px 3px 0 0;
    }

    .tab i { width: 16px; height: 16px; }

    .editor-area {
      padding: 20px;
    }

    .code-textarea {
      width: 100%;
      min-height: 300px;
      border: 2px solid var(--border);
      border-radius: 12px;
      background: var(--bg-input);
      padding: 16px;
      font-family: 'Fira Code', monospace;
      font-size: 0.88rem;
      color: var(--text);
      outline: none;
      resize: vertical;
      line-height: 1.7;
      tab-size: 2;
      transition: border-color 0.2s;
    }

    .code-textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px var(--primary-glow);
    }

    .toolbar {
      display: flex;
      gap: 8px;
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
      align-items: center;
    }

    .btn {
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }

    .btn i { width: 16px; height: 16px; }

    .btn-primary {
      background: linear-gradient(135deg, #0284c7, #0ea5e9);
      color: white;
      box-shadow: 0 2px 10px rgba(2,132,199,0.3);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(2,132,199,0.4);
    }

    .btn-secondary {
      background: var(--primary-light);
      color: var(--primary);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--primary);
      color: white;
    }

    .stats-bar {
      margin-left: auto;
      display: flex;
      gap: 16px;
      font-size: 0.8rem;
      color: var(--text-sub);
    }

    .stats-bar span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .stats-bar .val {
      font-weight: 700;
      color: var(--primary);
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      padding: 12px 24px;
      background: var(--success);
      color: white;
      border-radius: 12px;
      font-weight: 600;
      font-size: 0.85rem;
      box-shadow: 0 4px 20px rgba(16,185,129,0.3);
      transition: transform 0.3s ease;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .animate-in { animation: fadeIn 0.4s ease-out; }

    @media (max-width: 600px) {
      .stats-bar { margin-left: 0; width: 100%; justify-content: center; }
      .toolbar { justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <div class="logo-icon"><i data-lucide="code" style="width:24px;height:24px"></i></div>
        <div>
          <h1>Format Code</h1>
          <p>HTML / CSS / JS Formatter & Minifier</p>
        </div>
      </div>
      <div class="header-actions">
        <button class="btn-icon" id="darkToggle" title="Chế độ tối"><i data-lucide="moon" style="width:18px;height:18px"></i></button>
      </div>
    </header>

    <div class="card animate-in">
      <div class="tabs">
        <button class="tab active" data-lang="html"><i data-lucide="file-code"></i> HTML</button>
        <button class="tab" data-lang="css"><i data-lucide="palette"></i> CSS</button>
        <button class="tab" data-lang="js"><i data-lucide="braces"></i> JavaScript</button>
      </div>

      <div class="editor-area">
        <textarea class="code-textarea" id="codeInput" placeholder="Dán code HTML vào đây..." spellcheck="false"></textarea>
      </div>

      <div class="toolbar">
        <button class="btn btn-primary" onclick="formatCode()"><i data-lucide="sparkles"></i> Làm đẹp</button>
        <button class="btn btn-secondary" onclick="minifyCode()"><i data-lucide="minimize-2"></i> Nén code</button>
        <button class="btn btn-secondary" onclick="copyCode()"><i data-lucide="copy"></i> Sao chép</button>
        <button class="btn btn-secondary" onclick="clearCode()"><i data-lucide="trash-2"></i> Xoá</button>
        <div class="stats-bar">
          <span>Trước: <span class="val" id="charsBefore">0</span></span>
          <span>Sau: <span class="val" id="charsAfter">0</span></span>
          <span>Dòng: <span class="val" id="lineCount">0</span></span>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"><i data-lucide="check-circle" style="width:16px;height:16px"></i> <span id="toastMsg">Đã sao chép!</span></div>
  </div>

  <script>
    var currentLang = 'html';
    var originalLength = 0;

    var placeholders = {
      html: 'Dán code HTML vào đây...',
      css: 'Dán code CSS vào đây...',
      js: 'Dán code JavaScript vào đây...'
    };

    // Tab switching
    var tabs = document.querySelectorAll('.tab');
    for (var i = 0; i < tabs.length; i++) {
      tabs[i].addEventListener('click', function() {
        for (var j = 0; j < tabs.length; j++) tabs[j].classList.remove('active');
        this.classList.add('active');
        currentLang = this.getAttribute('data-lang');
        document.getElementById('codeInput').placeholder = placeholders[currentLang];
      });
    }

    var codeInput = document.getElementById('codeInput');
    codeInput.addEventListener('input', function() {
      originalLength = this.value.length;
      updateStats(this.value);
    });

    // Allow tab key in textarea
    codeInput.addEventListener('keydown', function(e) {
      if (e.key === 'Tab') {
        e.preventDefault();
        var start = this.selectionStart;
        var end = this.selectionEnd;
        this.value = this.value.substring(0, start) + '  ' + this.value.substring(end);
        this.selectionStart = this.selectionEnd = start + 2;
      }
    });

    function updateStats(code) {
      document.getElementById('charsAfter').textContent = code.length;
      document.getElementById('charsBefore').textContent = originalLength;
      document.getElementById('lineCount').textContent = code ? code.split('\n').length : 0;
    }

    function formatHTML(code) {
      var result = '';
      var indent = 0;
      var indentStr = '  ';

      // Normalize
      code = code.replace(/>\s+</g, '>\n<').replace(/^\s+/gm, '');

      var lines = code.split('\n');
      var selfClosing = /^<(area|base|br|col|embed|hr|img|input|link|meta|param|source|track|wbr)/i;
      var closing = /^<\//;
      var opening = /^<[a-zA-Z]/;
      var voidTag = /\/\s*>$/;

      for (var i = 0; i < lines.length; i++) {
        var line = lines[i].trim();
        if (!line) continue;

        if (closing.test(line)) {
          indent = Math.max(0, indent - 1);
        }

        var pad = '';
        for (var p = 0; p < indent; p++) pad += indentStr;
        result += pad + line + '\n';

        if (opening.test(line) && !selfClosing.test(line) && !voidTag.test(line) && !closing.test(line) && !line.match(/<\/[^>]+>\s*$/)) {
          indent++;
        }
      }

      return result.trim();
    }

    function formatCSS(code) {
      // Normalize
      code = code.replace(/\s*\{\s*/g, ' {\n').replace(/\s*\}\s*/g, '\n}\n\n').replace(/;\s*/g, ';\n').replace(/^\s+/gm, '');

      var result = '';
      var indent = 0;
      var indentStr = '  ';
      var lines = code.split('\n');

      for (var i = 0; i < lines.length; i++) {
        var line = lines[i].trim();
        if (!line) {
          if (result.slice(-2) !== '\n\n') result += '\n';
          continue;
        }

        if (line === '}') {
          indent = Math.max(0, indent - 1);
        }

        var pad = '';
        for (var p = 0; p < indent; p++) pad += indentStr;
        result += pad + line + '\n';

        if (line.indexOf('{') !== -1 && line.indexOf('}') === -1) {
          indent++;
        }
      }

      return result.trim();
    }

    function formatJS(code) {
      var result = '';
      var indent = 0;
      var indentStr = '  ';

      // Simple split by braces and semicolons
      code = code.replace(/\{/g, ' {\n').replace(/\}/g, '\n}\n').replace(/;(?!\s*\/\/)/g, ';\n').replace(/^\s+/gm, '');

      var lines = code.split('\n');

      for (var i = 0; i < lines.length; i++) {
        var line = lines[i].trim();
        if (!line) continue;

        if (line.charAt(0) === '}') {
          indent = Math.max(0, indent - 1);
        }

        var pad = '';
        for (var p = 0; p < indent; p++) pad += indentStr;
        result += pad + line + '\n';

        if (line.indexOf('{') !== -1 && line.indexOf('}') === -1) {
          indent++;
        }
      }

      return result.trim();
    }

    function formatCode() {
      var code = codeInput.value;
      if (!code.trim()) return;

      originalLength = code.length;
      var formatted;

      if (currentLang === 'html') formatted = formatHTML(code);
      else if (currentLang === 'css') formatted = formatCSS(code);
      else formatted = formatJS(code);

      codeInput.value = formatted;
      updateStats(formatted);
      showToast('Đã làm đẹp code!');
    }

    function minifyCode() {
      var code = codeInput.value;
      if (!code.trim()) return;

      originalLength = code.length;
      var minified;

      if (currentLang === 'html') {
        minified = code.replace(/\s+/g, ' ').replace(/>\s+</g, '><').replace(/\s*=\s*/g, '=').trim();
      } else if (currentLang === 'css') {
        minified = code.replace(/\/\*[\s\S]*?\*\//g, '').replace(/\s+/g, ' ').replace(/\s*\{\s*/g, '{').replace(/\s*\}\s*/g, '}').replace(/\s*;\s*/g, ';').replace(/\s*:\s*/g, ':').replace(/\s*,\s*/g, ',').trim();
      } else {
        minified = code.replace(/\/\/.*$/gm, '').replace(/\/\*[\s\S]*?\*\//g, '').replace(/\s+/g, ' ').replace(/\s*\{\s*/g, '{').replace(/\s*\}\s*/g, '}').replace(/\s*;\s*/g, ';').trim();
      }

      codeInput.value = minified;
      updateStats(minified);
      showToast('Đã nén code!');
    }

    function copyCode() {
      var code = codeInput.value;
      if (!code) return;

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(code).then(function() {
          showToast('Đã sao chép!');
        });
      } else {
        codeInput.select();
        document.execCommand('copy');
        showToast('Đã sao chép!');
      }
    }

    function clearCode() {
      codeInput.value = '';
      originalLength = 0;
      updateStats('');
    }

    function showToast(msg) {
      var toast = document.getElementById('toast');
      document.getElementById('toastMsg').textContent = msg;
      toast.classList.add('show');
      setTimeout(function() { toast.classList.remove('show'); }, 2000);
    }

    // Dark mode
    function initDark() {
      if (localStorage.getItem('math-dark') === 'true') document.body.classList.add('dark');
    }

    document.getElementById('darkToggle').addEventListener('click', function() {
      document.body.classList.toggle('dark');
      localStorage.setItem('math-dark', document.body.classList.contains('dark'));
    });

    initDark();
    lucide.createIcons();
  </script>
</body>
</html>
