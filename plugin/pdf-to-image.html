<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF sang Ảnh — PDF to Image</title>
<meta name="description" content="Chuyển đổi file PDF sang hình ảnh PNG/JPG chất lượng cao. Hỗ trợ tải từng trang hoặc tất cả.">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23dc2626'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-size='14' fill='white'%3E📄%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fef2f2;--surface:#fff;--surface2:#fef2f2;--surface3:#fee2e2;
  --border:#fecaca;--border2:#dc2626;
  --text:#1c1917;--text2:#991b1b;--text3:#dc2626;--text-muted:#78716c;
  --primary:#dc2626;--primary-hover:#b91c1c;--primary-light:#fee2e2;
  --accent:#f59e0b;
  --r:12px;--r2:16px;--r3:24px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.05);
  --shadow2:0 4px 24px rgba(0,0,0,.1);
  --font:'Space Grotesk',sans-serif;
}
.dark{
  --bg:#1a0a0a;--surface:#2a1515;--surface2:#1a0a0a;--surface3:#3a2020;
  --border:#5c2020;--border2:#dc2626;
  --text:#fef2f2;--text2:#fca5a5;--text3:#ef4444;--text-muted:#a8a29e;
  --primary:#ef4444;--primary-hover:#dc2626;--primary-light:#450a0a;
  --shadow:0 1px 3px rgba(0,0,0,.4),0 4px 16px rgba(0,0,0,.3);
  --shadow2:0 4px 24px rgba(0,0,0,.4);
}
html{-webkit-font-smoothing:antialiased;height:100%}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;padding:24px;transition:background .3s,color .3s}

.theme-toggle{
  position:fixed;top:16px;right:16px;z-index:100;
  width:44px;height:44px;border-radius:50%;border:1px solid var(--border);
  background:var(--surface);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:var(--shadow);transition:all .3s;color:var(--text)
}
.theme-toggle:hover{background:var(--surface3);border-color:var(--border2);transform:scale(1.05)}
.theme-toggle svg{width:20px;height:20px}
.dark .theme-toggle .icon-sun{display:none}
:not(.dark) .theme-toggle .icon-moon{display:none}

.container{max-width:900px;margin:0 auto}

.header{text-align:center;margin-bottom:28px;padding-top:20px}
.header-icon{
  width:60px;height:60px;border-radius:16px;
  background:linear-gradient(135deg,var(--primary),#f59e0b);
  display:inline-flex;align-items:center;justify-content:center;
  margin-bottom:12px;box-shadow:0 4px 20px rgba(220,38,38,.3);
}
.header-icon svg{width:28px;height:28px;color:#fff}
.header h1{font-size:1.6rem;font-weight:700;color:var(--text)}
.header p{font-size:.85rem;color:var(--text-muted);margin-top:4px}

.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r3);padding:24px;
  box-shadow:var(--shadow2);margin-bottom:20px;
}

.upload-zone{
  border:2px dashed var(--border);border-radius:var(--r2);
  padding:48px 24px;text-align:center;cursor:pointer;
  transition:all .3s;position:relative;
}
.upload-zone:hover,.upload-zone.dragover{
  border-color:var(--primary);background:var(--primary-light);
}
.upload-zone svg{width:48px;height:48px;color:var(--primary);margin-bottom:12px}
.upload-zone h3{font-size:1.1rem;font-weight:600;margin-bottom:4px}
.upload-zone p{font-size:.8rem;color:var(--text-muted)}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer}

.options-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.option-group{flex:1;min-width:140px}
.option-group label{display:block;font-size:.78rem;font-weight:600;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.option-group select,.option-group input[type=range],.option-group input[type=text]{
  width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--r);
  background:var(--surface2);color:var(--text);font-family:var(--font);font-size:.9rem;
  transition:border-color .2s;
}
.option-group select:focus,.option-group input:focus{outline:none;border-color:var(--primary)}

.quality-val{font-size:.85rem;color:var(--primary);font-weight:600}

.btn{
  padding:12px 24px;border:none;border-radius:var(--r);font-family:var(--font);
  font-weight:600;font-size:.9rem;cursor:pointer;transition:all .2s;
  display:inline-flex;align-items:center;gap:8px;
}
.btn svg{width:18px;height:18px}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-hover);transform:translateY(-1px)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-secondary{background:var(--surface3);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--primary)}

.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}

.file-info{
  display:flex;align-items:center;gap:12px;padding:14px;
  background:var(--surface2);border-radius:var(--r);margin-bottom:16px;
  border:1px solid var(--border);
}
.file-info svg{width:20px;height:20px;color:var(--primary);flex-shrink:0}
.file-info-text .name{font-weight:600;font-size:.9rem}
.file-info-text .meta{font-size:.78rem;color:var(--text-muted)}
.file-info .remove{margin-left:auto;cursor:pointer;color:var(--text-muted);background:none;border:none;padding:4px}
.file-info .remove:hover{color:var(--primary)}

.progress-bar{
  width:100%;height:6px;background:var(--surface3);border-radius:3px;
  overflow:hidden;margin:12px 0;
}
.progress-bar .fill{height:100%;background:var(--primary);border-radius:3px;transition:width .3s;width:0}

.thumbnails{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:16px;margin-top:16px;
}
.thumb-card{
  background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);
  overflow:hidden;transition:all .3s;position:relative;
}
.thumb-card:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:var(--shadow)}
.thumb-card img{width:100%;display:block;aspect-ratio:3/4;object-fit:contain;background:#f5f5f5;padding:4px}
.dark .thumb-card img{background:#1a1a1a}
.thumb-info{padding:10px;display:flex;align-items:center;justify-content:space-between}
.thumb-info span{font-size:.8rem;font-weight:600}
.thumb-dl-btn{
  width:32px;height:32px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--text);transition:all .2s;
}
.thumb-dl-btn:hover{background:var(--primary);color:#fff;border-color:var(--primary)}
.thumb-dl-btn svg{width:16px;height:16px}

.hidden{display:none}

@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .4s ease}

@media(max-width:600px){
  .thumbnails{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
  .options-row{flex-direction:column}
}
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()">
  <i data-lucide="sun" class="icon-sun"></i>
  <i data-lucide="moon" class="icon-moon"></i>
</button>

<div class="container">
  <div class="header">
    <div class="header-icon"><i data-lucide="file-image"></i></div>
    <h1>PDF sang Ảnh</h1>
    <p>Chuyển đổi file PDF sang hình ảnh PNG/JPG chất lượng cao</p>
  </div>

  <div class="card">
    <div class="upload-zone" id="uploadZone">
      <i data-lucide="upload-cloud"></i>
      <h3>Kéo thả file PDF vào đây</h3>
      <p>hoặc nhấn để chọn file</p>
      <input type="file" accept=".pdf" id="fileInput">
    </div>

    <div id="fileInfo" class="hidden"></div>

    <div id="optionsPanel" class="hidden">
      <div class="options-row">
        <div class="option-group">
          <label>Định dạng</label>
          <select id="formatSelect">
            <option value="png">PNG (chất lượng cao)</option>
            <option value="jpeg">JPG (nhỏ gọn)</option>
          </select>
        </div>
        <div class="option-group">
          <label>Chất lượng: <span class="quality-val" id="qualityVal">100%</span></label>
          <input type="range" id="qualitySlider" min="10" max="100" value="100" step="5">
        </div>
        <div class="option-group">
          <label>Phạm vi trang</label>
          <input type="text" id="pageRange" placeholder="VD: 1-3, 5 (trống = tất cả)">
        </div>
      </div>
      <div class="option-group" style="margin-bottom:16px">
        <label>Tỷ lệ phóng to</label>
        <select id="scaleSelect">
          <option value="1">1x (Bình thường)</option>
          <option value="1.5">1.5x</option>
          <option value="2" selected>2x (Khuyến nghị)</option>
          <option value="3">3x (Chất lượng cao)</option>
        </select>
      </div>

      <div class="btn-row">
        <button class="btn btn-primary" id="convertBtn" onclick="convertPDF()">
          <i data-lucide="image"></i> Chuyển đổi
        </button>
        <button class="btn btn-secondary hidden" id="downloadAllBtn" onclick="downloadAll()">
          <i data-lucide="download"></i> Tải tất cả (ZIP)
        </button>
      </div>

      <div class="progress-bar hidden" id="progressBar"><div class="fill" id="progressFill"></div></div>
      <p id="progressText" class="hidden" style="font-size:.82rem;color:var(--text-muted);margin-top:4px"></p>
    </div>
  </div>

  <div id="thumbnailsContainer" class="hidden">
    <div class="card">
      <h3 style="margin-bottom:12px">Kết quả</h3>
      <p style="font-size:.82rem;color:var(--text-muted);margin-bottom:12px" id="resultInfo"></p>
      <div class="thumbnails" id="thumbnails"></div>
    </div>
  </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let pdfDoc=null, pdfFile=null, convertedImages=[];

function toggleTheme(){
  document.body.classList.toggle('dark');
  localStorage.setItem('math-dark',document.body.classList.contains('dark'));
  lucide.createIcons();
}
if(localStorage.getItem('math-dark')==='true') document.body.classList.add('dark');

const uploadZone=document.getElementById('uploadZone');
const fileInput=document.getElementById('fileInput');

['dragover','dragenter'].forEach(function(evt){
  uploadZone.addEventListener(evt,function(e){e.preventDefault();uploadZone.classList.add('dragover')});
});
['dragleave','drop'].forEach(function(evt){
  uploadZone.addEventListener(evt,function(e){e.preventDefault();uploadZone.classList.remove('dragover')});
});
uploadZone.addEventListener('drop',function(e){
  var f=e.dataTransfer.files[0];
  if(f && f.type==='application/pdf') loadPDF(f);
});
fileInput.addEventListener('change',function(e){
  if(e.target.files[0]) loadPDF(e.target.files[0]);
});

document.getElementById('qualitySlider').addEventListener('input',function(e){
  document.getElementById('qualityVal').textContent=e.target.value+'%';
});

async function loadPDF(file){
  pdfFile=file;
  var arrayBuf=await file.arrayBuffer();
  pdfDoc=await pdfjsLib.getDocument({data:arrayBuf}).promise;

  var infoDiv=document.getElementById('fileInfo');
  infoDiv.textContent='';
  var fi=document.createElement('div');
  fi.className='file-info fade-in';

  var icon=document.createElement('i');
  icon.setAttribute('data-lucide','file-text');
  fi.appendChild(icon);

  var textDiv=document.createElement('div');
  textDiv.className='file-info-text';
  var nameEl=document.createElement('div');
  nameEl.className='name';
  nameEl.textContent=file.name;
  var metaEl=document.createElement('div');
  metaEl.className='meta';
  metaEl.textContent=(file.size/1024/1024).toFixed(2)+' MB — '+pdfDoc.numPages+' trang';
  textDiv.appendChild(nameEl);
  textDiv.appendChild(metaEl);
  fi.appendChild(textDiv);

  var removeBtn=document.createElement('button');
  removeBtn.className='remove';
  removeBtn.onclick=resetAll;
  var removeIcon=document.createElement('i');
  removeIcon.setAttribute('data-lucide','x');
  removeBtn.appendChild(removeIcon);
  fi.appendChild(removeBtn);

  infoDiv.appendChild(fi);
  infoDiv.classList.remove('hidden');
  document.getElementById('optionsPanel').classList.remove('hidden');
  uploadZone.classList.add('hidden');
  document.getElementById('thumbnailsContainer').classList.add('hidden');
  document.getElementById('downloadAllBtn').classList.add('hidden');
  convertedImages=[];
  lucide.createIcons();
}

function resetAll(){
  pdfDoc=null;pdfFile=null;convertedImages=[];
  document.getElementById('fileInfo').classList.add('hidden');
  document.getElementById('optionsPanel').classList.add('hidden');
  document.getElementById('thumbnailsContainer').classList.add('hidden');
  uploadZone.classList.remove('hidden');
  fileInput.value='';
}

function parsePageRange(str,max){
  if(!str.trim()) return Array.from({length:max},function(_,i){return i+1});
  var pages=new Set();
  str.split(',').forEach(function(part){
    part=part.trim();
    if(part.indexOf('-')!==-1){
      var ab=part.split('-').map(Number);
      for(var i=Math.max(1,ab[0]);i<=Math.min(max,ab[1]);i++) pages.add(i);
    }else{
      var n=parseInt(part);
      if(n>=1&&n<=max) pages.add(n);
    }
  });
  return Array.from(pages).sort(function(a,b){return a-b});
}

async function convertPDF(){
  if(!pdfDoc) return;
  var format=document.getElementById('formatSelect').value;
  var quality=parseInt(document.getElementById('qualitySlider').value)/100;
  var scale=parseFloat(document.getElementById('scaleSelect').value);
  var rangeStr=document.getElementById('pageRange').value;
  var pages=parsePageRange(rangeStr,pdfDoc.numPages);

  convertedImages=[];
  var thumbnails=document.getElementById('thumbnails');
  thumbnails.textContent='';
  document.getElementById('thumbnailsContainer').classList.remove('hidden');
  document.getElementById('progressBar').classList.remove('hidden');
  document.getElementById('progressText').classList.remove('hidden');
  document.getElementById('convertBtn').disabled=true;

  for(var idx=0;idx<pages.length;idx++){
    var pageNum=pages[idx];
    var page=await pdfDoc.getPage(pageNum);
    var viewport=page.getViewport({scale:scale});
    var canvas=document.createElement('canvas');
    canvas.width=viewport.width;
    canvas.height=viewport.height;
    var ctx=canvas.getContext('2d');
    await page.render({canvasContext:ctx,viewport:viewport}).promise;

    var mimeType=format==='png'?'image/png':'image/jpeg';
    var dataUrl=canvas.toDataURL(mimeType,quality);
    convertedImages.push({pageNum:pageNum,dataUrl:dataUrl,format:format});

    var card=document.createElement('div');
    card.className='thumb-card fade-in';

    var img=document.createElement('img');
    img.src=dataUrl;
    img.alt='Trang '+pageNum;
    card.appendChild(img);

    var info=document.createElement('div');
    info.className='thumb-info';
    var span=document.createElement('span');
    span.textContent='Trang '+pageNum;
    info.appendChild(span);

    var dlBtn=document.createElement('button');
    dlBtn.className='thumb-dl-btn';
    dlBtn.title='Tải xuống';
    dlBtn.setAttribute('data-index',idx);
    dlBtn.onclick=function(){downloadPage(parseInt(this.getAttribute('data-index')))};
    var dlIcon=document.createElement('i');
    dlIcon.setAttribute('data-lucide','download');
    dlBtn.appendChild(dlIcon);
    info.appendChild(dlBtn);

    card.appendChild(info);
    thumbnails.appendChild(card);

    var pct=Math.round(((idx+1)/pages.length)*100);
    document.getElementById('progressFill').style.width=pct+'%';
    document.getElementById('progressText').textContent='Đang xử lý trang '+pageNum+'... ('+(idx+1)+'/'+pages.length+')';
    document.getElementById('resultInfo').textContent=(idx+1)+'/'+pages.length+' trang đã chuyển đổi';
    lucide.createIcons();
  }

  document.getElementById('progressText').textContent='Hoàn tất!';
  document.getElementById('convertBtn').disabled=false;
  document.getElementById('downloadAllBtn').classList.remove('hidden');
  lucide.createIcons();
}

function downloadPage(idx){
  var im=convertedImages[idx];
  var a=document.createElement('a');
  a.href=im.dataUrl;
  a.download='trang-'+im.pageNum+'.'+im.format;
  a.click();
}

async function downloadAll(){
  var zip=new JSZip();
  for(var i=0;i<convertedImages.length;i++){
    var im=convertedImages[i];
    var data=im.dataUrl.split(',')[1];
    zip.file('trang-'+im.pageNum+'.'+im.format,data,{base64:true});
  }
  var blob=await zip.generateAsync({type:'blob'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='pdf-images.zip';
  a.click();
  URL.revokeObjectURL(a.href);
}

lucide.createIcons();
</script>
</body>
</html>
