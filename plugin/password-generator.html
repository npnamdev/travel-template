<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tạo mật khẩu ngẫu nhiên — Password Generator</title>
<meta name="description" content="Công cụ tạo mật khẩu ngẫu nhiên an toàn. Tuỳ chỉnh độ dài, ký tự hoa, thường, số, ký hiệu.">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%236366f1'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-size='18' fill='white'%3E🔑%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#eef2ff;--surface:#fff;--surface2:#f5f3ff;--surface3:#e0e7ff;
  --border:#c7d2fe;--border2:#a5b4fc;
  --text:#1e1b4b;--text2:#4338ca;--text3:#6366f1;--text-muted:#64748b;
  --primary:#6366f1;--primary-hover:#4f46e5;--primary-light:#a5b4fc;
  --accent:#8b5cf6;
  --r:12px;--r2:16px;--r3:20px;
  --shadow:0 1px 3px rgba(99,102,241,.08),0 4px 16px rgba(99,102,241,.06);
  --shadow2:0 4px 24px rgba(99,102,241,.12);
  --font:'Be Vietnam Pro',sans-serif;
  --mono:'JetBrains Mono',monospace;
}

.dark{
  --bg:#0f0d1a;--surface:#1a1730;--surface2:#211e38;--surface3:#2d2952;
  --border:#312e54;--border2:#4338ca;
  --text:#e0e7ff;--text2:#a5b4fc;--text3:#818cf8;--text-muted:#94a3b8;
  --primary:#818cf8;--primary-hover:#6366f1;--primary-light:#4338ca;
  --accent:#a78bfa;
  --shadow:0 1px 3px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.2);
  --shadow2:0 4px 24px rgba(0,0,0,.3);
}

html{-webkit-font-smoothing:antialiased;height:100%}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;transition:background .3s,color .3s}

/* Dark mode toggle */
.theme-toggle{
  position:fixed;top:16px;right:16px;z-index:100;
  width:44px;height:44px;border-radius:50%;border:1px solid var(--border);
  background:var(--surface);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:var(--shadow);transition:all .3s;color:var(--text)
}
.theme-toggle:hover{background:var(--surface2);border-color:var(--border2);transform:scale(1.05)}
.theme-toggle svg{width:20px;height:20px}
.dark .theme-toggle .icon-sun{display:none}
:not(.dark) .theme-toggle .icon-moon{display:none}

/* Card */
.card{
  width:100%;max-width:520px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r3);padding:32px;
  box-shadow:var(--shadow2);
}

/* Header */
.header{text-align:center;margin-bottom:28px}
.header-icon{
  width:56px;height:56px;border-radius:16px;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  display:inline-flex;align-items:center;justify-content:center;
  margin-bottom:12px;box-shadow:0 4px 16px rgba(99,102,241,.3);
}
.header-icon svg{width:28px;height:28px;color:#fff}
.header h1{font-size:1.5rem;font-weight:700;color:var(--text);letter-spacing:-.3px}
.header p{font-size:.85rem;color:var(--text-muted);margin-top:4px}

/* Password display */
.password-display{
  position:relative;background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--r2);padding:20px 56px 20px 20px;margin-bottom:20px;
  min-height:64px;display:flex;align-items:center;
  transition:border-color .2s;
}
.password-display:hover{border-color:var(--border2)}
.password-text{
  font-family:var(--mono);font-size:1.2rem;font-weight:600;
  color:var(--text);word-break:break-all;line-height:1.6;
  user-select:all;width:100%;
}
.copy-btn{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  width:36px;height:36px;border-radius:10px;border:1px solid var(--border);
  background:var(--surface);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;color:var(--text-muted)
}
.copy-btn:hover{background:var(--primary);color:#fff;border-color:var(--primary)}
.copy-btn svg{width:18px;height:18px}

/* Strength bar */
.strength-section{margin-bottom:24px}
.strength-bar-track{
  height:6px;border-radius:3px;background:var(--surface3);overflow:hidden;margin-bottom:8px
}
.strength-bar-fill{
  height:100%;border-radius:3px;transition:width .4s,background .4s;width:0
}
.strength-label{
  font-size:.78rem;font-weight:600;display:flex;justify-content:space-between;align-items:center
}
.strength-label span:first-child{color:var(--text-muted)}

/* Length slider */
.control-group{margin-bottom:20px}
.control-label{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:10px;font-size:.85rem;font-weight:600;color:var(--text)
}
.control-label .value{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;padding:2px 10px;font-family:var(--mono);
  font-size:.85rem;color:var(--primary);min-width:40px;text-align:center
}
input[type=range]{
  -webkit-appearance:none;width:100%;height:6px;border-radius:3px;
  background:var(--surface3);outline:none;transition:background .2s
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:22px;height:22px;border-radius:50%;
  background:var(--primary);cursor:pointer;border:3px solid var(--surface);
  box-shadow:0 2px 8px rgba(99,102,241,.3);transition:transform .15s
}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.15)}
input[type=range]::-moz-range-thumb{
  width:22px;height:22px;border-radius:50%;
  background:var(--primary);cursor:pointer;border:3px solid var(--surface);
  box-shadow:0 2px 8px rgba(99,102,241,.3)
}

/* Checkboxes */
.options-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px
}
.option-item{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;border-radius:var(--r);
  background:var(--surface2);border:1px solid var(--border);
  cursor:pointer;transition:all .2s;user-select:none
}
.option-item:hover{border-color:var(--border2);background:var(--surface3)}
.option-item.checked{border-color:var(--primary);background:rgba(99,102,241,.06)}
.dark .option-item.checked{background:rgba(129,140,248,.1)}
.checkbox{
  width:20px;height:20px;border-radius:6px;border:2px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;flex-shrink:0
}
.option-item.checked .checkbox{
  background:var(--primary);border-color:var(--primary)
}
.checkbox svg{width:14px;height:14px;color:#fff;opacity:0;transition:opacity .15s}
.option-item.checked .checkbox svg{opacity:1}
.option-label{font-size:.82rem;font-weight:500;color:var(--text)}

/* Generate button */
.generate-btn{
  width:100%;padding:14px;border:none;border-radius:var(--r2);
  background:linear-gradient(135deg,var(--primary),var(--accent));
  color:#fff;font-family:var(--font);font-size:.95rem;font-weight:600;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .2s;box-shadow:0 4px 16px rgba(99,102,241,.3)
}
.generate-btn:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(99,102,241,.4)}
.generate-btn:active{transform:translateY(0)}
.generate-btn svg{width:20px;height:20px}

/* Toast */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:12px 20px;
  box-shadow:var(--shadow2);display:flex;align-items:center;gap:8px;
  font-size:.85rem;font-weight:500;color:var(--text);
  transition:transform .3s cubic-bezier(.4,0,.2,1),opacity .3s;opacity:0;z-index:200
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast svg{width:18px;height:18px;color:#22c55e;flex-shrink:0}

/* Responsive */
@media(max-width:560px){
  body{padding:16px}
  .card{padding:24px 20px}
  .password-text{font-size:1rem}
  .options-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<button class="theme-toggle" id="themeToggle" type="button" aria-label="Chuyển đổi giao diện">
  <i data-lucide="sun" class="icon-sun"></i>
  <i data-lucide="moon" class="icon-moon"></i>
</button>

<div class="card">
  <div class="header">
    <div class="header-icon"><i data-lucide="key-round"></i></div>
    <h1>Tạo mật khẩu</h1>
    <p>Tạo mật khẩu ngẫu nhiên, an toàn và mạnh mẽ</p>
  </div>

  <div class="password-display">
    <div class="password-text" id="passwordText">—</div>
    <button class="copy-btn" id="copyBtn" type="button" aria-label="Sao chép mật khẩu">
      <i data-lucide="copy"></i>
    </button>
  </div>

  <div class="strength-section">
    <div class="strength-bar-track">
      <div class="strength-bar-fill" id="strengthBar"></div>
    </div>
    <div class="strength-label">
      <span>Độ mạnh</span>
      <span id="strengthText" style="color:var(--text-muted)">—</span>
    </div>
  </div>

  <div class="control-group">
    <div class="control-label">
      <span>Độ dài mật khẩu</span>
      <span class="value" id="lengthValue">16</span>
    </div>
    <input type="range" id="lengthSlider" min="8" max="64" value="16">
  </div>

  <div class="options-grid" id="optionsGrid">
    <label class="option-item checked" data-key="uppercase">
      <span class="checkbox"><i data-lucide="check"></i></span>
      <span class="option-label">Chữ hoa (A-Z)</span>
      <input type="checkbox" checked hidden>
    </label>
    <label class="option-item checked" data-key="lowercase">
      <span class="checkbox"><i data-lucide="check"></i></span>
      <span class="option-label">Chữ thường (a-z)</span>
      <input type="checkbox" checked hidden>
    </label>
    <label class="option-item checked" data-key="numbers">
      <span class="checkbox"><i data-lucide="check"></i></span>
      <span class="option-label">Chữ số (0-9)</span>
      <input type="checkbox" checked hidden>
    </label>
    <label class="option-item checked" data-key="symbols">
      <span class="checkbox"><i data-lucide="check"></i></span>
      <span class="option-label">Ký hiệu (!@#$)</span>
      <input type="checkbox" checked hidden>
    </label>
  </div>

  <button class="generate-btn" id="generateBtn" type="button">
    <i data-lucide="refresh-cw"></i>
    Tạo mật khẩu mới
  </button>
</div>

<div class="toast" id="toast">
  <i data-lucide="check-circle-2"></i>
  <span>Đã sao chép mật khẩu!</span>
</div>

<script>
(function(){
  'use strict';

  const CHARSETS = {
    uppercase: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
    lowercase: 'abcdefghijklmnopqrstuvwxyz',
    numbers: '0123456789',
    symbols: '!@#$%^&*()_+-=[]{}|;:,.<>?'
  };

  const STRENGTH_LEVELS = [
    { label: 'Yếu', color: '#ef4444', width: '25%' },
    { label: 'Trung bình', color: '#f59e0b', width: '50%' },
    { label: 'Mạnh', color: '#22c55e', width: '75%' },
    { label: 'Rất mạnh', color: '#06b6d4', width: '100%' }
  ];

  const els = {
    passwordText: document.getElementById('passwordText'),
    copyBtn: document.getElementById('copyBtn'),
    strengthBar: document.getElementById('strengthBar'),
    strengthText: document.getElementById('strengthText'),
    lengthSlider: document.getElementById('lengthSlider'),
    lengthValue: document.getElementById('lengthValue'),
    optionsGrid: document.getElementById('optionsGrid'),
    generateBtn: document.getElementById('generateBtn'),
    themeToggle: document.getElementById('themeToggle'),
    toast: document.getElementById('toast')
  };

  // Dark mode
  function applyTheme(dark) {
    document.documentElement.classList.toggle('dark', dark);
    try { localStorage.setItem('math-dark', dark ? '1' : '0'); } catch(e) {}
  }

  function initTheme() {
    try {
      var stored = localStorage.getItem('math-dark');
      if (stored === '1') applyTheme(true);
      else if (stored === '0') applyTheme(false);
      else applyTheme(window.matchMedia('(prefers-color-scheme: dark)').matches);
    } catch(e) {
      applyTheme(false);
    }
  }

  initTheme();
  els.themeToggle.addEventListener('click', function() {
    applyTheme(!document.documentElement.classList.contains('dark'));
    lucide.createIcons();
  });

  // Options state
  function getOptions() {
    var opts = {};
    var items = els.optionsGrid.querySelectorAll('.option-item');
    items.forEach(function(item) {
      opts[item.dataset.key] = item.querySelector('input').checked;
    });
    return opts;
  }

  // Toggle checkboxes
  els.optionsGrid.addEventListener('change', function(e) {
    var item = e.target.closest('.option-item');
    if (!item) return;
    var checked = item.querySelector('input').checked;
    item.classList.toggle('checked', checked);

    // Ensure at least one option is checked
    var opts = getOptions();
    var anyChecked = Object.values(opts).some(function(v) { return v; });
    if (!anyChecked) {
      item.querySelector('input').checked = true;
      item.classList.add('checked');
      return;
    }
    generate();
  });

  // Slider
  els.lengthSlider.addEventListener('input', function() {
    els.lengthValue.textContent = this.value;
    generate();
  });

  // Generate password
  function generate() {
    var opts = getOptions();
    var charset = '';
    Object.keys(CHARSETS).forEach(function(key) {
      if (opts[key]) charset += CHARSETS[key];
    });

    if (!charset) return;

    var length = parseInt(els.lengthSlider.value, 10);
    var array = new Uint32Array(length);
    crypto.getRandomValues(array);

    var password = '';
    for (var i = 0; i < length; i++) {
      password += charset[array[i] % charset.length];
    }

    els.passwordText.textContent = password;
    updateStrength(password, opts);
  }

  // Strength calculation
  function updateStrength(password, opts) {
    var poolSize = 0;
    if (opts.uppercase) poolSize += 26;
    if (opts.lowercase) poolSize += 26;
    if (opts.numbers) poolSize += 10;
    if (opts.symbols) poolSize += CHARSETS.symbols.length;

    var entropy = password.length * Math.log2(poolSize || 1);
    var level;
    if (entropy < 40) level = 0;
    else if (entropy < 60) level = 1;
    else if (entropy < 80) level = 2;
    else level = 3;

    var s = STRENGTH_LEVELS[level];
    els.strengthBar.style.width = s.width;
    els.strengthBar.style.background = s.color;
    els.strengthText.textContent = s.label;
    els.strengthText.style.color = s.color;
  }

  // Copy
  var toastTimer;
  els.copyBtn.addEventListener('click', function() {
    var pw = els.passwordText.textContent;
    if (!pw || pw === '—') return;

    navigator.clipboard.writeText(pw).then(function() {
      showToast();
    }).catch(function() {
      // Fallback
      var ta = document.createElement('textarea');
      ta.value = pw;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast();
    });
  });

  function showToast() {
    clearTimeout(toastTimer);
    els.toast.classList.add('show');
    toastTimer = setTimeout(function() {
      els.toast.classList.remove('show');
    }, 2000);
  }

  // Generate button
  els.generateBtn.addEventListener('click', generate);

  // Init
  lucide.createIcons();
  generate();
})();
</script>
</body>
</html>
