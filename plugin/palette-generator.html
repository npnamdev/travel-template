<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tạo Bảng Màu — Palette Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
  :root {
    --bg: #faf9fb;
    --surface: #ffffff;
    --text: #1e1b2e;
    --text-secondary: #6b7280;
    --border: #e5e7eb;
    --shadow: 0 8px 32px rgba(0,0,0,0.08);
    --radius: 20px;
    --accent: #8b5cf6;
  }
  .dark {
    --bg: #0c0a14;
    --surface: #16132a;
    --text: #e8e4f0;
    --text-secondary: #a78bfa;
    --border: #2e2750;
    --shadow: 0 8px 32px rgba(139,92,246,0.15);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; transition: all 0.3s;
  }
  .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
  header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 24px 0; margin-bottom: 32px;
  }
  header h1 {
    font-size: 2rem; font-weight: 700;
    background: linear-gradient(135deg, #ef4444, #f59e0b, #22c55e, #3b82f6, #8b5cf6);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    display: flex; align-items: center; gap: 12px;
  }
  header h1 i { -webkit-text-fill-color: #8b5cf6; color: #8b5cf6; }
  .dark-toggle {
    background: var(--surface); border: 2px solid var(--border);
    border-radius: 50px; padding: 10px 16px; cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    color: var(--text); font-family: inherit; font-weight: 600;
    transition: all 0.3s;
  }
  .dark-toggle:hover { border-color: var(--accent); }
  .controls {
    display: flex; gap: 16px; align-items: center; flex-wrap: wrap;
    margin-bottom: 32px; background: var(--surface);
    padding: 20px; border-radius: var(--radius);
    border: 2px solid var(--border); box-shadow: var(--shadow);
  }
  .controls label { font-weight: 600; font-size: 0.9rem; }
  .color-input-wrap {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg); border-radius: 12px; padding: 4px 12px 4px 4px;
    border: 2px solid var(--border);
  }
  .color-input-wrap input[type="color"] {
    width: 48px; height: 40px; border: none; cursor: pointer;
    border-radius: 8px; background: none;
  }
  .color-input-wrap input[type="text"] {
    width: 90px; border: none; background: transparent;
    font-family: inherit; font-size: 1rem; font-weight: 600;
    color: var(--text); outline: none; text-transform: uppercase;
  }
  .btn {
    padding: 12px 20px; border: none; border-radius: 12px;
    font-family: inherit; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    transition: all 0.2s; font-size: 0.9rem;
  }
  .btn-random {
    background: linear-gradient(135deg, #8b5cf6, #ec4899);
    color: white;
  }
  .btn-random:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(139,92,246,0.4); }
  .btn-export {
    background: var(--bg); color: var(--text); border: 2px solid var(--border);
  }
  .btn-export:hover { border-color: var(--accent); }
  .harmony-section { margin-bottom: 28px; }
  .harmony-title {
    font-size: 1.1rem; font-weight: 700; margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .harmony-badge {
    font-size: 0.7rem; padding: 3px 10px; border-radius: 20px;
    background: var(--accent); color: white; font-weight: 600;
  }
  .palette-row {
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .swatch {
    flex: 1; min-width: 100px; height: 100px; border-radius: 16px;
    cursor: pointer; position: relative; transition: all 0.2s;
    display: flex; align-items: flex-end; justify-content: center;
    padding-bottom: 10px; font-size: 0.8rem; font-weight: 700;
    color: white; text-shadow: 0 1px 4px rgba(0,0,0,0.4);
    border: 3px solid transparent;
  }
  .swatch:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.2); border-color: white; }
  .swatch::after {
    content: 'Sao chép'; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%); opacity: 0;
    background: rgba(0,0,0,0.6); padding: 4px 12px; border-radius: 8px;
    font-size: 0.75rem; transition: opacity 0.2s;
  }
  .swatch:hover::after { opacity: 1; }
  @media (max-width: 600px) {
    .swatch { min-width: 60px; height: 70px; font-size: 0.65rem; }
    .palette-row { gap: 4px; }
  }
  .export-modal {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6); z-index: 100;
    align-items: center; justify-content: center;
  }
  .export-modal.active { display: flex; }
  .export-content {
    background: var(--surface); border-radius: var(--radius);
    padding: 32px; max-width: 600px; width: 90%;
    max-height: 80vh; overflow-y: auto;
    border: 2px solid var(--border);
  }
  .export-content h3 { margin-bottom: 16px; color: var(--accent); }
  .export-content pre {
    background: var(--bg); padding: 16px; border-radius: 12px;
    font-size: 0.8rem; white-space: pre-wrap; word-break: break-all;
    border: 2px solid var(--border); color: var(--text);
  }
  .export-content .btn { margin-top: 12px; }
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--accent); color: white;
    padding: 12px 24px; border-radius: 12px;
    font-weight: 600; transform: translateY(100px);
    transition: transform 0.3s; z-index: 999;
  }
  .toast.show { transform: translateY(0); }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1><i data-lucide="palette" style="width:28px;height:28px"></i> Tạo Bảng Màu</h1>
    <button class="dark-toggle" onclick="toggleDark()">
      <i data-lucide="moon" style="width:18px;height:18px"></i>
      <span id="darkLabel">Tối</span>
    </button>
  </header>
  <div class="controls">
    <label>Màu gốc:</label>
    <div class="color-input-wrap">
      <input type="color" id="baseColor" value="#8b5cf6" onchange="syncHex(this.value); generate()">
      <input type="text" id="hexInput" value="#8B5CF6" oninput="syncColor(this.value)">
    </div>
    <button class="btn btn-random" onclick="randomColor()">
      <i data-lucide="shuffle" style="width:16px;height:16px"></i> Ngẫu nhiên
    </button>
    <button class="btn btn-export" onclick="showExport()">
      <i data-lucide="download" style="width:16px;height:16px"></i> Xuất CSS
    </button>
  </div>
  <div id="palettes"></div>
</div>

<div class="export-modal" id="exportModal" onclick="if(event.target===this)this.classList.remove('active')">
  <div class="export-content">
    <h3><i data-lucide="code" style="width:20px;height:20px;vertical-align:middle"></i> CSS Variables</h3>
    <pre id="exportCode"></pre>
    <button class="btn btn-random" onclick="copyExport()">
      <i data-lucide="copy" style="width:16px;height:16px"></i> Sao chép
    </button>
  </div>
</div>
<div class="toast" id="toast">Đã sao chép!</div>

<script>
var allPalettes = {};

function hexToHsl(hex) {
  hex = hex.replace('#','');
  var r = parseInt(hex.substring(0,2),16)/255;
  var g = parseInt(hex.substring(2,4),16)/255;
  var b = parseInt(hex.substring(4,6),16)/255;
  var max = Math.max(r,g,b), min = Math.min(r,g,b);
  var h, s, l = (max+min)/2;
  if (max===min) { h=s=0; }
  else {
    var d = max - min;
    s = l > 0.5 ? d/(2-max-min) : d/(max+min);
    switch(max) {
      case r: h = ((g-b)/d + (g<b?6:0))/6; break;
      case g: h = ((b-r)/d + 2)/6; break;
      case b: h = ((r-g)/d + 4)/6; break;
    }
  }
  return [Math.round(h*360), Math.round(s*100), Math.round(l*100)];
}

function hslToHex(h, s, l) {
  h = ((h % 360) + 360) % 360;
  s = Math.max(0, Math.min(100, s)) / 100;
  l = Math.max(0, Math.min(100, l)) / 100;
  var a = s * Math.min(l, 1-l);
  function f(n) {
    var k = (n + h/30) % 12;
    var color = l - a * Math.max(Math.min(k-3, 9-k, 1), -1);
    return Math.round(255 * color).toString(16).padStart(2, '0');
  }
  return '#' + f(0) + f(8) + f(4);
}

function generateHarmonies(hex) {
  var hsl = hexToHsl(hex);
  var h = hsl[0], s = hsl[1], l = hsl[2];
  return {
    'Bổ sung (Complementary)': [
      hslToHex(h, s, l),
      hslToHex(h, s-10, l+15),
      hslToHex(h+180, s, l),
      hslToHex(h+180, s-10, l+15),
      hslToHex(h+180, s-20, l+25)
    ],
    'Tương tự (Analogous)': [
      hslToHex(h-30, s, l),
      hslToHex(h-15, s, l),
      hslToHex(h, s, l),
      hslToHex(h+15, s, l),
      hslToHex(h+30, s, l)
    ],
    'Bộ ba (Triadic)': [
      hslToHex(h, s, l),
      hslToHex(h, s-15, l+20),
      hslToHex(h+120, s, l),
      hslToHex(h+240, s, l),
      hslToHex(h+240, s-15, l+20)
    ],
    'Chia bổ sung (Split-Complementary)': [
      hslToHex(h, s, l),
      hslToHex(h, s-10, l+15),
      hslToHex(h+150, s, l),
      hslToHex(h+210, s, l),
      hslToHex(h+180, s-20, l+25)
    ],
    'Bộ bốn (Tetradic)': [
      hslToHex(h, s, l),
      hslToHex(h+90, s, l),
      hslToHex(h+180, s, l),
      hslToHex(h+270, s, l),
      hslToHex(h+45, s-15, l+15)
    ]
  };
}

function generate() {
  var hex = document.getElementById('baseColor').value;
  allPalettes = generateHarmonies(hex);
  var container = document.getElementById('palettes');
  while (container.firstChild) container.removeChild(container.firstChild);

  var types = Object.keys(allPalettes);
  types.forEach(function(type) {
    var section = document.createElement('div');
    section.className = 'harmony-section';

    var title = document.createElement('div');
    title.className = 'harmony-title';
    var badge = document.createElement('span');
    badge.className = 'harmony-badge';
    badge.textContent = '5 màu';
    title.textContent = type + ' ';
    title.appendChild(badge);
    section.appendChild(title);

    var row = document.createElement('div');
    row.className = 'palette-row';
    allPalettes[type].forEach(function(color) {
      var swatch = document.createElement('div');
      swatch.className = 'swatch';
      swatch.style.background = color;
      swatch.textContent = color.toUpperCase();
      swatch.onclick = function() { copySwatch(color); };
      row.appendChild(swatch);
    });
    section.appendChild(row);
    container.appendChild(section);
  });
}

function copySwatch(color) {
  navigator.clipboard.writeText(color);
  showToast('Đã sao chép ' + color);
}

function syncHex(val) {
  document.getElementById('hexInput').value = val.toUpperCase();
}
function syncColor(val) {
  if (/^#[0-9a-fA-F]{6}$/.test(val)) {
    document.getElementById('baseColor').value = val;
    generate();
  }
}

function randomColor() {
  var hex = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
  document.getElementById('baseColor').value = hex;
  document.getElementById('hexInput').value = hex.toUpperCase();
  generate();
}

function showExport() {
  var lines = ':root {\n';
  var types = Object.keys(allPalettes);
  types.forEach(function(type) {
    var slug = type.split('(')[1].replace(')','').replace(/-/g,'').trim().toLowerCase().replace(/\s+/g,'-');
    allPalettes[type].forEach(function(color, i) {
      lines += '  --' + slug + '-' + (i+1) + ': ' + color + ';\n';
    });
    lines += '\n';
  });
  lines += '}';
  document.getElementById('exportCode').textContent = lines;
  document.getElementById('exportModal').classList.add('active');
  lucide.createIcons();
}

function copyExport() {
  navigator.clipboard.writeText(document.getElementById('exportCode').textContent);
  showToast('Đã sao chép CSS!');
}

function showToast(msg) {
  var toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(function() { toast.classList.remove('show'); }, 1500);
}

function toggleDark() {
  document.body.classList.toggle('dark');
  var isDark = document.body.classList.contains('dark');
  localStorage.setItem('math-dark', isDark);
  document.getElementById('darkLabel').textContent = isDark ? 'Sáng' : 'Tối';
  lucide.createIcons();
}

if (localStorage.getItem('math-dark') === 'true') {
  document.body.classList.add('dark');
  document.getElementById('darkLabel').textContent = 'Sáng';
}

generate();
lucide.createIcons();
</script>
</body>
</html>
