<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dem Nguoc — Event Countdown</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        :root {
            --orange: #ea580c;
            --orange-light: #fb923c;
            --orange-dark: #c2410c;
            --orange-50: #fff7ed;
            --orange-100: #ffedd5;
            --bg: #fffaf5;
            --bg-card: #ffffff;
            --text: #1c1917;
            --text-secondary: #78716c;
            --border: #fed7aa;
            --shadow: 0 4px 24px rgba(234, 88, 12, 0.08);
            --shadow-lg: 0 12px 40px rgba(234, 88, 12, 0.15);
        }
        .dark {
            --bg: #0c0a09;
            --bg-card: #1c1410;
            --text: #fef3c7;
            --text-secondary: #fdba74;
            --border: #431407;
            --shadow: 0 4px 24px rgba(234, 88, 12, 0.15);
            --shadow-lg: 0 12px 40px rgba(234, 88, 12, 0.25);
            --orange-50: #1a0e06;
            --orange-100: #261408;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }
        .header {
            background: linear-gradient(135deg, var(--orange), var(--orange-dark));
            padding: 1.5rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 20px rgba(234, 88, 12, 0.3);
        }
        .header-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .header-actions { display: flex; gap: 0.5rem; }
        .dark-toggle, .share-btn-header {
            background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.3);
            color: #fff;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        .dark-toggle:hover, .share-btn-header:hover { background: rgba(255,255,255,0.25); }
        .container { max-width: 960px; margin: 0 auto; padding: 2rem 1rem; }

        /* Form */
        .form-card {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
        }
        .form-card h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--orange);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .form-full { grid-template-columns: 1fr; }
        .form-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.35rem;
            display: block;
        }
        .form-input {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            padding: 0.7rem 1rem;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: var(--orange-50);
            color: var(--text);
            width: 100%;
            outline: none;
            transition: all 0.3s;
        }
        .form-input:focus { border-color: var(--orange); box-shadow: 0 0 0 4px rgba(234,88,12,0.12); }
        .form-actions { display: flex; gap: 0.75rem; flex-wrap: wrap; }
        .btn {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            padding: 0.7rem 1.5rem;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--orange), var(--orange-dark));
            color: #fff;
            box-shadow: 0 4px 15px rgba(234,88,12,0.3);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(234,88,12,0.4); }
        .btn-outline {
            background: var(--orange-50);
            color: var(--orange);
            border: 2px solid var(--border);
        }
        .btn-outline:hover { background: var(--orange-100); }

        /* Presets */
        .presets {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }
        .preset-chip {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 0.4rem 0.9rem;
            border: 2px solid var(--border);
            border-radius: 20px;
            background: var(--orange-50);
            color: var(--orange);
            cursor: pointer;
            transition: all 0.3s;
        }
        .preset-chip:hover { background: var(--orange); color: #fff; }

        /* Flip clock */
        .countdown-card {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: var(--shadow-lg);
            margin-bottom: 1.5rem;
            position: relative;
            overflow: hidden;
        }
        .countdown-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--orange), var(--orange-light));
        }
        .countdown-name {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 0.5rem;
            color: var(--orange);
        }
        .countdown-target {
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            font-weight: 500;
        }
        .flip-clock {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .flip-unit {
            text-align: center;
        }
        .flip-digits {
            display: flex;
            gap: 4px;
        }
        .flip-digit {
            width: 56px;
            height: 80px;
            position: relative;
            perspective: 400px;
        }
        .flip-digit-inner {
            width: 100%;
            height: 100%;
            position: relative;
        }
        .flip-top, .flip-bottom {
            position: absolute;
            width: 100%;
            height: 50%;
            overflow: hidden;
            background: linear-gradient(180deg, var(--orange-dark), var(--orange));
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .flip-top {
            top: 0;
            border-radius: 10px 10px 0 0;
            border-bottom: 1px solid rgba(0,0,0,0.15);
        }
        .flip-bottom {
            bottom: 0;
            border-radius: 0 0 10px 10px;
        }
        .flip-top span, .flip-bottom span {
            font-family: 'Outfit', sans-serif;
            font-size: 2.8rem;
            font-weight: 900;
            color: #fff;
            line-height: 80px;
        }
        .flip-top span { transform: translateY(25%); }
        .flip-bottom span { transform: translateY(-25%); }

        /* Flip animation overlay */
        .flip-card {
            position: absolute;
            width: 100%;
            height: 50%;
            top: 0;
            transform-origin: bottom;
            transform-style: preserve-3d;
            z-index: 2;
        }
        .flip-card.flipping {
            animation: flipTop 0.6s ease-in-out;
        }
        .flip-card .flip-card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px 10px 0 0;
        }
        .flip-card .flip-card-front {
            background: linear-gradient(180deg, var(--orange-dark), var(--orange));
        }
        .flip-card .flip-card-back {
            background: linear-gradient(180deg, var(--orange), var(--orange-dark));
            transform: rotateX(180deg);
        }
        .flip-card .flip-card-face span {
            font-family: 'Outfit', sans-serif;
            font-size: 2.8rem;
            font-weight: 900;
            color: #fff;
            line-height: 80px;
            transform: translateY(25%);
        }

        @keyframes flipTop {
            0% { transform: rotateX(0deg); }
            100% { transform: rotateX(-180deg); }
        }

        .flip-unit-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-secondary);
            margin-top: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .flip-separator {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--orange);
            align-self: center;
            padding-bottom: 1.5rem;
            animation: blink 1s step-end infinite;
        }
        @keyframes blink { 50% { opacity: 0.3; } }

        .countdown-actions {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
        }
        .btn-sm {
            font-size: 0.85rem;
            padding: 0.5rem 1rem;
            border-radius: 10px;
        }
        .btn-danger {
            background: #fecaca;
            color: #dc2626;
            border: 2px solid #fca5a5;
        }
        .dark .btn-danger { background: #450a0a; border-color: #7f1d1d; }
        .btn-danger:hover { background: #dc2626; color: #fff; }

        .expired {
            text-align: center;
            padding: 1rem;
            font-family: 'Outfit', sans-serif;
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--orange);
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-secondary);
        }
        .empty-state i { margin-bottom: 1rem; color: var(--border); }
        .empty-state p { font-size: 1.1rem; font-weight: 600; }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--orange);
            color: #fff;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            box-shadow: 0 8px 25px rgba(234,88,12,0.4);
            transition: transform 0.3s ease;
            z-index: 100;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        @media (max-width: 600px) {
            .header-title { font-size: 1.3rem; }
            .form-row { grid-template-columns: 1fr; }
            .flip-digit { width: 40px; height: 60px; }
            .flip-top span, .flip-bottom span,
            .flip-card .flip-card-face span { font-size: 2rem; line-height: 60px; }
            .flip-separator { font-size: 1.8rem; }
            .flip-clock { gap: 0.5rem; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">
            <i data-lucide="timer" style="width:28px;height:28px"></i>
            Dem Nguoc
        </div>
        <div class="header-actions">
            <button class="dark-toggle" onclick="toggleDark()" title="Che do toi">
                <i data-lucide="moon" style="width:20px;height:20px"></i>
            </button>
        </div>
    </div>

    <div class="container">
        <div class="form-card">
            <h2><i data-lucide="plus-circle" style="width:22px;height:22px"></i> Tao dem nguoc moi</h2>
            <div class="presets" id="presets"></div>
            <div class="form-row form-full">
                <div>
                    <label class="form-label">Ten su kien</label>
                    <input type="text" class="form-input" id="eventName" placeholder="VD: Sinh nhat, Ky nghi...">
                </div>
            </div>
            <div class="form-row">
                <div>
                    <label class="form-label">Ngay</label>
                    <input type="date" class="form-input" id="eventDate">
                </div>
                <div>
                    <label class="form-label">Gio</label>
                    <input type="time" class="form-input" id="eventTime" value="00:00">
                </div>
            </div>
            <div class="form-actions">
                <button class="btn btn-primary" onclick="addCountdown()">
                    <i data-lucide="plus" style="width:18px;height:18px"></i> Them dem nguoc
                </button>
            </div>
        </div>

        <div id="countdownList"></div>
        <div class="empty-state" id="emptyState">
            <i data-lucide="clock" style="width:64px;height:64px"></i>
            <p>Chua co dem nguoc nao. Hay tao mot cai!</p>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // Dark mode
        function toggleDark() {
            document.body.classList.toggle('dark');
            localStorage.setItem('math-dark', document.body.classList.contains('dark'));
        }
        if (localStorage.getItem('math-dark') === 'true') document.body.classList.add('dark');

        // Toast
        function showToast(msg) {
            var toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(function() { toast.classList.remove('show'); }, 2500);
        }

        // Data
        var STORAGE_KEY = 'countdown-events';
        function loadEvents() {
            try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
            catch(e) { return []; }
        }
        function saveEvents(events) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(events));
        }

        // Presets
        var presets = [
            { name: 'Tet Nguyen Dan 2027', date: '2027-01-23', time: '00:00' },
            { name: 'Giang Sinh 2026', date: '2026-12-25', time: '00:00' },
            { name: 'Nam Moi 2027', date: '2027-01-01', time: '00:00' }
        ];

        function renderPresets() {
            var container = document.getElementById('presets');
            container.textContent = '';
            presets.forEach(function(p) {
                var chip = document.createElement('button');
                chip.className = 'preset-chip';
                chip.textContent = p.name;
                chip.addEventListener('click', function() {
                    document.getElementById('eventName').value = p.name;
                    document.getElementById('eventDate').value = p.date;
                    document.getElementById('eventTime').value = p.time;
                });
                container.appendChild(chip);
            });
        }

        function addCountdown() {
            var name = document.getElementById('eventName').value.trim();
            var date = document.getElementById('eventDate').value;
            var time = document.getElementById('eventTime').value || '00:00';
            if (!name || !date) {
                showToast('Vui long nhap ten su kien va ngay!');
                return;
            }
            var events = loadEvents();
            events.push({ id: Date.now(), name: name, date: date, time: time });
            saveEvents(events);
            document.getElementById('eventName').value = '';
            document.getElementById('eventDate').value = '';
            document.getElementById('eventTime').value = '00:00';
            renderCountdowns();
            showToast('Da them dem nguoc!');
        }

        function removeCountdown(id) {
            var events = loadEvents().filter(function(e) { return e.id !== id; });
            saveEvents(events);
            renderCountdowns();
            showToast('Da xoa dem nguoc!');
        }

        function shareCountdown(event) {
            var params = new URLSearchParams({
                name: event.name,
                date: event.date,
                time: event.time
            });
            var url = window.location.origin + window.location.pathname + '?' + params.toString();
            navigator.clipboard.writeText(url).then(function() {
                showToast('Da sao chep lien ket!');
            }).catch(function() {
                showToast('Lien ket: ' + url);
            });
        }

        function pad(n) { return n < 10 ? '0' + n : '' + n; }

        function createFlipDigit(value, prevValue) {
            var digit = document.createElement('div');
            digit.className = 'flip-digit';

            var inner = document.createElement('div');
            inner.className = 'flip-digit-inner';

            var top = document.createElement('div');
            top.className = 'flip-top';
            var topSpan = document.createElement('span');
            topSpan.textContent = value;
            top.appendChild(topSpan);

            var bottom = document.createElement('div');
            bottom.className = 'flip-bottom';
            var bottomSpan = document.createElement('span');
            bottomSpan.textContent = value;
            bottom.appendChild(bottomSpan);

            inner.appendChild(top);
            inner.appendChild(bottom);

            // Add flip animation if value changed
            if (prevValue !== undefined && prevValue !== value) {
                var flipCard = document.createElement('div');
                flipCard.className = 'flip-card flipping';

                var front = document.createElement('div');
                front.className = 'flip-card-face flip-card-front';
                var frontSpan = document.createElement('span');
                frontSpan.textContent = prevValue;
                front.appendChild(frontSpan);

                var back = document.createElement('div');
                back.className = 'flip-card-face flip-card-back';
                var backSpan = document.createElement('span');
                backSpan.textContent = value;
                back.appendChild(backSpan);

                flipCard.appendChild(front);
                flipCard.appendChild(back);
                inner.appendChild(flipCard);

                setTimeout(function() {
                    if (flipCard.parentNode) flipCard.parentNode.removeChild(flipCard);
                }, 600);
            }

            digit.appendChild(inner);
            return digit;
        }

        function createFlipUnit(value, label, prevValue) {
            var unit = document.createElement('div');
            unit.className = 'flip-unit';

            var digits = document.createElement('div');
            digits.className = 'flip-digits';

            var valStr = pad(Math.max(0, value));
            var prevStr = prevValue !== undefined ? pad(Math.max(0, prevValue)) : undefined;

            // Handle days > 99
            if (value > 99) {
                valStr = '' + value;
                prevStr = prevValue !== undefined ? '' + prevValue : undefined;
            }

            for (var i = 0; i < valStr.length; i++) {
                var pv = prevStr ? prevStr[i] : undefined;
                digits.appendChild(createFlipDigit(valStr[i], pv));
            }

            var labelEl = document.createElement('div');
            labelEl.className = 'flip-unit-label';
            labelEl.textContent = label;

            unit.appendChild(digits);
            unit.appendChild(labelEl);
            return unit;
        }

        var prevValues = {};

        function renderCountdowns() {
            var events = loadEvents();
            var list = document.getElementById('countdownList');
            var empty = document.getElementById('emptyState');

            list.textContent = '';

            if (events.length === 0) {
                empty.style.display = 'block';
                return;
            }
            empty.style.display = 'none';

            events.forEach(function(event) {
                var card = document.createElement('div');
                card.className = 'countdown-card';
                card.setAttribute('data-id', event.id);

                var nameEl = document.createElement('div');
                nameEl.className = 'countdown-name';
                nameEl.textContent = event.name;

                var targetEl = document.createElement('div');
                targetEl.className = 'countdown-target';
                var targetDate = new Date(event.date + 'T' + event.time + ':00');
                targetEl.textContent = targetDate.toLocaleDateString('vi-VN', {
                    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
                    hour: '2-digit', minute: '2-digit'
                });

                var clockEl = document.createElement('div');
                clockEl.className = 'flip-clock';
                clockEl.setAttribute('data-target', targetDate.getTime());
                clockEl.setAttribute('data-event-id', event.id);

                var actionsEl = document.createElement('div');
                actionsEl.className = 'countdown-actions';

                var shareBtn = document.createElement('button');
                shareBtn.className = 'btn btn-sm btn-outline';
                var shareIcon = document.createElement('i');
                shareIcon.setAttribute('data-lucide', 'share-2');
                shareIcon.style.width = '16px';
                shareIcon.style.height = '16px';
                shareBtn.appendChild(shareIcon);
                shareBtn.appendChild(document.createTextNode(' Chia se'));
                shareBtn.addEventListener('click', (function(ev) {
                    return function() { shareCountdown(ev); };
                })(event));

                var deleteBtn = document.createElement('button');
                deleteBtn.className = 'btn btn-sm btn-danger';
                var delIcon = document.createElement('i');
                delIcon.setAttribute('data-lucide', 'trash-2');
                delIcon.style.width = '16px';
                delIcon.style.height = '16px';
                deleteBtn.appendChild(delIcon);
                deleteBtn.appendChild(document.createTextNode(' Xoa'));
                deleteBtn.addEventListener('click', (function(id) {
                    return function() { removeCountdown(id); };
                })(event.id));

                actionsEl.appendChild(shareBtn);
                actionsEl.appendChild(deleteBtn);

                card.appendChild(nameEl);
                card.appendChild(targetEl);
                card.appendChild(clockEl);
                card.appendChild(actionsEl);
                list.appendChild(card);
            });

            updateClocks();
            lucide.createIcons();
        }

        function updateClocks() {
            var clocks = document.querySelectorAll('.flip-clock[data-target]');
            var now = Date.now();

            clocks.forEach(function(clock) {
                var target = parseInt(clock.getAttribute('data-target'));
                var eventId = clock.getAttribute('data-event-id');
                var diff = target - now;

                if (diff <= 0) {
                    clock.textContent = '';
                    var expired = document.createElement('div');
                    expired.className = 'expired';
                    expired.textContent = 'Su kien da den!';
                    clock.appendChild(expired);
                    return;
                }

                var d = Math.floor(diff / (1000 * 60 * 60 * 24));
                var h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                var m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                var s = Math.floor((diff % (1000 * 60)) / 1000);

                var prev = prevValues[eventId] || {};
                clock.textContent = '';

                clock.appendChild(createFlipUnit(d, 'Ngay', prev.d));

                var sep1 = document.createElement('div');
                sep1.className = 'flip-separator';
                sep1.textContent = ':';
                clock.appendChild(sep1);

                clock.appendChild(createFlipUnit(h, 'Gio', prev.h));

                var sep2 = document.createElement('div');
                sep2.className = 'flip-separator';
                sep2.textContent = ':';
                clock.appendChild(sep2);

                clock.appendChild(createFlipUnit(m, 'Phut', prev.m));

                var sep3 = document.createElement('div');
                sep3.className = 'flip-separator';
                sep3.textContent = ':';
                clock.appendChild(sep3);

                clock.appendChild(createFlipUnit(s, 'Giay', prev.s));

                prevValues[eventId] = { d: d, h: h, m: m, s: s };
            });
        }

        // Check URL params for shared countdown
        function checkSharedCountdown() {
            var params = new URLSearchParams(window.location.search);
            if (params.has('name') && params.has('date')) {
                var events = loadEvents();
                var exists = events.some(function(e) {
                    return e.name === params.get('name') && e.date === params.get('date');
                });
                if (!exists) {
                    events.push({
                        id: Date.now(),
                        name: params.get('name'),
                        date: params.get('date'),
                        time: params.get('time') || '00:00'
                    });
                    saveEvents(events);
                    showToast('Da them dem nguoc tu lien ket chia se!');
                }
                // Clean URL
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        }

        // Init
        checkSharedCountdown();
        renderPresets();
        renderCountdowns();
        setInterval(updateClocks, 1000);

        lucide.createIcons();
