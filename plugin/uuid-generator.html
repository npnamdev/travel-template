<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tạo UUID — UUID Generator</title>
<meta name="description" content="Tạo UUID v4 đơn lẻ hoặc hàng loạt. Tùy chỉnh định dạng, lịch sử tạo.">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23ec4899'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-size='18' fill='white'%3E🆔%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fdf2f8;--surface:#fff;--surface2:#fce7f3;--surface3:#fbcfe8;
  --border:#f9a8d4;--border2:#f472b6;
  --text:#500724;--text2:#9d174d;--text3:#ec4899;--text-muted:#64748b;
  --primary:#ec4899;--primary-hover:#db2777;--primary-light:#f9a8d4;
  --accent:#8b5cf6;
  --r:12px;--r2:16px;--r3:20px;
  --shadow:0 1px 3px rgba(236,72,153,.08),0 4px 16px rgba(236,72,153,.06);
  --shadow2:0 4px 24px rgba(236,72,153,.15);
  --font:'Poppins',sans-serif;--mono:'Fira Code',monospace;
}
.dark{
  --bg:#1a0a14;--surface:#28101e;--surface2:#351528;--surface3:#441a32;
  --border:#6b2048;--border2:#9d174d;
  --text:#fce7f3;--text2:#f9a8d4;--text3:#f472b6;--text-muted:#94a3b8;
  --primary:#f472b6;--primary-hover:#ec4899;--primary-light:#831843;
  --accent:#a78bfa;
  --shadow:0 1px 3px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.2);
  --shadow2:0 4px 24px rgba(0,0,0,.35);
}
html{-webkit-font-smoothing:antialiased;height:100%}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;transition:background .3s,color .3s}

.theme-toggle{
  position:fixed;top:16px;right:16px;z-index:100;
  width:44px;height:44px;border-radius:50%;border:1px solid var(--border);
  background:var(--surface);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:var(--shadow);transition:all .3s;color:var(--text)
}
.theme-toggle:hover{background:var(--surface2);transform:scale(1.05)}
.theme-toggle svg{width:20px;height:20px}
.dark .theme-toggle .icon-sun{display:none}
:not(.dark) .theme-toggle .icon-moon{display:none}

.card{width:100%;max-width:600px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r3);padding:32px;box-shadow:var(--shadow2)}

.header{text-align:center;margin-bottom:28px}
.header-icon{
  width:64px;height:64px;border-radius:18px;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  display:inline-flex;align-items:center;justify-content:center;
  margin-bottom:12px;box-shadow:0 4px 20px rgba(236,72,153,.3);
}
.header-icon svg{width:32px;height:32px;color:#fff}
.header h1{font-size:1.6rem;font-weight:700}
.header p{font-size:.85rem;color:var(--text-muted);margin-top:4px}

.btn{
  padding:12px 22px;border:none;border-radius:var(--r);font-family:var(--font);font-weight:600;
  font-size:.9rem;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:all .2s;
}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-hover);transform:translateY(-2px);box-shadow:0 4px 16px rgba(236,72,153,.3)}
.btn-primary:active{transform:scale(.97)}
.btn-ghost{background:transparent;color:var(--text-muted);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--surface2)}
.btn-sm{padding:8px 14px;font-size:.8rem}
.btn-lg{padding:16px 32px;font-size:1rem;border-radius:var(--r2)}

.uuid-display{
  background:var(--surface2);border:1px solid var(--border);border-radius:var(--r2);
  padding:20px;margin-bottom:20px;text-align:center;position:relative;overflow:hidden;
}
.uuid-text{
  font-family:var(--mono);font-size:1.3rem;font-weight:600;color:var(--primary);
  word-break:break-all;line-height:1.6;user-select:all;transition:all .3s;
}
.uuid-text.pop{animation:pop .3s ease}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}

.uuid-actions{display:flex;gap:8px;justify-content:center;margin:16px 0}

.generate-area{text-align:center;margin-bottom:24px}

.options{
  background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);
  padding:16px;margin-bottom:20px;
}
.options h3{font-size:.85rem;font-weight:600;margin-bottom:12px;color:var(--text2)}
.option-row{display:flex;gap:16px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.option-row:last-child{margin-bottom:0}
.option-label{font-size:.85rem;color:var(--text-muted);display:flex;align-items:center;gap:6px;cursor:pointer}
.option-label input[type=checkbox]{
  width:18px;height:18px;accent-color:var(--primary);cursor:pointer;
}
.option-label input[type=number]{
  width:80px;padding:6px 10px;border:1px solid var(--border);border-radius:8px;
  background:var(--surface);color:var(--text);font-family:var(--font);font-size:.85rem;
  outline:none;text-align:center;
}

.bulk-area{
  background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);
  padding:16px;margin-bottom:20px;max-height:300px;overflow-y:auto;display:none;
}
.bulk-area pre{
  font-family:var(--mono);font-size:.78rem;color:var(--text);line-height:1.8;
  white-space:pre-wrap;word-break:break-all;
}

.history-section{margin-top:20px}
.history-section h3{font-size:.9rem;font-weight:600;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.history-list{max-height:250px;overflow-y:auto}
.history-item{
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  padding:8px 12px;border-radius:8px;transition:background .15s;
  font-family:var(--mono);font-size:.78rem;color:var(--text-muted);
}
.history-item:hover{background:var(--surface2)}
.history-item .uuid-val{flex:1;word-break:break-all;cursor:pointer}
.history-item .uuid-val:hover{color:var(--primary)}

.copy-toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);
  background:var(--primary);color:#fff;padding:10px 20px;border-radius:var(--r);
  font-size:.85rem;font-weight:600;transition:transform .3s;z-index:200;
}
.copy-toast.show{transform:translateX(-50%) translateY(0)}

@media(max-width:500px){
  .uuid-text{font-size:1rem}
  .btn-lg{padding:14px 24px;font-size:.9rem}
}
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleDark()">
  <i data-lucide="sun" class="icon-sun"></i>
  <i data-lucide="moon" class="icon-moon"></i>
</button>

<div class="card">
  <div class="header">
    <div class="header-icon"><i data-lucide="fingerprint"></i></div>
    <h1>Tạo UUID</h1>
    <p>UUID v4 - Mã định danh duy nhất toàn cầu</p>
  </div>

  <div class="uuid-display">
    <div class="uuid-text" id="uuidDisplay">Nhấn nút để tạo UUID</div>
  </div>

  <div class="uuid-actions">
    <button class="btn btn-ghost btn-sm" onclick="copySingle()"><i data-lucide="copy" style="width:16px;height:16px"></i> Sao chép</button>
  </div>

  <div class="generate-area">
    <button class="btn btn-primary btn-lg" onclick="generateOne()" id="genBtn">
      <i data-lucide="zap" style="width:20px;height:20px"></i> Tạo UUID
    </button>
  </div>

  <div class="options">
    <h3>Tùy chọn</h3>
    <div class="option-row">
      <label class="option-label"><input type="checkbox" id="optUpper" onchange="regenerateDisplay()"> Viết hoa</label>
      <label class="option-label"><input type="checkbox" id="optNoHyphens" onchange="regenerateDisplay()"> Không gạch ngang</label>
    </div>
    <div class="option-row">
      <label class="option-label">Số lượng: <input type="number" id="bulkCount" value="1" min="1" max="100"></label>
      <button class="btn btn-ghost btn-sm" onclick="generateBulk()"><i data-lucide="layers" style="width:14px;height:14px"></i> Tạo hàng loạt</button>
    </div>
  </div>

  <div class="bulk-area" id="bulkArea">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span style="font-size:.8rem;color:var(--text-muted);font-weight:600" id="bulkLabel"></span>
      <button class="btn btn-ghost btn-sm" onclick="copyBulk()"><i data-lucide="copy" style="width:12px;height:12px"></i> Sao chép tất cả</button>
    </div>
    <pre id="bulkContent"></pre>
  </div>

  <div class="history-section">
    <h3>
      <span>Lịch sử</span>
      <button class="btn btn-ghost btn-sm" onclick="clearHistory()"><i data-lucide="trash-2" style="width:12px;height:12px"></i> Xóa</button>
    </h3>
    <div class="history-list" id="historyList"></div>
  </div>
</div>

<div class="copy-toast" id="copyToast">Đã sao chép!</div>

<script>
const HISTORY_KEY='uuid-history';
let history=JSON.parse(localStorage.getItem(HISTORY_KEY)||'[]');
let currentUUID='';
let bulkUUIDs=[];

function toggleDark(){
  document.documentElement.classList.toggle('dark');
  localStorage.setItem('math-dark',document.documentElement.classList.contains('dark'));
  lucide.createIcons();
}
if(localStorage.getItem('math-dark')==='true') document.documentElement.classList.add('dark');

function showToast(){
  const t=document.getElementById('copyToast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

function generateUUIDv4(){
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{
    const r=Math.random()*16|0;
    return(c==='x'?r:(r&0x3|0x8)).toString(16);
  });
}

function formatUUID(uuid){
  let result=uuid;
  if(document.getElementById('optNoHyphens').checked) result=result.replace(/-/g,'');
  if(document.getElementById('optUpper').checked) result=result.toUpperCase();
  return result;
}

function generateOne(){
  currentUUID=generateUUIDv4();
  const formatted=formatUUID(currentUUID);
  const display=document.getElementById('uuidDisplay');
  display.textContent=formatted;
  display.classList.remove('pop');
  void display.offsetWidth; // trigger reflow
  display.classList.add('pop');

  // Add to history
  history.unshift({uuid:currentUUID,time:Date.now()});
  if(history.length>50) history=history.slice(0,50);
  localStorage.setItem(HISTORY_KEY,JSON.stringify(history));
  renderHistory();
}

function regenerateDisplay(){
  if(currentUUID){
    document.getElementById('uuidDisplay').textContent=formatUUID(currentUUID);
  }
}

function copySingle(){
  const text=document.getElementById('uuidDisplay').textContent;
  if(text&&text!=='Nhấn nút để tạo UUID'){
    navigator.clipboard.writeText(text).then(showToast);
  }
}

function generateBulk(){
  const count=Math.min(100,Math.max(1,parseInt(document.getElementById('bulkCount').value)||1));
  bulkUUIDs=[];
  for(let i=0;i<count;i++) bulkUUIDs.push(formatUUID(generateUUIDv4()));

  document.getElementById('bulkArea').style.display='block';
  document.getElementById('bulkLabel').textContent=count+' UUID đã tạo';
  document.getElementById('bulkContent').textContent=bulkUUIDs.join('\n');
}

function copyBulk(){
  if(bulkUUIDs.length){
    navigator.clipboard.writeText(bulkUUIDs.join('\n')).then(showToast);
  }
}

function renderHistory(){
  const list=document.getElementById('historyList');
  list.textContent='';
  if(!history.length){
    const empty=document.createElement('div');
    empty.style.cssText='text-align:center;padding:20px;color:var(--text-muted);font-size:.85rem';
    empty.textContent='Chưa có lịch sử';
    list.appendChild(empty);
    return;
  }
  history.slice(0,20).forEach(h=>{
    const item=document.createElement('div');item.className='history-item';
    const val=document.createElement('span');val.className='uuid-val';
    val.textContent=formatUUID(h.uuid);
    val.onclick=()=>{navigator.clipboard.writeText(formatUUID(h.uuid)).then(showToast)};
    const time=document.createElement('span');
    time.style.cssText='font-size:.7rem;color:var(--text-muted);white-space:nowrap';
    const d=new Date(h.time);
    time.textContent=d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
    item.appendChild(val);item.appendChild(time);
    list.appendChild(item);
  });
}

function clearHistory(){
  history=[];localStorage.removeItem(HISTORY_KEY);renderHistory();
}

renderHistory();
lucide.createIcons();
</script>
</body>
</html>
