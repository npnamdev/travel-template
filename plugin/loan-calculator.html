<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tính Lãi Suất Vay — Loan Calculator</title>
<meta name="description" content="Công cụ tính lãi suất vay trực tuyến. Hỗ trợ tính toán khoản vay, lãi suất, lịch trả nợ chi tiết theo phương pháp dư nợ giảm dần và lãi suất cố định.">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%2316a34a'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-size='18' fill='white'%3E💰%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#f0fdf4;--surface:#ffffff;--surface2:#f0fdf4;--surface3:#dcfce7;
  --border:#bbf7d0;--border2:#16a34a;
  --text:#052e16;--text2:#166534;--text3:#16a34a;--text-muted:#6b7280;
  --primary:#16a34a;--primary-hover:#15803d;--primary-light:#bbf7d0;
  --accent:#059669;--accent2:#10b981;
  --r:12px;--r2:16px;--r3:24px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.04);
  --shadow2:0 4px 24px rgba(0,0,0,.08);
  --font:'Space Grotesk',sans-serif;
  --mono:'JetBrains Mono',monospace;
}

.dark{
  --bg:#052e16;--surface:#14532d;--surface2:#052e16;--surface3:#166534;
  --border:#166534;--border2:#22c55e;
  --text:#f0fdf4;--text2:#bbf7d0;--text3:#4ade80;--text-muted:#86efac;
  --primary:#22c55e;--primary-hover:#16a34a;--primary-light:#14532d;
  --shadow:0 1px 3px rgba(0,0,0,.4),0 4px 16px rgba(0,0,0,.3);
  --shadow2:0 4px 24px rgba(0,0,0,.4);
}

html{-webkit-font-smoothing:antialiased;height:100%}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;padding:24px;transition:background .3s,color .3s}

.theme-toggle{
  position:fixed;top:16px;right:16px;z-index:100;
  width:44px;height:44px;border-radius:50%;border:1px solid var(--border);
  background:var(--surface);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:var(--shadow);transition:all .3s;color:var(--text)
}
.theme-toggle:hover{background:var(--surface3);border-color:var(--border2);transform:scale(1.05)}
.theme-toggle svg{width:20px;height:20px}
.dark .theme-toggle .icon-sun{display:none}
:not(.dark) .theme-toggle .icon-moon{display:none}

.container{max-width:900px;margin:0 auto}

.header{text-align:center;margin-bottom:28px;padding-top:10px}
.header-icon{
  width:56px;height:56px;border-radius:16px;
  background:linear-gradient(135deg,var(--primary),var(--accent2));
  display:inline-flex;align-items:center;justify-content:center;
  margin-bottom:12px;box-shadow:0 4px 16px rgba(22,163,74,.3);
}
.header-icon svg{width:28px;height:28px;color:#fff}
.header h1{font-size:1.5rem;font-weight:700;color:var(--text)}
.header p{font-size:.85rem;color:var(--text-muted);margin-top:4px}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
@media(max-width:700px){.grid{grid-template-columns:1fr}}

.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r3);padding:24px;
  box-shadow:var(--shadow2);
}

.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:.8rem;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.form-group input,.form-group select{
  width:100%;padding:12px 14px;border:1.5px solid var(--border);
  border-radius:var(--r);background:var(--surface2);color:var(--text);
  font-family:var(--mono);font-size:.95rem;transition:border-color .2s;outline:none
}
.form-group input:focus,.form-group select:focus{border-color:var(--primary)}

.row{display:flex;gap:12px}
.row .form-group{flex:1}

.method-toggle{display:flex;gap:8px;margin-bottom:18px}
.method-btn{
  flex:1;padding:10px;border:1.5px solid var(--border);border-radius:var(--r);
  background:var(--surface2);color:var(--text-muted);font-family:var(--font);
  font-size:.82rem;font-weight:600;cursor:pointer;transition:all .2s;text-align:center
}
.method-btn.active{border-color:var(--primary);background:var(--primary-light);color:var(--primary)}

.btn-calc{
  width:100%;padding:14px;border:none;border-radius:var(--r);
  background:linear-gradient(135deg,var(--primary),var(--accent));
  color:#fff;font-family:var(--font);font-size:1rem;font-weight:700;
  cursor:pointer;transition:transform .15s,box-shadow .15s;
  box-shadow:0 4px 16px rgba(22,163,74,.3)
}
.btn-calc:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(22,163,74,.4)}
.btn-calc:active{transform:translateY(0)}

.results{margin-top:20px}
.result-item{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 16px;border-radius:var(--r);margin-bottom:8px;
  background:var(--surface2);border:1px solid var(--border)
}
.result-label{font-size:.82rem;color:var(--text-muted);font-weight:500}
.result-value{font-family:var(--mono);font-size:1.05rem;font-weight:700;color:var(--text3)}

.chart-container{display:flex;justify-content:center;margin:20px 0}
canvas#pieChart{max-width:220px;max-height:220px}

.chart-legend{display:flex;justify-content:center;gap:20px;margin-bottom:8px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:.8rem;color:var(--text-muted)}
.legend-dot{width:12px;height:12px;border-radius:50%}

.schedule-section{margin-top:24px}
.schedule-section h3{font-size:.95rem;font-weight:700;margin-bottom:12px;color:var(--text2);display:flex;align-items:center;gap:8px}
.schedule-section h3 svg{width:18px;height:18px}

.schedule-table{width:100%;overflow-x:auto;border-radius:var(--r);border:1px solid var(--border)}
.schedule-table table{width:100%;border-collapse:collapse;font-size:.75rem;min-width:600px}
.schedule-table th{background:var(--primary);color:#fff;padding:10px 8px;text-align:right;font-weight:600;position:sticky;top:0}
.schedule-table th:first-child{text-align:center;border-radius:0}
.schedule-table td{padding:8px;text-align:right;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:.72rem;color:var(--text)}
.schedule-table td:first-child{text-align:center;color:var(--text-muted);font-weight:600}
.schedule-table tr:nth-child(even){background:var(--surface2)}
.schedule-table tr:hover{background:var(--primary-light)}
.schedule-scroll{max-height:400px;overflow-y:auto}

.empty-state{text-align:center;padding:40px 20px;color:var(--text-muted)}
.empty-state svg{width:48px;height:48px;margin-bottom:12px;opacity:.4}
.empty-state p{font-size:.85rem}
</style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()" aria-label="Chuyển giao diện">
  <i data-lucide="sun" class="icon-sun"></i>
  <i data-lucide="moon" class="icon-moon"></i>
</button>

<div class="container">
  <div class="header">
    <div class="header-icon"><i data-lucide="landmark"></i></div>
    <h1>Tính Lãi Suất Vay</h1>
    <p>Tính toán khoản vay & lịch trả nợ chi tiết</p>
  </div>

  <div class="grid">
    <div>
      <div class="card">
        <div class="form-group">
          <label>Số tiền vay (VND)</label>
          <input type="text" id="loanAmount" value="500.000.000" oninput="formatInput(this)" placeholder="500.000.000">
        </div>
        <div class="row">
          <div class="form-group">
            <label>Lãi suất (%/năm)</label>
            <input type="number" id="interestRate" value="8.5" step="0.1" min="0">
          </div>
          <div class="form-group">
            <label>Thời hạn</label>
            <div class="row">
              <input type="number" id="loanTerm" value="20" min="1" style="flex:2">
              <select id="termUnit" style="flex:1">
                <option value="year">Năm</option>
                <option value="month">Tháng</option>
              </select>
            </div>
          </div>
        </div>

        <label style="font-size:.8rem;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;display:block">Phương thức tính</label>
        <div class="method-toggle">
          <button class="method-btn active" onclick="setMethod('reducing',this)">Dư nợ giảm dần</button>
          <button class="method-btn" onclick="setMethod('flat',this)">Lãi suất cố định</button>
        </div>

        <button class="btn-calc" onclick="calculate()"><i data-lucide="calculator" style="width:18px;height:18px;vertical-align:middle;margin-right:6px"></i>Tính toán</button>

        <div class="results" id="results" style="display:none">
          <div class="result-item">
            <span class="result-label">Trả hàng tháng (trung bình)</span>
            <span class="result-value" id="monthlyPayment">-</span>
          </div>
          <div class="result-item">
            <span class="result-label">Tổng tiền trả</span>
            <span class="result-value" id="totalPayment">-</span>
          </div>
          <div class="result-item">
            <span class="result-label">Tổng lãi phải trả</span>
            <span class="result-value" id="totalInterest">-</span>
          </div>
        </div>
      </div>
    </div>

    <div>
      <div class="card">
        <div class="chart-container">
          <canvas id="pieChart" width="220" height="220"></canvas>
        </div>
        <div class="chart-legend" id="chartLegend" style="display:none">
          <div class="legend-item"><div class="legend-dot" style="background:#16a34a"></div>Gốc</div>
          <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>Lãi</div>
        </div>
        <div id="chartEmpty" class="empty-state">
          <i data-lucide="pie-chart"></i>
          <p>Nhấn "Tính toán" để xem biểu đồ</p>
        </div>
      </div>

      <div class="card schedule-section" style="margin-top:24px">
        <h3><i data-lucide="table-2"></i>Lịch trả nợ</h3>
        <div id="scheduleContent">
          <div class="empty-state">
            <i data-lucide="calendar-range"></i>
            <p>Lịch trả nợ sẽ hiển thị ở đây</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
let method = 'reducing';

function toggleTheme(){
  document.body.classList.toggle('dark');
  localStorage.setItem('math-dark', document.body.classList.contains('dark'));
  lucide.createIcons();
}

if(localStorage.getItem('math-dark')==='true') document.body.classList.add('dark');

function setMethod(m, btn){
  method = m;
  document.querySelectorAll('.method-btn').forEach(function(b){b.classList.remove('active')});
  btn.classList.add('active');
}

function formatVND(n){
  return Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.');
}

function parseVND(s){
  return parseInt(String(s).replace(/\./g,'').replace(/[^\d]/g,'')) || 0;
}

function formatInput(el){
  var v = el.value.replace(/\./g,'').replace(/[^\d]/g,'');
  if(v) el.value = parseInt(v).toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.');
}

function calculate(){
  var principal = parseVND(document.getElementById('loanAmount').value);
  var annualRate = parseFloat(document.getElementById('interestRate').value) / 100;
  var termVal = parseInt(document.getElementById('loanTerm').value);
  var termUnit = document.getElementById('termUnit').value;
  var months = termUnit === 'year' ? termVal * 12 : termVal;
  var monthlyRate = annualRate / 12;

  if(!principal || !annualRate || !months) return;

  var schedule = [];
  var totalPaymentVal = 0;
  var totalInterestVal = 0;
  var avgMonthly = 0;

  if(method === 'reducing'){
    var emi = principal * monthlyRate * Math.pow(1+monthlyRate, months) / (Math.pow(1+monthlyRate, months)-1);
    var balance = principal;
    for(var i=1; i<=months; i++){
      var interest = balance * monthlyRate;
      var prinPay = emi - interest;
      balance -= prinPay;
      if(balance < 0) balance = 0;
      totalInterestVal += interest;
      schedule.push({month:i, payment:emi, principal:prinPay, interest:interest, balance:balance});
    }
    totalPaymentVal = emi * months;
    avgMonthly = emi;
  } else {
    var totalInt = principal * annualRate * (months/12);
    var monthlyInt = totalInt / months;
    var monthlyPrin = principal / months;
    var flatEmi = monthlyPrin + monthlyInt;
    var flatBalance = principal;
    for(var j=1; j<=months; j++){
      flatBalance -= monthlyPrin;
      if(flatBalance < 0) flatBalance = 0;
      totalInterestVal += monthlyInt;
      schedule.push({month:j, payment:flatEmi, principal:monthlyPrin, interest:monthlyInt, balance:flatBalance});
    }
    totalPaymentVal = flatEmi * months;
    avgMonthly = flatEmi;
  }

  document.getElementById('monthlyPayment').textContent = formatVND(avgMonthly) + ' VND';
  document.getElementById('totalPayment').textContent = formatVND(totalPaymentVal) + ' VND';
  document.getElementById('totalInterest').textContent = formatVND(totalInterestVal) + ' VND';
  document.getElementById('results').style.display = 'block';

  drawPie(principal, totalInterestVal);
  renderSchedule(schedule);
}

function drawPie(principal, interest){
  var canvas = document.getElementById('pieChart');
  var ctx = canvas.getContext('2d');
  var dpr = window.devicePixelRatio || 1;
  canvas.width = 220 * dpr;
  canvas.height = 220 * dpr;
  ctx.scale(dpr, dpr);
  canvas.style.width = '220px';
  canvas.style.height = '220px';

  var total = principal + interest;
  var pRatio = principal / total;
  var cx = 110, cy = 110, r = 90;

  ctx.clearRect(0,0,220,220);

  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.arc(cx, cy, r, -Math.PI/2, -Math.PI/2 + pRatio*2*Math.PI);
  ctx.closePath();
  ctx.fillStyle = '#16a34a';
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.arc(cx, cy, r, -Math.PI/2 + pRatio*2*Math.PI, -Math.PI/2 + 2*Math.PI);
  ctx.closePath();
  ctx.fillStyle = '#f59e0b';
  ctx.fill();

  ctx.beginPath();
  ctx.arc(cx, cy, 55, 0, 2*Math.PI);
  var isDark = document.body.classList.contains('dark');
  ctx.fillStyle = isDark ? '#14532d' : '#ffffff';
  ctx.fill();

  ctx.fillStyle = isDark ? '#f0fdf4' : '#052e16';
  ctx.font = '700 14px Space Grotesk';
  ctx.textAlign = 'center';
  ctx.fillText(Math.round(pRatio*100)+'% Goc', cx, cy-4);
  ctx.font = '500 12px Space Grotesk';
  ctx.fillStyle = isDark ? '#86efac' : '#6b7280';
  ctx.fillText(Math.round((1-pRatio)*100)+'% Lai', cx, cy+14);

  document.getElementById('chartLegend').style.display = 'flex';
  document.getElementById('chartEmpty').style.display = 'none';
}

function renderSchedule(schedule){
  var container = document.getElementById('scheduleContent');
  container.textContent = '';

  var wrapper = document.createElement('div');
  wrapper.className = 'schedule-table';

  var scrollDiv = document.createElement('div');
  scrollDiv.className = 'schedule-scroll';

  var table = document.createElement('table');
  var thead = document.createElement('thead');
  var headerRow = document.createElement('tr');
  var headers = ['Thang', 'Tra hang thang', 'Goc', 'Lai', 'Du no con lai'];
  headers.forEach(function(h){
    var th = document.createElement('th');
    th.textContent = h;
    headerRow.appendChild(th);
  });
  thead.appendChild(headerRow);
  table.appendChild(thead);

  var tbody = document.createElement('tbody');
  for(var i=0; i<schedule.length; i++){
    var s = schedule[i];
    var tr = document.createElement('tr');
    var vals = [s.month, formatVND(s.payment), formatVND(s.principal), formatVND(s.interest), formatVND(s.balance)];
    vals.forEach(function(v){
      var td = document.createElement('td');
      td.textContent = v;
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  }
  table.appendChild(tbody);
  scrollDiv.appendChild(table);
  wrapper.appendChild(scrollDiv);
  container.appendChild(wrapper);
}

window.addEventListener('DOMContentLoaded', function(){
  lucide.createIcons();
  calculate();
});
</script>
</body>
</html>
