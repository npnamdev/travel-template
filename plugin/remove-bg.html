<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xóa Nền Ảnh — Remove Background</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

  <style>
    :root {
      --bg: #f5f0ff;
      --bg-card: #ffffff;
      --bg-card-hover: #faf7ff;
      --text: #1a0a3e;
      --text-sub: #6b5b8a;
      --primary: #7c3aed;
      --primary-light: rgba(124,58,237,0.08);
      --primary-glow: rgba(124,58,237,0.15);
      --border: rgba(124,58,237,0.1);
      --shadow: 0 1px 3px rgba(124,58,237,0.04), 0 8px 32px rgba(124,58,237,0.06);
      --shadow-hover: 0 4px 12px rgba(124,58,237,0.1), 0 16px 48px rgba(124,58,237,0.14);
      --danger: #ef4444;
      --success: #22c55e;
    }

    body.dark {
      --bg: #0c0818;
      --bg-card: #170f2e;
      --bg-card-hover: #1e1540;
      --text: #e8e0ff;
      --text-sub: #9b8cb8;
      --primary: #a78bfa;
      --primary-light: rgba(167,139,250,0.1);
      --primary-glow: rgba(167,139,250,0.12);
      --border: rgba(167,139,250,0.08);
      --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 8px 32px rgba(0,0,0,0.4);
      --shadow-hover: 0 4px 12px rgba(124,58,237,0.2), 0 16px 48px rgba(0,0,0,0.5);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
      transition: background 0.4s, color 0.4s;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -200px;
      right: -200px;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124,58,237,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 24px 16px;
      position: relative;
      z-index: 1;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: linear-gradient(135deg, #7c3aed, #a78bfa);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      box-shadow: 0 4px 16px rgba(124,58,237,0.3);
    }

    .header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary), #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header p {
      font-size: 0.85rem;
      color: var(--text-sub);
    }

    .dark-toggle {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }
    .dark-toggle:hover { background: var(--primary-light); }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }

    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
    }
    .upload-zone:hover, .upload-zone.dragover {
      border-color: var(--primary);
      background: var(--primary-light);
    }
    .upload-zone i { color: var(--primary); margin-bottom: 12px; }
    .upload-zone p { color: var(--text-sub); font-size: 0.9rem; margin-top: 8px; }
    .upload-zone .main-text { font-weight: 600; color: var(--text); font-size: 1rem; }

    input[type="file"] { display: none; }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 20px;
    }
    @media (max-width: 600px) {
      .controls { grid-template-columns: 1fr; }
    }

    .control-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-sub);
    }

    .color-pick-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .color-pick-row input[type="color"] {
      width: 48px;
      height: 40px;
      border: 2px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      background: none;
      padding: 2px;
    }

    .color-pick-row span {
      font-size: 0.85rem;
      color: var(--text-sub);
      font-family: monospace;
    }

    .eyedropper-btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--primary-light);
      color: var(--primary);
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: inherit;
      transition: all 0.2s;
    }
    .eyedropper-btn:hover { background: var(--primary); color: white; }
    .eyedropper-btn.active { background: var(--primary); color: white; }

    input[type="range"] {
      width: 100%;
      accent-color: var(--primary);
      height: 6px;
    }

    .range-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .range-row span {
      min-width: 36px;
      text-align: center;
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--primary);
    }

    .btn {
      padding: 12px 24px;
      border-radius: 10px;
      border: none;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #7c3aed, #a78bfa);
      color: white;
      box-shadow: 0 4px 16px rgba(124,58,237,0.3);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(124,58,237,0.4); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-success {
      background: linear-gradient(135deg, #22c55e, #4ade80);
      color: white;
      box-shadow: 0 4px 16px rgba(34,197,94,0.3);
    }
    .btn-success:hover { transform: translateY(-2px); }

    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .preview-area {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 20px;
    }
    @media (max-width: 600px) {
      .preview-area { grid-template-columns: 1fr; }
    }

    .preview-box {
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      position: relative;
    }

    .preview-box .label {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.6);
      color: white;
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      z-index: 2;
    }

    .checkerboard {
      background-image:
        linear-gradient(45deg, #ccc 25%, transparent 25%),
        linear-gradient(-45deg, #ccc 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #ccc 75%),
        linear-gradient(-45deg, transparent 75%, #ccc 75%);
      background-size: 16px 16px;
      background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
    }

    body.dark .checkerboard {
      background-image:
        linear-gradient(45deg, #333 25%, transparent 25%),
        linear-gradient(-45deg, #333 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #333 75%),
        linear-gradient(-45deg, transparent 75%, #333 75%);
    }

    .preview-box canvas, .preview-box img {
      width: 100%;
      height: auto;
      display: block;
      max-height: 400px;
      object-fit: contain;
    }

    .pick-canvas-wrapper {
      position: relative;
      cursor: crosshair;
    }
    .pick-canvas-wrapper canvas {
      width: 100%;
      height: auto;
      display: block;
      max-height: 400px;
      object-fit: contain;
    }

    .hidden { display: none !important; }

    .info-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 8px;
      background: var(--primary-light);
      color: var(--primary);
      font-size: 0.85rem;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-left">
        <div class="logo"><i data-lucide="eraser" style="width:24px;height:24px"></i></div>
        <div>
          <h1>Xóa Nền Ảnh</h1>
          <p>Loại bỏ nền ảnh, tạo ảnh PNG trong suốt</p>
        </div>
      </div>
      <button class="dark-toggle" onclick="toggleDark()" title="Chế độ tối">
        <i data-lucide="moon" style="width:20px;height:20px"></i>
      </button>
    </div>

    <div class="card">
      <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
        <i data-lucide="upload-cloud" style="width:48px;height:48px"></i>
        <p class="main-text">Kéo thả hoặc nhấp để chọn ảnh</p>
        <p>Hỗ trợ PNG, JPG, WebP</p>
      </div>
      <input type="file" id="fileInput" accept="image/*" />
    </div>

    <div class="card hidden" id="editorCard">
      <h3 style="margin-bottom:16px;display:flex;align-items:center;gap:8px">
        <i data-lucide="settings-2" style="width:20px;height:20px;color:var(--primary)"></i>
        Cài đặt xóa nền
      </h3>

      <div class="controls">
        <div class="control-group">
          <label>Màu nền cần xóa (nhấp vào ảnh để chọn)</label>
          <div class="color-pick-row">
            <input type="color" id="bgColor" value="#ffffff" />
            <span id="bgColorHex">#ffffff</span>
            <button class="eyedropper-btn" id="eyedropperBtn" onclick="toggleEyedropper()">
              <i data-lucide="pipette" style="width:16px;height:16px"></i> Hút màu
            </button>
          </div>
        </div>
        <div class="control-group">
          <label>Độ chính xác (Tolerance): <span id="tolVal">30</span></label>
          <div class="range-row">
            <span>0</span>
            <input type="range" id="tolerance" min="0" max="150" value="30" oninput="document.getElementById('tolVal').textContent=this.value" />
            <span>150</span>
          </div>
        </div>
      </div>

      <div class="btn-row">
        <button class="btn btn-primary" onclick="removeBg()" id="removeBtn">
          <i data-lucide="wand-2" style="width:18px;height:18px"></i> Xóa nền
        </button>
        <button class="btn btn-success hidden" onclick="downloadResult()" id="downloadBtn">
          <i data-lucide="download" style="width:18px;height:18px"></i> Tải PNG trong suốt
        </button>
      </div>

      <div class="preview-area" id="previewArea">
        <div class="preview-box">
          <span class="label">Ảnh gốc — Nhấp để chọn màu</span>
          <div class="pick-canvas-wrapper" id="pickWrapper">
            <canvas id="origCanvas"></canvas>
          </div>
        </div>
        <div class="preview-box checkerboard hidden" id="resultBox">
          <span class="label">Đã xóa nền</span>
          <canvas id="resultCanvas"></canvas>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Dark mode
    function toggleDark() {
      document.body.classList.toggle('dark');
      localStorage.setItem('math-dark', document.body.classList.contains('dark'));
      lucide.createIcons();
    }
    if (localStorage.getItem('math-dark') === 'true') document.body.classList.add('dark');

    let originalImage = null;
    let origImageData = null;
    let eyedropperActive = false;

    const fileInput = document.getElementById('fileInput');
    const uploadZone = document.getElementById('uploadZone');
    const editorCard = document.getElementById('editorCard');
    const origCanvas = document.getElementById('origCanvas');
    const resultCanvas = document.getElementById('resultCanvas');
    const origCtx = origCanvas.getContext('2d');
    const resultCtx = resultCanvas.getContext('2d');
    const bgColorInput = document.getElementById('bgColor');
    const bgColorHex = document.getElementById('bgColorHex');
    const resultBox = document.getElementById('resultBox');
    const downloadBtn = document.getElementById('downloadBtn');
    const pickWrapper = document.getElementById('pickWrapper');

    // Drag and drop
    uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
    uploadZone.addEventListener('drop', e => {
      e.preventDefault();
      uploadZone.classList.remove('dragover');
      if (e.dataTransfer.files[0]) loadImage(e.dataTransfer.files[0]);
    });

    fileInput.addEventListener('change', e => {
      if (e.target.files[0]) loadImage(e.target.files[0]);
    });

    function loadImage(file) {
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          originalImage = img;
          origCanvas.width = img.width;
          origCanvas.height = img.height;
          origCtx.drawImage(img, 0, 0);
          origImageData = origCtx.getImageData(0, 0, img.width, img.height);
          editorCard.classList.remove('hidden');
          resultBox.classList.add('hidden');
          downloadBtn.classList.add('hidden');
          eyedropperActive = true;
          document.getElementById('eyedropperBtn').classList.add('active');
          lucide.createIcons();
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    bgColorInput.addEventListener('input', e => {
      bgColorHex.textContent = e.target.value;
    });

    function toggleEyedropper() {
      eyedropperActive = !eyedropperActive;
      document.getElementById('eyedropperBtn').classList.toggle('active', eyedropperActive);
    }

    // Pick color from image
    pickWrapper.addEventListener('click', e => {
      if (!eyedropperActive || !origImageData) return;
      const rect = origCanvas.getBoundingClientRect();
      const scaleX = origCanvas.width / rect.width;
      const scaleY = origCanvas.height / rect.height;
      const x = Math.floor((e.clientX - rect.left) * scaleX);
      const y = Math.floor((e.clientY - rect.top) * scaleY);
      const idx = (y * origCanvas.width + x) * 4;
      const r = origImageData.data[idx];
      const g = origImageData.data[idx + 1];
      const b = origImageData.data[idx + 2];
      const hex = '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
      bgColorInput.value = hex;
      bgColorHex.textContent = hex;
    });

    function hexToRgb(hex) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return [r, g, b];
    }

    function removeBg() {
      if (!origImageData) return;
      const tol = parseInt(document.getElementById('tolerance').value);
      const [tr, tg, tb] = hexToRgb(bgColorInput.value);

      resultCanvas.width = origCanvas.width;
      resultCanvas.height = origCanvas.height;

      const src = origImageData.data;
      const newData = resultCtx.createImageData(origCanvas.width, origCanvas.height);
      const dst = newData.data;

      for (let i = 0; i < src.length; i += 4) {
        const r = src[i], g = src[i + 1], b = src[i + 2], a = src[i + 3];
        const dist = Math.sqrt((r - tr) ** 2 + (g - tg) ** 2 + (b - tb) ** 2);
        if (dist <= tol) {
          dst[i] = dst[i + 1] = dst[i + 2] = dst[i + 3] = 0;
        } else if (dist <= tol * 1.5) {
          const ratio = (dist - tol) / (tol * 0.5);
          dst[i] = r;
          dst[i + 1] = g;
          dst[i + 2] = b;
          dst[i + 3] = Math.round(a * ratio);
        } else {
          dst[i] = r;
          dst[i + 1] = g;
          dst[i + 2] = b;
          dst[i + 3] = a;
        }
      }

      resultCtx.putImageData(newData, 0, 0);
      resultBox.classList.remove('hidden');
      downloadBtn.classList.remove('hidden');
      lucide.createIcons();
    }

    function downloadResult() {
      const link = document.createElement('a');
      link.download = 'removed-bg.png';
      link.href = resultCanvas.toDataURL('image/png');
      link.click();
    }

    lucide.createIcons();
  </script>
</body>
</html>
