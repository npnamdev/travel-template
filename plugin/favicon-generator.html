<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tạo Favicon — Favicon Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
:root {
  --bg: #fffbeb;
  --bg-card: #ffffff;
  --bg-alt: #fef3c7;
  --text: #451a03;
  --text-sub: #92400e;
  --primary: #d97706;
  --primary-dark: #b45309;
  --primary-light: rgba(217,119,6,0.08);
  --primary-glow: rgba(217,119,6,0.18);
  --border: rgba(217,119,6,0.12);
  --shadow: 0 2px 8px rgba(217,119,6,0.05), 0 12px 36px rgba(217,119,6,0.07);
  --shadow-hover: 0 8px 24px rgba(217,119,6,0.12);
  --accent: #f59e0b;
  --accent2: #fbbf24;
  --radius: 16px;
}
body.dark {
  --bg: #0c0a00;
  --bg-card: #1a1500;
  --bg-alt: #292200;
  --text: #fef3c7;
  --text-sub: #fbbf24;
  --primary: #f59e0b;
  --primary-dark: #fbbf24;
  --primary-light: rgba(245,158,11,0.1);
  --primary-glow: rgba(245,158,11,0.15);
  --border: rgba(245,158,11,0.1);
  --shadow: 0 2px 8px rgba(0,0,0,0.3), 0 12px 36px rgba(0,0,0,0.4);
  --shadow-hover: 0 8px 24px rgba(245,158,11,0.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Manrope', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  color: var(--text);
  transition: background 0.4s, color 0.4s;
}
body::before {
  content: '';
  position: fixed;
  top: -100px; right: -100px;
  width: 500px; height: 500px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(217,119,6,0.08) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  bottom: -200px; left: -150px;
  width: 600px; height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(245,158,11,0.06) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}

.top-bar {
  position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(20px);
  background: rgba(255,251,235,0.85);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex; align-items: center; justify-content: space-between;
  transition: background 0.4s;
}
body.dark .top-bar { background: rgba(12,10,0,0.88); }
.top-bar h1 {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 1.25rem; font-weight: 800;
  display: flex; align-items: center; gap: 10px;
  background: linear-gradient(135deg, #d97706, #dc2626);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.top-actions { display: flex; gap: 8px; }
.icon-btn {
  width: 40px; height: 40px; border-radius: 12px;
  border: 1px solid var(--border); background: var(--bg-card);
  color: var(--text); display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.2s;
}
.icon-btn:hover { background: var(--primary-light); border-color: var(--primary); transform: translateY(-1px); }

.container { max-width: 900px; margin: 0 auto; padding: 28px 20px; position: relative; z-index: 1; }

.upload-zone {
  border: 2px dashed var(--border); border-radius: var(--radius);
  padding: 48px 20px; text-align: center; cursor: pointer;
  transition: all 0.3s; background: var(--bg-card);
  position: relative; overflow: hidden;
}
.upload-zone::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(217,119,6,0.03), rgba(245,158,11,0.03));
  opacity: 0; transition: opacity 0.3s;
}
.upload-zone:hover::before { opacity: 1; }
.upload-zone:hover { border-color: var(--primary); box-shadow: var(--shadow); }
.upload-zone.dragover { border-color: var(--primary); background: var(--primary-light); }
.upload-zone i { color: var(--primary); margin-bottom: 12px; }
.upload-zone .title { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700; font-size: 1.1rem; }
.upload-zone p { color: var(--text-sub); font-size: 0.9rem; margin-top: 6px; }
.upload-zone input { display: none; }

.workspace { display: none; }
.workspace.active { display: block; animation: fadeIn 0.4s ease-out; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.source-preview {
  display: flex; align-items: center; gap: 20px;
  background: var(--bg-card); border-radius: var(--radius);
  box-shadow: var(--shadow); border: 1px solid var(--border);
  padding: 20px; margin-top: 20px;
}
.source-preview img {
  width: 80px; height: 80px; border-radius: 12px; object-fit: cover;
  border: 2px solid var(--border);
  background: repeating-conic-gradient(var(--bg-alt) 0% 25%, transparent 0% 50%) 50%/10px 10px;
}
.source-info { flex: 1; }
.source-info h3 { font-family: 'Bricolage Grotesque', sans-serif; font-size: 1rem; margin-bottom: 4px; }
.source-info p { font-size: 0.85rem; color: var(--text-sub); }

.btn {
  padding: 10px 20px; border-radius: 10px; border: none;
  background: linear-gradient(135deg, #d97706, #dc2626);
  color: white; font-family: 'Manrope', sans-serif;
  font-size: 0.9rem; font-weight: 600;
  cursor: pointer; transition: all 0.25s;
  display: inline-flex; align-items: center; gap: 8px;
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(217,119,6,0.25); }
.btn:active { transform: translateY(0); }
.btn-outline {
  padding: 8px 16px; border-radius: 10px;
  border: 1px solid var(--border); background: var(--bg-card);
  color: var(--text); font-family: 'Manrope', sans-serif;
  font-size: 0.85rem; font-weight: 500;
  cursor: pointer; transition: all 0.2s;
}
.btn-outline:hover { border-color: var(--primary); background: var(--primary-light); }
.btn-sm { padding: 6px 12px; font-size: 0.78rem; border-radius: 8px; }

.sizes-section { margin-top: 24px; }
.sizes-section h2 {
  font-family: 'Bricolage Grotesque', sans-serif; font-size: 1.1rem; font-weight: 700;
  margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
}
.sizes-section h2 i { color: var(--primary); }

.sizes-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
}
.size-card {
  background: var(--bg-card); border-radius: var(--radius);
  box-shadow: var(--shadow); border: 1px solid var(--border);
  padding: 16px; text-align: center;
  transition: all 0.25s;
}
.size-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); border-color: var(--primary); }
.size-card .preview-wrap {
  display: flex; align-items: center; justify-content: center;
  min-height: 80px; margin-bottom: 10px;
  background: repeating-conic-gradient(var(--bg-alt) 0% 25%, transparent 0% 50%) 50%/10px 10px;
  border-radius: 8px; padding: 12px;
}
.size-card canvas { image-rendering: pixelated; border-radius: 2px; }
.size-card .label {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 700; font-size: 0.9rem; margin-bottom: 6px;
}
.size-card .sublabel { font-size: 0.78rem; color: var(--text-sub); margin-bottom: 8px; }

.meta-section {
  margin-top: 24px;
  background: var(--bg-card); border-radius: var(--radius);
  box-shadow: var(--shadow); border: 1px solid var(--border);
  overflow: hidden;
}
.meta-header {
  padding: 14px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700;
}
.meta-header i { color: var(--primary); }
.meta-header .left { display: flex; align-items: center; gap: 8px; }
.meta-code {
  padding: 16px 20px;
  font-family: 'Bricolage Grotesque', monospace; font-size: 0.82rem;
  line-height: 1.8; color: var(--text);
  background: var(--bg-alt);
  white-space: pre-wrap; word-break: break-all;
}

.download-all-section { margin-top: 20px; text-align: center; }

.copy-toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px);
  background: var(--primary); color: white;
  padding: 12px 24px; border-radius: 12px;
  font-weight: 600; font-size: 0.9rem;
  box-shadow: 0 8px 32px rgba(217,119,6,0.3);
  transition: transform 0.3s ease; z-index: 999;
}
.copy-toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="top-bar">
  <h1><i data-lucide="crown" style="width:22px;height:22px"></i> Tạo Favicon</h1>
  <div class="top-actions">
    <button class="icon-btn" onclick="resetAll()" title="Làm mới"><i data-lucide="rotate-ccw" style="width:18px;height:18px"></i></button>
    <button class="icon-btn" id="darkToggle" title="Chế độ tối"><i data-lucide="moon" style="width:18px;height:18px"></i></button>
  </div>
</div>

<div class="container">
  <div class="upload-zone" id="uploadZone">
    <i data-lucide="image-up" style="width:48px;height:48px"></i>
    <p class="title">Tải ảnh lên để tạo Favicon</p>
    <p>Nên dùng ảnh vuông. Hỗ trợ PNG, JPG, WEBP, SVG.</p>
    <input type="file" id="fileInput" accept="image/*">
  </div>

  <div class="workspace" id="workspace">
    <div class="source-preview">
      <img id="sourceImg" src="" alt="Source">
      <div class="source-info">
        <h3 id="fileName">image.png</h3>
        <p id="fileInfo">0 x 0 px</p>
      </div>
      <button class="btn-outline" onclick="resetAll()"><i data-lucide="upload" style="width:14px;height:14px"></i> Đổi ảnh</button>
    </div>

    <div class="sizes-section">
      <h2><i data-lucide="grid-3x3" style="width:20px;height:20px"></i> Các kích thước Favicon</h2>
      <div class="sizes-grid" id="sizesGrid"></div>
    </div>

    <div class="download-all-section">
      <button class="btn" onclick="downloadAll()">
        <i data-lucide="archive" style="width:18px;height:18px"></i> Tải tất cả (ZIP)
      </button>
    </div>

    <div class="meta-section">
      <div class="meta-header">
        <div class="left"><i data-lucide="code-2" style="width:18px;height:18px"></i> HTML Meta Tags</div>
        <button class="btn-outline btn-sm" onclick="copyMeta()"><i data-lucide="copy" style="width:14px;height:14px"></i> Sao chép</button>
      </div>
      <div class="meta-code" id="metaCode"></div>
    </div>
  </div>
</div>

<div class="copy-toast" id="toast">Đã sao chép!</div>

<script>
var sizes = [16, 32, 48, 64, 128, 256];
var sizeLabels = {
  16: 'Browser Tab', 32: 'Taskbar', 48: 'Desktop',
  64: 'High-DPI Tab', 128: 'Chrome Web Store', 256: 'Apple Touch'
};
var sourceImage = null;
var canvases = {};

var uploadZone = document.getElementById('uploadZone');
var fileInput = document.getElementById('fileInput');
var workspaceEl = document.getElementById('workspace');

uploadZone.addEventListener('click', function() { fileInput.click(); });
uploadZone.addEventListener('dragover', function(e) { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', function() { uploadZone.classList.remove('dragover'); });
uploadZone.addEventListener('drop', function(e) {
  e.preventDefault(); uploadZone.classList.remove('dragover');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', function(e) { if (e.target.files[0]) handleFile(e.target.files[0]); });

function handleFile(file) {
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      sourceImage = img;
      document.getElementById('sourceImg').src = e.target.result;
      document.getElementById('fileName').textContent = file.name;
      document.getElementById('fileInfo').textContent = img.width + ' x ' + img.height + ' px';
      uploadZone.style.display = 'none';
      workspaceEl.classList.add('active');
      generateFavicons();
      generateMeta();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function generateFavicons() {
  var grid = document.getElementById('sizesGrid');
  // Clear grid safely
  while (grid.firstChild) grid.removeChild(grid.firstChild);
  canvases = {};

  for (var i = 0; i < sizes.length; i++) {
    (function(s) {
      var card = document.createElement('div');
      card.className = 'size-card';

      var wrap = document.createElement('div');
      wrap.className = 'preview-wrap';

      var canvas = document.createElement('canvas');
      canvas.width = s; canvas.height = s;
      var ctx = canvas.getContext('2d');
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';

      // Crop to square from center
      var src = sourceImage;
      var cropSize = Math.min(src.width, src.height);
      var sx = (src.width - cropSize) / 2;
      var sy = (src.height - cropSize) / 2;
      ctx.drawImage(src, sx, sy, cropSize, cropSize, 0, 0, s, s);

      var displaySize = Math.min(s, 64);
      canvas.style.width = displaySize + 'px';
      canvas.style.height = displaySize + 'px';

      canvases[s] = canvas;
      wrap.appendChild(canvas);

      var label = document.createElement('div');
      label.className = 'label';
      label.textContent = s + 'x' + s;

      var sublabel = document.createElement('div');
      sublabel.className = 'sublabel';
      sublabel.textContent = sizeLabels[s] || '';

      var btn = document.createElement('button');
      btn.className = 'btn-outline btn-sm';
      btn.textContent = 'Tải';
      btn.setAttribute('data-size', String(s));
      btn.addEventListener('click', function() {
        downloadSingle(parseInt(this.getAttribute('data-size')));
      });

      card.appendChild(wrap);
      card.appendChild(label);
      card.appendChild(sublabel);
      card.appendChild(btn);
      grid.appendChild(card);
    })(sizes[i]);
  }
  lucide.createIcons();
}

function generateMeta() {
  var lines = [
    '<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">',
    '<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">',
    '<link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png">',
    '<link rel="icon" type="image/png" sizes="64x64" href="/favicon-64x64.png">',
    '<link rel="icon" type="image/png" sizes="128x128" href="/favicon-128x128.png">',
    '<link rel="apple-touch-icon" sizes="256x256" href="/favicon-256x256.png">'
  ];
  document.getElementById('metaCode').textContent = lines.join('\n');
}

function downloadSingle(size) {
  var canvas = canvases[size];
  if (!canvas) return;
  canvas.toBlob(function(blob) {
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = 'favicon-' + size + 'x' + size + '.png';
    a.click(); URL.revokeObjectURL(url);
  }, 'image/png');
}

function downloadAll() {
  var files = [];
  var pending = sizes.length;

  for (var i = 0; i < sizes.length; i++) {
    (function(s) {
      var canvas = canvases[s];
      canvas.toBlob(function(blob) {
        var reader = new FileReader();
        reader.onload = function() {
          files.push({ name: 'favicon-' + s + 'x' + s + '.png', data: new Uint8Array(reader.result) });
          pending--;
          if (pending === 0) buildZip(files);
        };
        reader.readAsArrayBuffer(blob);
      }, 'image/png');
    })(sizes[i]);
  }
}

function buildZip(files) {
  var localHeaders = [];
  var centralHeaders = [];
  var offset = 0;

  for (var i = 0; i < files.length; i++) {
    var f = files[i];
    var nameBytes = new TextEncoder().encode(f.name);

    var local = new Uint8Array(30 + nameBytes.length + f.data.length);
    var v = new DataView(local.buffer);
    v.setUint32(0, 0x04034b50, true);
    v.setUint16(4, 20, true);
    v.setUint16(6, 0, true);
    v.setUint16(8, 0, true);
    v.setUint16(10, 0, true);
    v.setUint16(12, 0, true);
    var crc = crc32(f.data);
    v.setUint32(14, crc, true);
    v.setUint32(18, f.data.length, true);
    v.setUint32(22, f.data.length, true);
    v.setUint16(26, nameBytes.length, true);
    v.setUint16(28, 0, true);
    local.set(nameBytes, 30);
    local.set(f.data, 30 + nameBytes.length);
    localHeaders.push(local);

    var central = new Uint8Array(46 + nameBytes.length);
    var cv = new DataView(central.buffer);
    cv.setUint32(0, 0x02014b50, true);
    cv.setUint16(4, 20, true);
    cv.setUint16(6, 20, true);
    cv.setUint16(8, 0, true);
    cv.setUint16(10, 0, true);
    cv.setUint16(12, 0, true);
    cv.setUint16(14, 0, true);
    cv.setUint32(16, crc, true);
    cv.setUint32(20, f.data.length, true);
    cv.setUint32(24, f.data.length, true);
    cv.setUint16(28, nameBytes.length, true);
    cv.setUint16(30, 0, true);
    cv.setUint16(32, 0, true);
    cv.setUint16(34, 0, true);
    cv.setUint16(36, 0, true);
    cv.setUint32(38, 0, true);
    cv.setUint32(42, offset, true);
    central.set(nameBytes, 46);
    centralHeaders.push(central);

    offset += local.length;
  }

  var centralOffset = offset;
  var centralSize = 0;
  for (var j = 0; j < centralHeaders.length; j++) centralSize += centralHeaders[j].length;

  var eocdr = new Uint8Array(22);
  var ev = new DataView(eocdr.buffer);
  ev.setUint32(0, 0x06054b50, true);
  ev.setUint16(4, 0, true);
  ev.setUint16(6, 0, true);
  ev.setUint16(8, files.length, true);
  ev.setUint16(10, files.length, true);
  ev.setUint32(12, centralSize, true);
  ev.setUint32(16, centralOffset, true);
  ev.setUint16(20, 0, true);

  var totalSize = offset + centralSize + 22;
  var zip = new Uint8Array(totalSize);
  var pos = 0;
  for (var k = 0; k < localHeaders.length; k++) {
    zip.set(localHeaders[k], pos); pos += localHeaders[k].length;
  }
  for (var l = 0; l < centralHeaders.length; l++) {
    zip.set(centralHeaders[l], pos); pos += centralHeaders[l].length;
  }
  zip.set(eocdr, pos);

  var blob = new Blob([zip], { type: 'application/zip' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'favicons.zip';
  a.click(); URL.revokeObjectURL(url);
}

function crc32(data) {
  var table = crc32.table;
  if (!table) {
    table = crc32.table = new Uint32Array(256);
    for (var i = 0; i < 256; i++) {
      var c = i;
      for (var j = 0; j < 8; j++) {
        c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
      }
      table[i] = c;
    }
  }
  var crc = 0xFFFFFFFF;
  for (var k = 0; k < data.length; k++) {
    crc = table[(crc ^ data[k]) & 0xFF] ^ (crc >>> 8);
  }
  return (crc ^ 0xFFFFFFFF) >>> 0;
}

function copyMeta() {
  var code = document.getElementById('metaCode').textContent;
  navigator.clipboard.writeText(code).then(function() { showToast(); });
}

function resetAll() {
  sourceImage = null;
  canvases = {};
  uploadZone.style.display = '';
  workspaceEl.classList.remove('active');
  fileInput.value = '';
}

function showToast() {
  var t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2000);
}

// Dark mode
if (localStorage.getItem('math-dark') === 'true') document.body.classList.add('dark');
document.getElementById('darkToggle').addEventListener('click', function() {
  document.body.classList.toggle('dark');
  localStorage.setItem('math-dark', document.body.classList.contains('dark'));
});

lucide.createIcons();
</script>
</body>
</html>
