<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#07060e;--s1:#0c0b16;--s2:#11101d;--s3:#1a1829;
  --sidebar:#090812;--sidebar-w:280px;
  --glass:rgba(140,120,255,.02);--glass2:rgba(140,120,255,.04);--glass3:rgba(140,120,255,.08);
  --border:rgba(140,120,255,.08);--border2:rgba(140,120,255,.12);--border3:rgba(140,120,255,.18);
  --t1:#ededf8;--t2:#9490b8;--t3:#5e5a7e;--t4:#3d3960;
  --pri:#8b7aff;--pri2:#b4a6ff;--pri-g:linear-gradient(135deg,#9b8aff,#6c5ce7);
  --cyan:#64d2ff;--cyan2:#38bdf8;--cyan-dim:rgba(100,210,255,.06);
  --grn:#6ee7b7;--grn2:#34d399;--grn-g:linear-gradient(135deg,#6ee7b7,#34d399);
  --amber:#fbbf24;--amber-dim:rgba(251,191,36,.08);
  --r:12px;--r2:16px;
  --ease:cubic-bezier(.4,0,.2,1);
}
html{-webkit-font-smoothing:antialiased;height:100%}
body{font-family:'General Sans',sans-serif;background:var(--bg);color:var(--t1);height:100vh;overflow:hidden;display:flex;gap:12px}

/* ═══ SIDEBAR ═══ */
.sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);height:100vh;
  background:linear-gradient(180deg,#0a0914 0%,#080810 100%);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;position:relative;z-index:10;
  transition:transform .3s var(--ease);
}

/* Logo area */
.brand{padding:16px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.brand-row{display:flex;align-items:center;gap:11px}
.logo{
  width:34px;height:34px;border-radius:9px;background:var(--pri-g);
  display:flex;align-items:center;justify-content:center;font-size:1rem;
  box-shadow:0 4px 16px rgba(139,122,255,.3),inset 0 1px 0 rgba(255,255,255,.15);
}
.brand h1{font-size:1.2rem;font-weight:800;letter-spacing:-.5px}
.brand h1 span{background:linear-gradient(135deg,var(--pri2),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.brand-sub{font-size:.68rem;color:var(--t3);margin-top:6px;letter-spacing:.3px;text-transform:uppercase;font-weight:600}

/* Upload zone */
.upload-zone{padding:16px;flex-shrink:0}
.upload-btn{
  width:100%;padding:14px;border:1.5px dashed var(--border2);border-radius:var(--r);
  background:var(--glass);cursor:pointer;transition:.25s var(--ease);
  display:flex;align-items:center;gap:10px;
}
.upload-btn:hover{border-color:var(--pri);background:rgba(123,108,240,.04)}
.upload-btn.drag{border-color:var(--pri);background:rgba(123,108,240,.06);transform:scale(1.01)}
.upload-ico{
  width:36px;height:36px;border-radius:9px;background:rgba(139,122,255,.08);
  border:1px solid rgba(139,122,255,.12);display:flex;align-items:center;justify-content:center;
  color:var(--pri2);flex-shrink:0;transition:.2s;
}
.upload-btn:hover .upload-ico{transform:translateY(-1px)}
.upload-txt{font-size:.75rem;color:var(--t2);line-height:1.4}
.upload-txt strong{color:var(--pri2);font-weight:600}
.upload-txt .sm{font-size:.65rem;color:var(--t3);margin-top:2px}

/* Gallery section */
.gallery-section{flex:1;overflow-y:auto;padding:0 16px 16px;scrollbar-width:thin;scrollbar-color:var(--s3) transparent}
.gallery-section::-webkit-scrollbar{width:4px}
.gallery-section::-webkit-scrollbar-thumb{background:var(--s3);border-radius:4px}
.sec-label{
  font-size:.65rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;
  padding:12px 0 10px;display:flex;align-items:center;gap:8px;
  position:sticky;top:0;background:var(--sidebar);z-index:2;
}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border)}
.gallery-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}

/* Thumbnail card */
.thumb{
  position:relative;border-radius:10px;overflow:hidden;cursor:pointer;
  aspect-ratio:1;background:var(--s2);border:2px solid transparent;
  transition:.2s var(--ease);
}
.thumb:hover{border-color:var(--border2);transform:translateY(-1px)}
.thumb.active{border-color:var(--pri);box-shadow:0 0 0 1px rgba(139,122,255,.15),0 4px 16px rgba(139,122,255,.1)}
.thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s var(--ease)}
.thumb:hover img{transform:scale(1.05)}
.thumb-overlay{
  position:absolute;inset:0;background:linear-gradient(to top,rgba(8,9,13,.7) 0%,transparent 50%);
  opacity:0;transition:.2s;display:flex;align-items:flex-end;padding:8px;
}
.thumb:hover .thumb-overlay{opacity:1}
.thumb-name{font-size:.6rem;color:var(--t2);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.thumb-check{
  position:absolute;top:6px;right:6px;width:18px;height:18px;border-radius:50%;
  background:var(--pri);display:flex;align-items:center;justify-content:center;
  font-size:.6rem;color:#fff;font-weight:800;opacity:0;transform:scale(.5);
  transition:.2s var(--ease);box-shadow:0 2px 8px rgba(139,122,255,.35);
}
.thumb.active .thumb-check{opacity:1;transform:scale(1)}

/* ═══ SIDEBAR RIGHT ═══ */
.sidebar-right{
  width:0;min-width:0;height:100vh;overflow:hidden;
  background:linear-gradient(180deg,#0a0914 0%,#080810 100%);
  border-left:1px solid transparent;
  display:flex;flex-direction:column;
  transition:width .3s var(--ease),min-width .3s var(--ease),border-color .3s var(--ease);
  flex-shrink:0;
}
.sidebar-right.open{
  width:var(--sidebar-w);min-width:var(--sidebar-w);
  border-left-color:var(--border);
}
.sr-header{
  padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(139,122,255,.02);
}
.sr-title{font-size:.78rem;font-weight:700;color:var(--t1);display:flex;align-items:center;gap:8px}
.sr-close{
  width:28px;height:28px;border-radius:7px;border:1px solid var(--border2);
  background:var(--glass2);color:var(--t2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:.15s var(--ease);
}
.sr-close:hover{background:var(--glass3);color:var(--t1)}
.sr-scroll{
  flex:1;overflow-y:auto;overflow-x:hidden;padding:0;
  scrollbar-width:thin;scrollbar-color:var(--s3) transparent;
}
.sr-scroll::-webkit-scrollbar{width:4px}
.sr-scroll::-webkit-scrollbar-thumb{background:var(--s3);border-radius:4px}
.sr-section{padding:14px 16px;border-bottom:1px solid var(--border)}
.sr-label{
  font-size:.6rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;
  margin-bottom:10px;display:flex;align-items:center;gap:6px;
}
.sr-label svg{opacity:.5}

/* Quick actions */
.quick-actions{display:flex;gap:6px}
.qa-btn{
  flex:1;padding:8px;border-radius:8px;border:1px solid var(--border2);
  background:var(--glass2);color:var(--t2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:.2s var(--ease);
}
.qa-btn:hover{background:var(--glass3);color:var(--t1);border-color:var(--border3)}
.qa-btn:active{transform:scale(.95)}

/* Social presets */
.social-presets{display:flex;flex-direction:column;gap:4px}
.social-preset{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 10px;border-radius:8px;border:1px solid transparent;
  background:transparent;color:var(--t2);cursor:pointer;
  transition:.15s var(--ease);font-size:.68rem;font-weight:500;
  font-family:'General Sans',sans-serif;width:100%;text-align:left;
}
.social-preset:hover{background:var(--glass2);border-color:var(--border)}
.social-preset .sp-name{font-weight:600;color:var(--t1)}
.social-preset .sp-size{font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--t3)}

/* Info chips + zoom (in sidebar right) */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.info-chip{padding:6px 8px;border-radius:8px;background:var(--glass2);border:1px solid var(--border)}
.info-chip .lbl{font-size:.55rem;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.info-chip .val{font-family:'JetBrains Mono',monospace;font-size:.64rem;font-weight:500;color:var(--pri2)}
.zoom-row{display:flex;align-items:center;gap:6px}
.zoom-row .zoom-btn{
  width:26px;height:26px;border:1px solid var(--border2);border-radius:7px;
  background:var(--glass2);color:var(--t2);font-size:.8rem;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s var(--ease);
}
.zoom-row .zoom-btn:hover{background:var(--glass3);color:var(--t1)}
.zoom-slider{
  flex:1;-webkit-appearance:none;appearance:none;height:3px;
  background:var(--border2);border-radius:2px;outline:none;cursor:pointer;
}
.zoom-slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:12px;height:12px;border-radius:50%;
  background:var(--pri);border:2px solid rgba(255,255,255,.3);cursor:pointer;
  box-shadow:0 1px 4px rgba(139,122,255,.3);
}
.zoom-label{
  font-family:'JetBrains Mono',monospace;font-size:.62rem;font-weight:600;
  color:var(--t2);min-width:32px;text-align:right;
}

/* Panel toggle button */
.btn-panel-toggle{
  background:var(--glass2);color:var(--t2);border:1px solid var(--border2);border-radius:8px;
  padding:0;width:32px;height:32px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:.2s var(--ease);
}
.btn-panel-toggle:hover{background:var(--glass3);color:var(--t1)}
.btn-panel-toggle.active{background:rgba(139,122,255,.12);color:var(--pri2);border-color:rgba(139,122,255,.2)}

/* ═══ MAIN ═══ */
.main{
  flex:1;display:flex;flex-direction:column;min-width:0;height:100vh;position:relative;
  border-radius:var(--r2) var(--r2) 0 0;overflow:hidden;
  background:
    radial-gradient(ellipse at 20% 0%,rgba(108,92,231,.08),transparent 50%),
    radial-gradient(ellipse at 80% 100%,rgba(56,189,248,.05),transparent 50%),
    radial-gradient(ellipse at 50% 50%,rgba(139,122,255,.03),transparent 60%),
    linear-gradient(160deg,#0c0b18 0%,#0a0e1a 40%,#080d15 100%);
}

/* Top toolbar */
.topbar{
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;
  padding:12px 24px;border-bottom:1px solid var(--border);flex-shrink:0;
  background:rgba(10,11,20,.65);backdrop-filter:blur(16px);position:relative;z-index:5;
}
.topbar .left{display:flex;align-items:center;gap:12px}
.topbar .dot{width:7px;height:7px;border-radius:50%;background:var(--pri);box-shadow:0 0 6px rgba(139,122,255,.4)}
.topbar .fname{font-size:.78rem;font-weight:600;color:var(--t2)}
.topbar .right{display:flex;align-items:center;gap:8px}

/* Empty state */
.empty-state{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:40px;animation:fadeUp .6s var(--ease);position:relative;
}
.empty-state.hidden{display:none}
.empty-inner{text-align:center;position:relative;z-index:1}

/* Floating orbs background */
.empty-state::before{
  content:'';position:absolute;width:300px;height:300px;
  top:20%;left:30%;border-radius:50%;
  background:radial-gradient(circle,rgba(108,92,231,.12),transparent 70%);
  filter:blur(60px);animation:orbFloat 8s ease-in-out infinite;
}
.empty-state::after{
  content:'';position:absolute;width:250px;height:250px;
  bottom:20%;right:25%;border-radius:50%;
  background:radial-gradient(circle,rgba(56,189,248,.08),transparent 70%);
  filter:blur(50px);animation:orbFloat 8s ease-in-out 4s infinite;
}
@keyframes orbFloat{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,-15px)}}

.empty-graphic{
  width:100px;height:100px;margin:0 auto 28px;position:relative;
}
.empty-graphic::before{
  content:'';position:absolute;inset:-12px;border-radius:28px;
  background:linear-gradient(135deg,rgba(139,122,255,.15),rgba(56,189,248,.1));
  filter:blur(24px);animation:emptyGlow 4s ease-in-out infinite;
}
@keyframes emptyGlow{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:.9;transform:scale(1.06)}}
.empty-icon-wrap{
  position:absolute;inset:0;border-radius:22px;
  background:linear-gradient(135deg,rgba(139,122,255,.08),rgba(56,189,248,.05));
  border:1px solid rgba(139,122,255,.15);
  display:flex;align-items:center;justify-content:center;z-index:1;
  backdrop-filter:blur(8px);
}
.empty-icon-wrap svg{color:var(--pri2);opacity:.8}
.empty-state h2{font-size:1.2rem;font-weight:700;color:var(--t1);margin-bottom:8px;letter-spacing:-.3px}
.empty-state p{font-size:.8rem;color:var(--t3);max-width:300px;line-height:1.6;margin:0 auto}
.empty-divider{
  width:40px;height:2px;margin:16px auto;border-radius:2px;
  background:linear-gradient(90deg,var(--pri),var(--cyan2));opacity:.3;
}
.empty-shortcuts{
  margin-top:16px;display:flex;align-items:center;justify-content:center;gap:16px;
  font-size:.68rem;color:var(--t4);
}
.empty-shortcuts .shortcut{display:flex;align-items:center;gap:5px}
.empty-shortcuts kbd{
  background:rgba(139,122,255,.06);padding:3px 7px;border-radius:5px;
  border:1px solid rgba(139,122,255,.12);border-bottom-width:2px;
  font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--t3);
}

/* Canvas workspace */
.workspace{
  flex:1;display:none;flex-direction:column;min-height:0;overflow:auto;
  scrollbar-width:thin;scrollbar-color:var(--s3) transparent;
  background:
    radial-gradient(ellipse at 15% 10%,rgba(108,92,231,.07),transparent 45%),
    radial-gradient(ellipse at 85% 90%,rgba(56,189,248,.05),transparent 45%),
    linear-gradient(180deg,rgba(12,11,24,.3),rgba(8,13,21,.5));
  padding:24px;
}
.workspace::-webkit-scrollbar{width:6px}
.workspace::-webkit-scrollbar-thumb{background:var(--s3);border-radius:4px}
.workspace.on{display:flex}

.cw{
  position:relative;flex-shrink:0;user-select:none;-webkit-user-select:none;margin:0 auto;
  border-radius:12px;overflow:hidden;
  box-shadow:0 8px 40px rgba(0,0,0,.35),0 0 0 1px rgba(139,122,255,.08);
}
.cw canvas{width:100%;display:block}

/* Overlay: 4 rects around crop */
.ov{position:absolute;background:rgba(0,0,0,.55);pointer-events:none;z-index:2}

/* Crop box */
.crop{position:absolute;z-index:3;border:2px solid var(--pri2);box-shadow:0 0 0 1px rgba(139,122,255,.2);cursor:grab}
.crop.grabbing{cursor:grabbing}

/* Edge handles */
.edge{position:absolute;z-index:5}
.edge.t{top:-2px;left:20%;right:20%;height:6px;cursor:ns-resize}
.edge.b{bottom:-2px;left:20%;right:20%;height:6px;cursor:ns-resize}
.edge.l{left:-2px;top:20%;bottom:20%;width:6px;cursor:ew-resize}
.edge.r{right:-2px;top:20%;bottom:20%;width:6px;cursor:ew-resize}

/* Corner handles */
.corner{
  position:absolute;width:16px;height:16px;z-index:6;border-radius:4px;
  background:var(--pri);border:2px solid rgba(255,255,255,.35);
  box-shadow:0 2px 8px rgba(139,122,255,.35);transition:transform .15s var(--ease);
}
.corner:hover{transform:scale(1.2)}
.corner.tl{top:-8px;left:-8px;cursor:nwse-resize}
.corner.tr{top:-8px;right:-8px;cursor:nesw-resize}
.corner.bl{bottom:-8px;left:-8px;cursor:nesw-resize}
.corner.br{bottom:-8px;right:-8px;cursor:nwse-resize}

/* Edge midpoint pills */
.mid-pill{
  position:absolute;z-index:6;background:var(--pri);border:2px solid rgba(255,255,255,.3);
  box-shadow:0 2px 8px rgba(139,122,255,.3);display:flex;align-items:center;justify-content:center;gap:1.5px;
  transition:transform .15s var(--ease);
}
.mid-pill:hover{transform:scale(1.15)}
.mid-pill i{background:rgba(255,255,255,.5);border-radius:1px}
.mid-pill.h{width:36px;height:14px;border-radius:7px;left:50%;margin-left:-18px;cursor:ns-resize}
.mid-pill.h i{width:1.5px;height:6px}
.mid-pill.v{width:14px;height:36px;border-radius:7px;top:50%;margin-top:-18px;cursor:ew-resize}
.mid-pill.v i{width:6px;height:1.5px}
.mid-pill.mt{top:-7px}.mid-pill.mb{bottom:-7px}
.mid-pill.ml{left:-7px}.mid-pill.mr{right:-7px}

/* Size tag */
.size-tag{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:7;
  font-family:'JetBrains Mono',monospace;font-size:.67rem;font-weight:600;
  padding:5px 12px;border-radius:8px;pointer-events:none;
  background:rgba(8,9,13,.9);color:var(--t1);border:1px solid var(--border2);
  backdrop-filter:blur(8px);white-space:nowrap;
}

/* Guide lines */
.guide{position:absolute;z-index:4;pointer-events:none;opacity:.2}
.guide.gh{left:0;right:0;height:1px;border-top:1px dashed var(--pri2)}
.guide.gv{top:0;bottom:0;width:1px;border-left:1px dashed var(--pri2)}

/* Header buttons */
.hdr-btns{display:flex;gap:8px}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:7px;
  padding:8px 16px;border:none;border-radius:9px;
  font-family:inherit;font-size:.76rem;font-weight:700;cursor:pointer;transition:.2s var(--ease);
}
.btn-dl{background:var(--pri-g);color:#fff;box-shadow:0 4px 16px rgba(139,122,255,.25);border-radius:10px}
.btn-dl:hover{box-shadow:0 6px 24px rgba(139,122,255,.35);transform:translateY(-1px)}

<script>
const $=id=>document.getElementById(id);

// ═══ SAMPLE IMAGES (picsum.photos) ═══
var sampleImages = [
  { name: 'Mountain Lake',   id: 29,   w: 1200, h: 800 },
  { name: 'City Night',      id: 1003, w: 1200, h: 800 },
  { name: 'Ocean Cliff',     id: 1015, w: 1200, h: 800 },
  { name: 'Forest Road',     id: 1039, w: 1200, h: 800 },
  { name: 'Desert Sky',      id: 1035, w: 1200, h: 800 },
  { name: 'Northern Light',  id: 1041, w: 1200, h: 800 },
  { name: 'Coastal Road',    id: 1036, w: 1200, h: 1600 },
  { name: 'Misty Valley',    id: 1043, w: 1200, h: 1800 },
];

// Build gallery
var gallery = $('gallery');
sampleImages.forEach(function(sample) {
  var thumbUrl = 'https://picsum.photos/id/' + sample.id + '/300/300';
  var fullUrl = 'https://picsum.photos/id/' + sample.id + '/' + sample.w + '/' + sample.h;

  var div = document.createElement('div');
  div.className = 'thumb';

  var imgEl = document.createElement('img');
  imgEl.src = thumbUrl;
  imgEl.alt = sample.name;
  imgEl.loading = 'lazy';
  div.appendChild(imgEl);

  var overlay = document.createElement('div');
  overlay.className = 'thumb-overlay';
  var nameSpan = document.createElement('span');
  nameSpan.className = 'thumb-name';
  nameSpan.textContent = sample.name;
  overlay.appendChild(nameSpan);
  div.appendChild(overlay);

  var check = document.createElement('div');
  check.className = 'thumb-check';
  check.textContent = '\u2713';
  div.appendChild(check);

  div.onclick = function() {
    clearActiveThumb();
    div.classList.add('active');
    fName = sample.name;
    var myId = ++loadId;
    var newImg = new Image();
    newImg.crossOrigin = 'anonymous';
    newImg.onload = function() {
      if (myId !== loadId) return;
      img = newImg;
      init();
    };
    newImg.src = fullUrl;
  };
  gallery.appendChild(div);
});

// ═══ STATE ═══
var img = null, fName = 'screenshot', loadId = 0;
var cL = .1, cT = .1, cR = .9, cB = .9;
var zoomLevel = 100;
var ZOOM_STEPS = [25, 50, 75, 100];
var cropRatio = null; // null = free
var adjustments = {brightness:100, contrast:100, saturation:100, sharpen:0};
var exportFormat = 'png';
var exportQuality = 85;
var exportResizeOn = false;
var exportResizeW = 0, exportResizeH = 0;
var exportRatioLock = true;
var exportSizeDebounce = null;

var uploadBtn = $('uploadBtn'), fi = $('fi');
var ws = $('ws'), cw = $('cw'), cv = $('cv');
var crop = $('crop'), prevCv = $('prevCv');
var emptyState = $('emptyState');

// ═══ UPLOAD ═══
uploadBtn.onclick = function() { fi.click(); };
uploadBtn.ondragover = function(e) { e.preventDefault(); uploadBtn.classList.add('drag'); };
uploadBtn.ondragleave = function() { uploadBtn.classList.remove('drag'); };
uploadBtn.ondrop = function(e) { e.preventDefault(); uploadBtn.classList.remove('drag'); loadF(e.dataTransfer.files[0]); };
fi.onchange = function(e) { loadF(e.target.files[0]); };

// Allow drop on main area
var mainEl = document.querySelector('.main');
mainEl.ondragover = function(e) { e.preventDefault(); uploadBtn.classList.add('drag'); };
mainEl.ondragleave = function() { uploadBtn.classList.remove('drag'); };
mainEl.ondrop = function(e) { e.preventDefault(); uploadBtn.classList.remove('drag'); loadF(e.dataTransfer.files[0]); };

function clearActiveThumb() {
  document.querySelectorAll('.thumb.active').forEach(function(t) { t.classList.remove('active'); });
}

function loadF(f) {
  if (!f || !f.type.startsWith('image/')) return;
  clearActiveThumb();
  fName = f.name.replace(/\.[^.]+$/, '');
  var myId = ++loadId;
  var r = new FileReader();
  r.onload = function(e) {
    var newImg = new Image();
    newImg.onload = function() {
      if (myId !== loadId) return;
      img = newImg;
      init();
    };
    newImg.src = e.target.result;
  };
  r.readAsDataURL(f);
}

function init() {
  emptyState.classList.add('hidden');
  ws.classList.add('on');
  $('hdrBtns').style.display = 'flex';
  $('topbar').style.display = 'flex';
  zoomLevel = 100;
  applyZoom();
  cv.width = img.naturalWidth; cv.height = img.naturalHeight;
  cv.getContext('2d').drawImage(img, 0, 0);
  $('fname').textContent = fName;
  $('fres').textContent = img.naturalWidth + ' \u00d7 ' + img.naturalHeight + ' px';
  cL = 0; cR = 1;
  cT = 0;
  cB = Math.min(1, 500 / img.naturalHeight);
  showPreview = false;
  $('previewModal').classList.remove('on');
  // Wait for layout to settle before positioning crop overlay
  requestAnimationFrame(function() {
    requestAnimationFrame(update);
  });
}

function update() {
  var l = cL * 100, t = cT * 100, r = cR * 100, b = cB * 100;

  $('ovT').style.cssText = 'top:0;left:0;right:0;height:' + t + '%';
  $('ovB').style.cssText = 'bottom:0;left:0;right:0;height:' + (100 - b) + '%';
  $('ovL').style.cssText = 'top:' + t + '%;left:0;width:' + l + '%;height:' + (b - t) + '%';
  $('ovR').style.cssText = 'top:' + t + '%;right:0;width:' + (100 - r) + '%;height:' + (b - t) + '%';

  crop.style.left = l + '%';
  crop.style.top = t + '%';
  crop.style.width = (r - l) + '%';
  crop.style.height = (b - t) + '%';

  var pxFn = function(v) { return Math.round(v * img.naturalWidth); };
  var pyFn = function(v) { return Math.round(v * img.naturalHeight); };
  var w = pxFn(cR) - pxFn(cL), h = pyFn(cB) - pyFn(cT);

  $('sizeTag').textContent = w + ' \u00d7 ' + h;
  $('cropInfo').textContent = w + ' \u00d7 ' + h + ' px';
}

// Drag system
var dragType = null, startX, startY, startCL, startCT, startCR, startCB;

function beginDrag(type, e) {
  e.preventDefault(); e.stopPropagation();
  dragType = type;
  var p = e.touches ? e.touches[0] : e;
  startX = p.clientX; startY = p.clientY;
  startCL = cL; startCT = cT; startCR = cR; startCB = cB;
  if (type === 'move') crop.classList.add('grabbing');
  document.addEventListener('mousemove', onDrag);
  document.addEventListener('mouseup', endDrag);
  document.addEventListener('touchmove', onDrag, { passive: false });
  document.addEventListener('touchend', endDrag);
}

function onDrag(e) {
  if (!dragType) return;
  e.preventDefault();
  var p = e.touches ? e.touches[0] : e;
  var cvRect = cv.getBoundingClientRect();
  var dx = (p.clientX - startX) / cvRect.width;
  var dy = (p.clientY - startY) / cvRect.height;
  var MIN = 0.03;

  if (!cropRatio) {
    // Free mode
    switch (dragType) {
      case 'move':
        var w = startCR - startCL, h = startCB - startCT;
        var nl = startCL + dx, nt = startCT + dy;
        nl = Math.max(0, Math.min(1 - w, nl)); nt = Math.max(0, Math.min(1 - h, nt));
        cL = nl; cT = nt; cR = nl + w; cB = nt + h; break;
      case 't': cT = clamp(startCT + dy, 0, cB - MIN); break;
      case 'b': cB = clamp(startCB + dy, cT + MIN, 1); break;
      case 'l': cL = clamp(startCL + dx, 0, cR - MIN); break;
      case 'r': cR = clamp(startCR + dx, cL + MIN, 1); break;
      case 'tl': cT = clamp(startCT + dy, 0, cB - MIN); cL = clamp(startCL + dx, 0, cR - MIN); break;
      case 'tr': cT = clamp(startCT + dy, 0, cB - MIN); cR = clamp(startCR + dx, cL + MIN, 1); break;
      case 'bl': cB = clamp(startCB + dy, cT + MIN, 1); cL = clamp(startCL + dx, 0, cR - MIN); break;
      case 'br': cB = clamp(startCB + dy, cT + MIN, 1); cR = clamp(startCR + dx, cL + MIN, 1); break;
    }
  } else {
    // Ratio-locked mode
    // ratioFrac = ratio in fractional coords (accounts for image aspect)
    var imgAspect = img.naturalWidth / img.naturalHeight;
    var ratioFrac = cropRatio / imgAspect;

    switch (dragType) {
      case 'move':
        var mw = startCR - startCL, mh = startCB - startCT;
        var mnl = startCL + dx, mnt = startCT + dy;
        mnl = Math.max(0, Math.min(1 - mw, mnl)); mnt = Math.max(0, Math.min(1 - mh, mnt));
        cL = mnl; cT = mnt; cR = mnl + mw; cB = mnt + mh; break;
      case 'r':
        cR = clamp(startCR + dx, cL + MIN, 1);
        var newW_r = cR - cL;
        var newH_r = newW_r / ratioFrac;
        var centerY_r = (startCT + startCB) / 2;
        cT = clamp(centerY_r - newH_r / 2, 0, 1 - MIN);
        cB = cT + newH_r;
        if (cB > 1) { cB = 1; cT = cB - newH_r; if (cT < 0) cT = 0; }
        break;
      case 'l':
        cL = clamp(startCL + dx, 0, cR - MIN);
        var newW_l = cR - cL;
        var newH_l = newW_l / ratioFrac;
        var centerY_l = (startCT + startCB) / 2;
        cT = clamp(centerY_l - newH_l / 2, 0, 1 - MIN);
        cB = cT + newH_l;
        if (cB > 1) { cB = 1; cT = cB - newH_l; if (cT < 0) cT = 0; }
        break;
      case 't':
        cT = clamp(startCT + dy, 0, cB - MIN);
        var newH_t = cB - cT;
        var newW_t = newH_t * ratioFrac;
        var centerX_t = (startCL + startCR) / 2;
        cL = clamp(centerX_t - newW_t / 2, 0, 1 - MIN);
        cR = cL + newW_t;
        if (cR > 1) { cR = 1; cL = cR - newW_t; if (cL < 0) cL = 0; }
        break;
      case 'b':
        cB = clamp(startCB + dy, cT + MIN, 1);
        var newH_b = cB - cT;
        var newW_b = newH_b * ratioFrac;
        var centerX_b = (startCL + startCR) / 2;
        cL = clamp(centerX_b - newW_b / 2, 0, 1 - MIN);
        cR = cL + newW_b;
        if (cR > 1) { cR = 1; cL = cR - newW_b; if (cL < 0) cL = 0; }
        break;
      case 'br':
        cR = clamp(startCR + dx, cL + MIN, 1);
        var bw = cR - cL;
        var bh = bw / ratioFrac;
        cB = cT + bh;
        if (cB > 1) { cB = 1; bh = cB - cT; bw = bh * ratioFrac; cR = cL + bw; }
        break;
      case 'bl':
        cL = clamp(startCL + dx, 0, cR - MIN);
        var blw = cR - cL;
        var blh = blw / ratioFrac;
        cB = cT + blh;
        if (cB > 1) { cB = 1; blh = cB - cT; blw = blh * ratioFrac; cL = cR - blw; if (cL < 0) cL = 0; }
        break;
      case 'tl':
        cL = clamp(startCL + dx, 0, cR - MIN);
        var tlw = cR - cL;
        var tlh = tlw / ratioFrac;
        cT = cB - tlh;
        if (cT < 0) { cT = 0; tlh = cB - cT; tlw = tlh * ratioFrac; cL = cR - tlw; if (cL < 0) cL = 0; }
        break;
      case 'tr':
        cR = clamp(startCR + dx, cL + MIN, 1);
        var trw = cR - cL;
        var trh = trw / ratioFrac;
        cT = cB - trh;
        if (cT < 0) { cT = 0; trh = cB - cT; trw = trh * ratioFrac; cR = cL + trw; }
        break;
    }
  }
  update();
}

function endDrag() {
  dragType = null; crop.classList.remove('grabbing');
  document.removeEventListener('mousemove', onDrag);
  document.removeEventListener('mouseup', endDrag);
  document.removeEventListener('touchmove', onDrag);
  document.removeEventListener('touchend', endDrag);
}

function clamp(v, mn, mx) { return Math.max(mn, Math.min(mx, v)); }

crop.onmousedown = function(e) { if (!e.target.dataset.h && !e.target.closest('[data-h]')) beginDrag('move', e); };
crop.ontouchstart = function(e) { if (!e.target.dataset.h && !e.target.closest('[data-h]')) beginDrag('move', e); };
crop.querySelectorAll('[data-h]').forEach(function(el) {
  var h = el.dataset.h;
  el.onmousedown = function(e) { beginDrag(h, e); };
  el.ontouchstart = function(e) { beginDrag(h, e); };
});

var showPreview = false;
function togglePreview() {
  if (!img) return;
  showPreview = true;
  var modal = $('previewModal');
  modal.classList.add('on');
  // Render preview
  var pxFn = function(v) { return Math.round(v * img.naturalWidth); };
  var pyFn = function(v) { return Math.round(v * img.naturalHeight); };
  var w = pxFn(cR) - pxFn(cL), h = pyFn(cB) - pyFn(cT);
  prevCv.width = w; prevCv.height = h;
  var ctx = prevCv.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(img, pxFn(cL), pyFn(cT), w, h, 0, 0, w, h);
  $('previewInfo').textContent = w + ' \u00d7 ' + h + ' px';
}

function closePreview() {
  showPreview = false;
  $('previewModal').classList.remove('on');
}

$('previewClose').onclick = closePreview;
$('previewModal').onclick = function(e) {
  if (e.target === $('previewModal')) closePreview();
};
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    if (showPreview) closePreview();
    if ($('exportModal').classList.contains('on')) closeExportModal();
  }
  // Ctrl/Cmd + / - for zoom
  if ((e.ctrlKey || e.metaKey) && (e.key === '=' || e.key === '+')) {
    e.preventDefault();
    zoomChange(1);
  }
  if ((e.ctrlKey || e.metaKey) && e.key === '-') {
    e.preventDefault();
    zoomChange(-1);
  }
  if ((e.ctrlKey || e.metaKey) && e.key === '0') {
    e.preventDefault();
    zoomLevel = 100;
    applyZoom();
  }
});

function dl() {
  openExportModal();
}

// ═══ RIGHT PANEL ═══
var rightPanelOpen = false;
function toggleRightPanel() {
  rightPanelOpen = !rightPanelOpen;
  $('sidebarRight').classList.toggle('open', rightPanelOpen);
  $('btnPanelToggle').classList.toggle('active', rightPanelOpen);
}

// ═══ ROTATE / FLIP ═══
function rotateImg(deg) {
  if (!img) return;
  var c = document.createElement('canvas');
  var isSwap = (Math.abs(deg) === 90);
  c.width = isSwap ? img.naturalHeight : img.naturalWidth;
  c.height = isSwap ? img.naturalWidth : img.naturalHeight;
  var ctx = c.getContext('2d');
  ctx.translate(c.width / 2, c.height / 2);
  ctx.rotate(deg * Math.PI / 180);
  ctx.drawImage(img, -img.naturalWidth / 2, -img.naturalHeight / 2);
  var newImg = new Image();
  newImg.onload = function() {
    img = newImg;
    init();
  };
  newImg.src = c.toDataURL();
}

function flipImg(dir) {
  if (!img) return;
  var c = document.createElement('canvas');
  c.width = img.naturalWidth; c.height = img.naturalHeight;
  var ctx = c.getContext('2d');
  if (dir === 'h') { ctx.translate(c.width, 0); ctx.scale(-1, 1); }
  else { ctx.translate(0, c.height); ctx.scale(1, -1); }
  ctx.drawImage(img, 0, 0);
  var newImg = new Image();
  newImg.onload = function() {
    img = newImg;
    init();
  };
  newImg.src = c.toDataURL();
}

// ═══ SOCIAL PRESETS ═══
var socialPresetData = [
  { name: 'Instagram Post', w: 1080, h: 1080, ratio: 1 },
  { name: 'Instagram Story', w: 1080, h: 1920, ratio: 9/16 },
  { name: 'Facebook Cover', w: 820, h: 312, ratio: 820/312 },
  { name: 'YouTube Thumb', w: 1280, h: 720, ratio: 16/9 },
  { name: 'Twitter Header', w: 1500, h: 500, ratio: 3 },
  { name: 'LinkedIn Banner', w: 1584, h: 396, ratio: 4 },
];

(function buildSocialPresets() {
  var container = $('socialPresets');
  socialPresetData.forEach(function(p) {
    var btn = document.createElement('button');
    btn.className = 'social-preset';
    var nameEl = document.createElement('span');
    nameEl.className = 'sp-name';
    nameEl.textContent = p.name;
    var sizeEl = document.createElement('span');
    sizeEl.className = 'sp-size';
    sizeEl.textContent = p.w + '\u00d7' + p.h;
    btn.appendChild(nameEl);
    btn.appendChild(sizeEl);
    btn.onclick = function() {
      if (!img) return;
      // Set ratio and adjust crop
      cropRatio = p.ratio;
      // Update ratio chips UI
      document.querySelectorAll('.ratio-chip').forEach(function(c) { c.classList.remove('active'); });
      // Apply ratio to crop box
      var imgRatio = img.naturalWidth / img.naturalHeight;
      var cropW, cropH;
      if (p.ratio >= imgRatio) {
        cropW = 1;
        cropH = (1 / p.ratio) * imgRatio;
      } else {
        cropH = 1;
        cropW = p.ratio / imgRatio;
      }
      cL = (1 - cropW) / 2; cR = cL + cropW;
      cT = (1 - cropH) / 2; cB = cT + cropH;
      update();
    };
    container.appendChild(btn);
  });
})();

// ═══ ZOOM ═══
function applyZoom() {
  cw.style.width = zoomLevel + '%';
  $('zoomLabel').textContent = zoomLevel + '%';
  $('zoomSlider').value = zoomLevel;
}

function zoomTo(val) {
  zoomLevel = parseInt(val);
  applyZoom();
}

function zoomChange(dir) {
  var idx = ZOOM_STEPS.indexOf(zoomLevel);
  if (idx === -1) {
    for (var i = 0; i < ZOOM_STEPS.length; i++) {
      if (ZOOM_STEPS[i] >= zoomLevel) { idx = i; break; }
    }
    if (idx === -1) idx = ZOOM_STEPS.length - 1;
  }
  var newIdx = idx + dir;
  if (newIdx < 0) newIdx = 0;
  if (newIdx >= ZOOM_STEPS.length) newIdx = ZOOM_STEPS.length - 1;
  zoomLevel = ZOOM_STEPS[newIdx];
  applyZoom();
}

// Ctrl/Cmd + scroll wheel zoom
ws.addEventListener('wheel', function(e) {
  if (!e.ctrlKey && !e.metaKey) return;
  e.preventDefault();
  zoomChange(e.deltaY < 0 ? 1 : -1);
}, { passive: false });

window.addEventListener('resize', function() { if (img) update(); });

// ═══ ASPECT RATIO CHIPS ═══
var ratioOptions = [
  {label:'Free', value:null},
  {label:'1:1', value:1},
  {label:'16:9', value:16/9},
  {label:'4:3', value:4/3},
  {label:'9:16', value:9/16},
  {label:'3:2', value:3/2}
];
var ratioChipsEl = $('ratioChips');
ratioOptions.forEach(function(opt) {
  var chip = document.createElement('button');
  chip.className = 'ratio-chip' + (opt.value === null ? ' active' : '');
  chip.textContent = opt.label;
  chip.onclick = function() {
    ratioChipsEl.querySelectorAll('.ratio-chip').forEach(function(c) { c.classList.remove('active'); });
    chip.classList.add('active');
    cropRatio = opt.value;
    if (cropRatio && img) {
      // Adjust crop box to match ratio
      var imgAspect = img.naturalWidth / img.naturalHeight;
      var cropW = cR - cL;
      var cropH = cB - cT;
      var cropPixelW = cropW * img.naturalWidth;
      var cropPixelH = cropH * img.naturalHeight;
      var currentRatio = cropPixelW / cropPixelH;
      if (Math.abs(currentRatio - cropRatio) > 0.01) {
        // Adjust height to match ratio, keeping width
        var newPixelH = cropPixelW / cropRatio;
        var newH = newPixelH / img.naturalHeight;
        var centerY = (cT + cB) / 2;
        var newT = centerY - newH / 2;
        var newB = centerY + newH / 2;
        if (newT < 0) { newT = 0; newB = newH; }
        if (newB > 1) { newB = 1; newT = 1 - newH; }
        if (newT < 0) {
          newT = 0;
          newB = 1;
          // Recalc width from height
          var actualH = img.naturalHeight;
          var newPixelW = actualH * cropRatio;
          var newW = newPixelW / img.naturalWidth;
          var centerX = (cL + cR) / 2;
          cL = Math.max(0, centerX - newW / 2);
          cR = Math.min(1, cL + newW);
          cL = cR - newW;
          if (cL < 0) cL = 0;
        }
        cT = newT; cB = newB;
        update();
      }
    }
  };
  ratioChipsEl.appendChild(chip);
});

// ═══ ADJUSTMENTS ACCORDION ═══
var adjustHeader = $('adjustHeader');
var adjustBody = $('adjustBody');
var adjustInner = $('adjustInner');

adjustHeader.onclick = function() {
  adjustHeader.classList.toggle('open');
  adjustBody.classList.toggle('open');
};

var adjustSliders = [

}

// ═══ EXPORT MODAL ═══
// Build export close button content
var exportCloseBtn = $('exportClose');
exportCloseBtn.textContent = '\u2715';

// Build export panel
function buildExportPanel() {
  var panel = $('exportPanel');
  // Clear panel
  while (panel.firstChild) panel.removeChild(panel.firstChild);

  var title = document.createElement('h3');
  title.textContent = 'Export Image';
  panel.appendChild(title);

  // Format
  var fmtGroup = document.createElement('div');
  fmtGroup.className = 'export-group';
  var fmtLabel = document.createElement('div');
  fmtLabel.className = 'export-group-label';
  fmtLabel.textContent = 'Format';
  fmtGroup.appendChild(fmtLabel);

  var fmtChips = document.createElement('div');
  fmtChips.className = 'format-chips';
  var formats = ['PNG','JPG','WebP'];
  formats.forEach(function(fmt) {
    var chip = document.createElement('button');
    chip.className = 'format-chip' + (fmt === 'PNG' ? ' active' : '');
    chip.textContent = fmt;
    chip.onclick = function() {
      fmtChips.querySelectorAll('.format-chip').forEach(function(c) { c.classList.remove('active'); });
      chip.classList.add('active');
      exportFormat = fmt.toLowerCase().replace('jpg','jpeg');
      // Show/hide quality
      var qGroup = $('qualityGroup');
      if (exportFormat === 'png') { qGroup.style.display = 'none'; }
      else { qGroup.style.display = 'block'; }
      updateExportSize();
    };
    fmtChips.appendChild(chip);
  });
  fmtGroup.appendChild(fmtChips);
  panel.appendChild(fmtGroup);

  // Quality
  var qGroup = document.createElement('div');
  qGroup.className = 'export-group';
  qGroup.id = 'qualityGroup';
  qGroup.style.display = 'none';
  var qLabel = document.createElement('div');
  qLabel.className = 'export-group-label';
  qLabel.textContent = 'Quality';
  qGroup.appendChild(qLabel);

  var qRow = document.createElement('div');
  qRow.className = 'quality-row';
  var qSlider = document.createElement('input');
  qSlider.type = 'range'; qSlider.min = 1; qSlider.max = 100; qSlider.value = 85;
  qRow.appendChild(qSlider);
  var qVal = document.createElement('span');
  qVal.className = 'q-val';
  qVal.textContent = '85';
  qRow.appendChild(qVal);
  qSlider.oninput = function() {
    exportQuality = parseInt(qSlider.value);
    qVal.textContent = qSlider.value;
    updateExportSize();
  };
  qGroup.appendChild(qRow);
  panel.appendChild(qGroup);

  // Resize
  var resGroup = document.createElement('div');
  resGroup.className = 'export-group';
  var resLabel = document.createElement('div');
  resLabel.className = 'export-group-label';
  resLabel.textContent = 'Resize';
  resGroup.appendChild(resLabel);

  var resToggle = document.createElement('div');
  resToggle.className = 'resize-toggle';
  var resCheck = document.createElement('input');
  resCheck.type = 'checkbox'; resCheck.id = 'resizeCheck';
  resToggle.appendChild(resCheck);
  var resLbl = document.createElement('label');
  resLbl.setAttribute('for','resizeCheck');
  resLbl.textContent = 'Custom size';
  resToggle.appendChild(resLbl);
  resGroup.appendChild(resToggle);

  var resInputs = document.createElement('div');
  resInputs.className = 'resize-inputs';
  resInputs.id = 'resizeInputs';

  var wInput = document.createElement('input');
  wInput.type = 'number'; wInput.id = 'resW'; wInput.min = 1;
  resInputs.appendChild(wInput);

  var xSpan = document.createElement('span');
  xSpan.className = 'resize-x';
  xSpan.textContent = '\u00d7';
  resInputs.appendChild(xSpan);

  var hInput = document.createElement('input');
  hInput.type = 'number'; hInput.id = 'resH'; hInput.min = 1;
  resInputs.appendChild(hInput);

  var lockBtn = document.createElement('button');
  lockBtn.className = 'resize-lock active';
  lockBtn.id = 'resizeLock';
  var lockSvg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  lockSvg.setAttribute('width','14');
  lockSvg.setAttribute('height','14');
  lockSvg.setAttribute('viewBox','0 0 24 24');
  lockSvg.setAttribute('fill','none');
  lockSvg.setAttribute('stroke','currentColor');
  lockSvg.setAttribute('stroke-width','2');
  lockSvg.setAttribute('stroke-linecap','round');
  lockSvg.setAttribute('stroke-linejoin','round');
  var lockRect = document.createElementNS('http://www.w3.org/2000/svg','rect');
  lockRect.setAttribute('x','3');lockRect.setAttribute('y','11');lockRect.setAttribute('width','18');lockRect.setAttribute('height','11');lockRect.setAttribute('rx','2');
  lockSvg.appendChild(lockRect);
  var lockPath = document.createElementNS('http://www.w3.org/2000/svg','path');
  lockPath.setAttribute('d','M7 11V7a5 5 0 0 1 10 0v4');
  lockSvg.appendChild(lockPath);
  lockBtn.appendChild(lockSvg);
  lockBtn.onclick = function() {
    exportRatioLock = !exportRatioLock;
    lockBtn.classList.toggle('active', exportRatioLock);
  };
  resInputs.appendChild(lockBtn);

  resGroup.appendChild(resInputs);

  var resPresets = document.createElement('div');
  resPresets.className = 'resize-presets';
  resPresets.id = 'resizePresets';
  var presetSelect = document.createElement('select');
  presetSelect.id = 'resizePreset';
  var presetOpts = [
    {label:'Original', w:0, h:0},
    {label:'1920 \u00d7 1080', w:1920, h:1080},
    {label:'1280 \u00d7 720', w:1280, h:720},
    {label:'800 \u00d7 600', w:800, h:600},
    {label:'300 \u00d7 300', w:300, h:300}
  ];
  presetOpts.forEach(function(p) {
    var opt = document.createElement('option');
    opt.textContent = p.label;
    opt.value = p.w + ',' + p.h;
    presetSelect.appendChild(opt);
  });
  presetSelect.onchange = function() {
    var parts = presetSelect.value.split(',');
    var pw = parseInt(parts[0]), ph = parseInt(parts[1]);
    if (pw === 0) {
      var origW = getExportOrigW(), origH = getExportOrigH();
      wInput.value = origW; hInput.value = origH;
      exportResizeW = origW; exportResizeH = origH;
    } else {
      wInput.value = pw; hInput.value = ph;
      exportResizeW = pw; exportResizeH = ph;
    }
    updateExportSize();
  };
  resPresets.appendChild(presetSelect);
  resGroup.appendChild(resPresets);

  resCheck.onchange = function() {
    exportResizeOn = resCheck.checked;
    resInputs.classList.toggle('on', resCheck.checked);
    resPresets.classList.toggle('on', resCheck.checked);
    if (resCheck.checked) {
      var origW = getExportOrigW(), origH = getExportOrigH();
      wInput.value = origW; hInput.value = origH;
      exportResizeW = origW; exportResizeH = origH;
    }
    updateExportSize();
  };

  wInput.oninput = function() {
    exportResizeW = parseInt(wInput.value) || 1;
    if (exportRatioLock) {
      var ratio = getExportOrigW() / getExportOrigH();
      exportResizeH = Math.round(exportResizeW / ratio);
      hInput.value = exportResizeH;
    }
    updateExportSize();
  };
  hInput.oninput = function() {
    exportResizeH = parseInt(hInput.value) || 1;
    if (exportRatioLock) {
      var ratio = getExportOrigW() / getExportOrigH();
      exportResizeW = Math.round(exportResizeH * ratio);
      wInput.value = exportResizeW;
    }
    updateExportSize();
  };

  panel.appendChild(resGroup);

  // File size estimate
  var sizeDiv = document.createElement('div');
  sizeDiv.className = 'export-size';
  sizeDiv.id = 'exportSizeEst';
  sizeDiv.textContent = 'Estimating...';
  panel.appendChild(sizeDiv);

  // Download button
  var dlBtn = document.createElement('button');
  dlBtn.className = 'btn-export';
  var dlIco = document.createElementNS('http://www.w3.org/2000/svg','svg');
  dlIco.setAttribute('width','16');
  dlIco.setAttribute('height','16');
  dlIco.setAttribute('viewBox','0 0 24 24');
  dlIco.setAttribute('fill','none');
  dlIco.setAttribute('stroke','currentColor');
  dlIco.setAttribute('stroke-width','2');
  dlIco.setAttribute('stroke-linecap','round');
  dlIco.setAttribute('stroke-linejoin','round');
  var dlPath1 = document.createElementNS('http://www.w3.org/2000/svg','path');
  dlPath1.setAttribute('d','M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4');
  dlIco.appendChild(dlPath1);
  var dlPoly = document.createElementNS('http://www.w3.org/2000/svg','polyline');
  dlPoly.setAttribute('points','7 10 12 15 17 10');
  dlIco.appendChild(dlPoly);
  var dlLine = document.createElementNS('http://www.w3.org/2000/svg','line');
  dlLine.setAttribute('x1','12');dlLine.setAttribute('y1','15');dlLine.setAttribute('x2','12');dlLine.setAttribute('y2','3');
  dlIco.appendChild(dlLine);
  dlBtn.appendChild(dlIco);
  var dlTxt = document.createElement('span');
  dlTxt.textContent = 'Tải về';
  dlBtn.appendChild(dlTxt);
  dlBtn.onclick = doExport;
  panel.appendChild(dlBtn);
}

function getExportOrigW() {
  return Math.round(cR * img.naturalWidth) - Math.round(cL * img.naturalWidth);
}
function getExportOrigH() {
  return Math.round(cB * img.naturalHeight) - Math.round(cT * img.naturalHeight);
}

function buildExportCanvas(targetW, targetH) {
  var x = Math.round(cL * img.naturalWidth), y = Math.round(cT * img.naturalHeight);
  var w = Math.round(cR * img.naturalWidth) - x, h = Math.round(cB * img.naturalHeight) - y;
  var outW = targetW || w, outH = targetH || h;

  var c = document.createElement('canvas');
  c.width = outW; c.height = outH;
  var ctx = c.getContext('2d');

  // Apply brightness/contrast/saturation via ctx.filter
  var filterParts = [];
  if (adjustments.brightness !== 100) filterParts.push('brightness(' + adjustments.brightness + '%)');
  if (adjustments.contrast !== 100) filterParts.push('contrast(' + adjustments.contrast + '%)');
  if (adjustments.saturation !== 100) filterParts.push('saturate(' + adjustments.saturation + '%)');
  if (filterParts.length > 0) ctx.filter = filterParts.join(' ');

  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(img, x, y, w, h, 0, 0, outW, outH);

  // Apply sharpen convolution if needed
  if (adjustments.sharpen > 0) {
    applySharpen(ctx, outW, outH, adjustments.sharpen / 100);
  }

  return c;
}

function applySharpen(ctx, w, h, amount) {
  var imageData = ctx.getImageData(0, 0, w, h);
  var src = imageData.data;
  var output = ctx.createImageData(w, h);
  var dst = output.data;

  // Sharpen kernel: [0,-1,0,-1,5,-1,0,-1,0] blended with identity by amount
  var k = [0, -amount, 0, -amount, 1 + 4 * amount, -amount, 0, -amount, 0];

  for (var y = 1; y < h - 1; y++) {
    for (var x = 1; x < w - 1; x++) {
      for (var c = 0; c < 3; c++) {
        var val =
          k[0] * src[((y-1)*w+(x-1))*4+c] + k[1] * src[((y-1)*w+x)*4+c] + k[2] * src[((y-1)*w+(x+1))*4+c] +
          k[3] * src[(y*w+(x-1))*4+c]     + k[4] * src[(y*w+x)*4+c]     + k[5] * src[(y*w+(x+1))*4+c] +
          k[6] * src[((y+1)*w+(x-1))*4+c] + k[7] * src[((y+1)*w+x)*4+c] + k[8] * src[((y+1)*w+(x+1))*4+c];
        dst[(y*w+x)*4+c] = Math.min(255, Math.max(0, Math.round(val)));
      }
      dst[(y*w+x)*4+3] = src[(y*w+x)*4+3]; // alpha
    }
  }
  // Copy edges
  for (var x2 = 0; x2 < w; x2++) {
    for (var c2 = 0; c2 < 4; c2++) {
      dst[x2*4+c2] = src[x2*4+c2];
      dst[((h-1)*w+x2)*4+c2] = src[((h-1)*w+x2)*4+c2];
    }
  }
  for (var y2 = 0; y2 < h; y2++) {
    for (var c3 = 0; c3 < 4; c3++) {
      dst[(y2*w)*4+c3] = src[(y2*w)*4+c3];
      dst[(y2*w+(w-1))*4+c3] = src[(y2*w+(w-1))*4+c3];
    }
  }
  ctx.putImageData(output, 0, 0);
}

function getMimeType() {
  if (exportFormat === 'jpeg') return 'image/jpeg';
  if (exportFormat === 'webp') return 'image/webp';
  return 'image/png';
}

function getFileExt() {
  if (exportFormat === 'jpeg') return '.jpg';
  if (exportFormat === 'webp') return '.webp';
  return '.png';
}

function updateExportSize() {
  clearTimeout(exportSizeDebounce);
  exportSizeDebounce = setTimeout(function() {
    var outW, outH;
    if (exportResizeOn && exportResizeW > 0 && exportResizeH > 0) {
      outW = exportResizeW; outH = exportResizeH;
    } else {
      outW = getExportOrigW(); outH = getExportOrigH();
    }
    var tmpC = buildExportCanvas(outW, outH);
    var mime = getMimeType();
    var q = (mime === 'image/png') ? undefined : exportQuality / 100;
    tmpC.toBlob(function(blob) {
      if (!blob) { $('exportSizeEst').textContent = '—'; return; }
      var kb = blob.size / 1024;
      if (kb >= 1024) {
        $('exportSizeEst').textContent = '~' + (kb / 1024).toFixed(1) + ' MB';
      } else {
        $('exportSizeEst').textContent = '~' + Math.round(kb) + ' KB';
      }
    }, mime, q);

    // Update preview canvas
    var prevCanvas = $('exportCv');
    prevCanvas.width = tmpC.width;
    prevCanvas.height = tmpC.height;
    prevCanvas.getContext('2d').drawImage(tmpC, 0, 0);
  }, 300);
}

function openExportModal() {
  if (!img) return;
  exportFormat = 'png';
  exportQuality = 85;
  exportResizeOn = false;
  exportRatioLock = true;
  buildExportPanel();
  $('exportModal').classList.add('on');

  // Initial preview
  var origW = getExportOrigW(), origH = getExportOrigH();
  var prevCanvas = $('exportCv');
  var tmpC = buildExportCanvas(origW, origH);
  prevCanvas.width = tmpC.width; prevCanvas.height = tmpC.height;
  prevCanvas.getContext('2d').drawImage(tmpC, 0, 0);
  updateExportSize();
}

function closeExportModal() {
  $('exportModal').classList.remove('on');
}

function doExport() {
  var outW, outH;
  if (exportResizeOn && exportResizeW > 0 && exportResizeH > 0) {
    outW = exportResizeW; outH = exportResizeH;
  } else {
    outW = getExportOrigW(); outH = getExportOrigH();
  }
  var c = buildExportCanvas(outW, outH);
  var mime = getMimeType();
  var q = (mime === 'image/png') ? undefined : exportQuality / 100;
  c.toBlob(function(blob) {
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.download = fName + '_cropped' + getFileExt();
    a.href = url;
    a.click();
    setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
  }, mime, q);
  closeExportModal();
}

$('exportClose').onclick = closeExportModal;
$('exportModal').onclick = function(e) {
  if (e.target === $('exportModal')) closeExportModal();
};

// ═══ CLIPBOARD PASTE ═══
document.addEventListener('paste', function(e) {
  var items = e.clipboardData && e.clipboardData.items;
  if (!items) return;
  for (var i = 0; i < items.length; i++) {
    if (items[i].type.indexOf('image') !== -1) {
      e.preventDefault();
      var blob = items[i].getAsFile();
      if (!blob) continue;
      clearActiveThumb();
      fName = 'pasted_image';
      var myId = ++loadId;
      var reader = new FileReader();
      reader.onload = function(ev) {
        var newImg = new Image();
        newImg.onload = function() {
          if (myId !== loadId) return;
          img = newImg;
          init();
        };
        newImg.src = ev.target.result;
      };
      reader.readAsDataURL(blob);
      break;
    }
  }
});
