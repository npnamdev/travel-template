<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Screenshot Splitter</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0e0e12; --surface: #1a1a22; --surface2: #24242f;
    --border: #2e2e3a; --text: #e8e8ed; --text2: #8888a0;
    --accent: #6c5ce7; --accent2: #a29bfe; --danger: #ff6b6b;
    --success: #51cf66; --radius: 12px;
  }
  body { font-family: 'Be Vietnam Pro', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .app { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }

  h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 4px; }
  h1 span { color: var(--accent2); }
  .subtitle { color: var(--text2); font-size: .85rem; margin-bottom: 20px; }

  /* Drop zone */
  .dropzone {
    border: 2px dashed var(--border); border-radius: var(--radius);
    padding: 48px 24px; text-align: center; cursor: pointer;
    transition: .2s; background: var(--surface);
  }
  .dropzone:hover, .dropzone.drag { border-color: var(--accent); background: var(--surface2); }
  .dropzone p { color: var(--text2); font-size: .9rem; }
  .dropzone .icon { font-size: 2.4rem; margin-bottom: 8px; }

  /* Workspace */
  .workspace { display: none; gap: 20px; margin-top: 16px; }
  .workspace.active { display: flex; flex-wrap: wrap; }

  /* Preview panel */
  .preview-panel {
    flex: 1; min-width: 300px; background: var(--surface);
    border-radius: var(--radius); padding: 16px; position: relative;
    border: 1px solid var(--border);
  }
  .preview-container {
    position: relative; overflow: hidden; border-radius: 8px;
    background: repeating-conic-gradient(#222 0% 25%, #1a1a1a 0% 50%) 0 0 / 20px 20px;
  }
  .preview-container img { width: 100%; display: block; user-select: none; -webkit-user-drag: none; }
  .preview-container canvas { width: 100%; display: block; }

  /* Slice lines */
  .slice-line {
    position: absolute; left: 0; right: 0; height: 3px;
    background: var(--danger); cursor: ns-resize; z-index: 10;
    transition: box-shadow .15s;
  }
  .slice-line::before {
    content: ''; position: absolute; left: 0; right: 0;
    top: -8px; bottom: -8px;
  }
  .slice-line::after {
    content: attr(data-label); position: absolute; right: 8px; top: -22px;
    background: var(--danger); color: #fff; font-size: .65rem; font-weight: 600;
    padding: 2px 8px; border-radius: 4px;
  }
  .slice-line:hover { box-shadow: 0 0 12px rgba(255,107,107,.5); }

  /* Controls */
  .controls {
    width: 280px; display: flex; flex-direction: column; gap: 12px;
  }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px;
  }
  .card h3 { font-size: .85rem; font-weight: 600; margin-bottom: 10px; color: var(--accent2); }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 10px 16px; border: none; border-radius: 8px;
    font-family: inherit; font-size: .85rem; font-weight: 600;
    cursor: pointer; transition: .15s; width: 100%;
  }
  .btn-accent { background: var(--accent); color: #fff; }
  .btn-accent:hover { background: #5b4bd6; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent2); }
  .btn-success { background: var(--success); color: #111; }
  .btn-success:hover { background: #40b854; }

  .slice-count { display: flex; align-items: center; gap: 8px; }
  .slice-count button {
    width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text); font-size: 1.1rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .slice-count button:hover { border-color: var(--accent); }
  .slice-count span { font-size: 1.3rem; font-weight: 700; min-width: 28px; text-align: center; }

  /* Output thumbnails */
  .output-list { display: flex; flex-direction: column; gap: 8px; }
  .output-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px; border-radius: 8px; background: var(--surface2);
  }
  .output-item canvas {
    width: 60px; height: 40px; object-fit: cover; border-radius: 4px;
    background: #111; flex-shrink: 0;
  }
  .output-item .info { flex: 1; font-size: .75rem; color: var(--text2); }
  .output-item .info strong { color: var(--text); display: block; font-size: .8rem; }
  .output-item button {
    background: none; border: none; color: var(--accent2); cursor: pointer;
    font-size: .75rem; font-weight: 600; padding: 4px 8px; border-radius: 4px;
  }
  .output-item button:hover { background: var(--surface); }

  .info-text { font-size: .75rem; color: var(--text2); text-align: center; margin-top: 6px; }

  @media (max-width: 700px) {
    .controls { width: 100%; }
    .workspace.active { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="app">
  <h1>✂️ Screenshot <span>Splitter</span></h1>
  <p class="subtitle">Kéo thả ảnh chụp màn hình dài → cắt thành nhiều phần → tải về</p>

  <div class="dropzone" id="dropzone">
    <div class="icon">📸</div>
    <p>Kéo thả ảnh vào đây hoặc <strong>click để chọn</strong></p>
    <input type="file" accept="image/*" id="fileInput" hidden>
  </div>

  <div class="workspace" id="workspace">
    <div class="preview-panel">
      <div class="preview-container" id="previewContainer">
        <canvas id="previewCanvas"></canvas>
      </div>
    </div>
    <div class="controls">
      <div class="card">
        <h3>Số phần cắt</h3>
        <div class="slice-count">
          <button onclick="changeSlices(-1)">−</button>
          <span id="sliceNum">2</span>
          <button onclick="changeSlices(1)">+</button>
        </div>
        <p class="info-text">Kéo đường đỏ để chỉnh vị trí cắt</p>
      </div>

      <button class="btn btn-accent" onclick="splitEqual()">⚡ Chia đều</button>
      <button class="btn btn-success" onclick="downloadAll()">⬇ Tải tất cả</button>
      <button class="btn btn-outline" onclick="reset()">🔄 Chọn ảnh khác</button>

      <div class="card">
        <h3>Kết quả</h3>
        <div class="output-list" id="outputList"></div>
      </div>
    </div>
  </div>
</div>

<script>
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const workspace = document.getElementById('workspace');
const previewContainer = document.getElementById('previewContainer');
const previewCanvas = document.getElementById('previewCanvas');
const outputList = document.getElementById('outputList');

let img = null;
let sliceCount = 2;
let slicePositions = []; // fractions 0-1

dropzone.addEventListener('click', () => fileInput.click());
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag'));
dropzone.addEventListener('drop', e => { e.preventDefault(); dropzone.classList.remove('drag'); handleFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

function handleFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = e => {
    img = new Image();
    img.onload = () => { initWorkspace(); };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function initWorkspace() {
  dropzone.style.display = 'none';
  workspace.classList.add('active');
  previewCanvas.width = img.naturalWidth;
  previewCanvas.height = img.naturalHeight;
  splitEqual();
}

function changeSlices(d) {
  sliceCount = Math.max(2, Math.min(10, sliceCount + d));
  document.getElementById('sliceNum').textContent = sliceCount;
  splitEqual();
}

function splitEqual() {
  slicePositions = [];
  for (let i = 1; i < sliceCount; i++) {
    slicePositions.push(i / sliceCount);
  }
  render();
}

function render() {
  const ctx = previewCanvas.getContext('2d');
  ctx.drawImage(img, 0, 0);

  // Draw colored overlays for sections
  const colors = ['rgba(108,92,231,.12)','rgba(81,207,102,.12)','rgba(255,107,107,.12)','rgba(253,203,110,.12)',
    'rgba(0,206,209,.12)','rgba(255,118,117,.12)','rgba(99,110,114,.12)','rgba(162,155,254,.12)','rgba(255,159,243,.12)','rgba(116,185,255,.12)'];
  const allPos = [0, ...slicePositions, 1];
  for (let i = 0; i < allPos.length - 1; i++) {
    ctx.fillStyle = colors[i % colors.length];
    const y1 = allPos[i] * img.naturalHeight;
    const y2 = allPos[i+1] * img.naturalHeight;
    ctx.fillRect(0, y1, img.naturalWidth, y2 - y1);
  }

  renderSliceLines();
  renderOutputs();
}

function renderSliceLines() {
  previewContainer.querySelectorAll('.slice-line').forEach(el => el.remove());
  slicePositions.forEach((pos, idx) => {
    const line = document.createElement('div');
    line.className = 'slice-line';
    line.style.top = (pos * 100) + '%';
    line.dataset.label = `Cắt ${idx + 1}`;
    previewContainer.appendChild(line);

    let dragging = false;
    const onMove = e => {
      if (!dragging) return;
      e.preventDefault();
      const rect = previewContainer.getBoundingClientRect();
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      let frac = (clientY - rect.top) / rect.height;
      frac = Math.max(0.02, Math.min(0.98, frac));
      slicePositions[idx] = frac;
      slicePositions.sort((a, b) => a - b);
      render();
    };
    const onUp = () => { dragging = false; document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); document.removeEventListener('touchmove', onMove); document.removeEventListener('touchend', onUp); };
    line.addEventListener('mousedown', e => { e.preventDefault(); dragging = true; document.addEventListener('mousemove', onMove); document.addEventListener('mouseup', onUp); });
    line.addEventListener('touchstart', e => { dragging = true; document.addEventListener('touchmove', onMove, {passive:false}); document.addEventListener('touchend', onUp); });
  });
}

function renderOutputs() {
  outputList.innerHTML = '';
  const allPos = [0, ...slicePositions, 1];
  for (let i = 0; i < allPos.length - 1; i++) {
    const y1 = Math.round(allPos[i] * img.naturalHeight);
    const y2 = Math.round(allPos[i+1] * img.naturalHeight);
    const h = y2 - y1;

    const c = document.createElement('canvas');
    c.width = img.naturalWidth; c.height = h;
    c.getContext('2d').drawImage(img, 0, y1, img.naturalWidth, h, 0, 0, img.naturalWidth, h);

    const item = document.createElement('div');
    item.className = 'output-item';

    const thumb = document.createElement('canvas');
    thumb.width = 120; thumb.height = 80;
    const tCtx = thumb.getContext('2d');
    const scale = Math.min(120 / img.naturalWidth, 80 / h);
    const dw = img.naturalWidth * scale, dh = h * scale;
    tCtx.drawImage(c, (120-dw)/2, (80-dh)/2, dw, dh);

    const info = document.createElement('div');
    info.className = 'info';
    info.innerHTML = `<strong>Phần ${i+1}</strong>${img.naturalWidth} × ${h}px`;

    const btn = document.createElement('button');
    btn.textContent = '⬇ Tải';
    btn.onclick = () => downloadSlice(c, i + 1);

    item.append(thumb, info, btn);
    outputList.appendChild(item);
  }
}

function downloadSlice(canvas, num) {
  const a = document.createElement('a');
  a.download = `screenshot_part_${num}.png`;
  a.href = canvas.toDataURL('image/png');
  a.click();
}

function downloadAll() {
  const allPos = [0, ...slicePositions, 1];
  for (let i = 0; i < allPos.length - 1; i++) {
    const y1 = Math.round(allPos[i] * img.naturalHeight);
    const y2 = Math.round(allPos[i+1] * img.naturalHeight);
    const h = y2 - y1;
    const c = document.createElement('canvas');
    c.width = img.naturalWidth; c.height = h;
    c.getContext('2d').drawImage(img, 0, y1, img.naturalWidth, h, 0, 0, img.naturalWidth, h);
    setTimeout(() => downloadSlice(c, i + 1), i * 300);
  }
}

function reset() {
  workspace.classList.remove('active');
  dropzone.style.display = '';
  fileInput.value = '';
  img = null; sliceCount = 2;
  document.getElementById('sliceNum').textContent = '2';
}
</script>
</body>
</html>
